title: "[회의록] "
labels: ["meeting"]
body:
  - type: markdown
    attributes:
      value: |
        # 📅 회의 기록

        아래 양식에 맞추어 회의 내용을 작성해주세요.

  - type: input
    id: meeting-date
    attributes:
      label: 회의 날짜
      description: 회의 당일 날짜를 입력해주세요.
      placeholder: "예: 2026.04.12"
    validations:
      required: true

  - type: textarea
    id: attendees
    attributes:
      label: 회의 참석자
      description: 참석자를 작성해주세요. 기본 팀원 4명이 미리 적혀 있습니다.
      value: |
        - 박민서
        - 배정현
        - 이강욱
        - 이채연
    validations:
      required: true

  - type: textarea
    id: meeting-content
    attributes:
      label: 회의 내용
      description: 논의 주제, 진행 상황, 결정 사항, 다음 회의 전까지 필요한 작업을 작성해주세요.
      placeholder: |
        - 논의한 주제를 작성해주세요.
        - 현재 진행 상황을 작성해주세요.
        - 결정된 사항을 작성해주세요.
        - 다음 회의 전까지 필요한 작업을 작성해주세요.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 담당 업무
        아래에 각 팀원별로 오늘 해야 할 일을 작성해주세요.

  - type: textarea
    id: park-minseo-task
    attributes:
      label: 박민서
      placeholder: |
        - 오늘 해야 할 일을 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: bae-jeonghyeon-task
    attributes:
      label: 배정현
      placeholder: |
        - 오늘 해야 할 일을 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: lee-ganguk-task
    attributes:
      label: 이강욱
      placeholder: |
        - 오늘 해야 할 일을 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: lee-chaeyeon-task
    attributes:
      label: 이채연
      placeholder: |
        - 오늘 해야 할 일을 작성해주세요.
    validations:
      required: true