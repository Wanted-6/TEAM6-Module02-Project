name: "Update"
description: "기존 기능 수정 이슈 템플릿"
title: "[UPDATE] "
labels: ["update"]
assignees: []

body:
  - type: textarea
    id: target
    attributes:
      label: "📌 수정할 기능"
      placeholder: |
        예)
        - 회원가입 기능
        - 시간표 조회 기능
        - 과제 제출 기능
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "🛠️ 수정 내용"
      placeholder: |
        - 기존 어떤 문제가 있었는지
        - 무엇을 바꿀 것인지
        - 수정 후 기대 결과는 무엇인지

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업 내용"
      placeholder: |
        - [ ] 수정 사항 1
        - [ ] 수정 사항 2
        - [ ] 수정 사항 3

  - type: textarea
    id: references
    attributes:
      label: "📎 참고 자료"
      placeholder: |
        - 참고 링크:
        - 관련 문서:

  - type: input
    id: duration
    attributes:
      label: "⏰ 예상 소요 시간"
      placeholder: "예) 1시간, 3시간, 반나절, 1일"