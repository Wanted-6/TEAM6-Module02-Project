name: "Bug Fix"
description: "버그 해결 이슈 템플릿"
title: "[BUGFIX] "
labels: ["bug"]
assignees: []

body:
  - type: textarea
    id: bug
    attributes:
      label: "🐛 해결할 오류"
      placeholder: |
        예)
        - 로그인 시 500 에러 발생
        - 게시글 수정 후 데이터 반영 안됨
        - 캘린더 일정 삭제 시 화면 갱신 안됨
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "📍 오류 내용"
      placeholder: |
        - 어떤 상황에서 발생하는지
        - 어떤 동작이 문제인지
        - 현재 확인된 원인 또는 추정 원인

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업 내용"
      placeholder: |
        - [ ] 원인 파악
        - [ ] 수정 진행
        - [ ] 재확인

  - type: textarea
    id: references
    attributes:
      label: "📎 참고 자료"
      placeholder: |
        - 에러 메시지:
        - 참고 링크:
        - 스크린샷:

  - type: input
    id: duration
    attributes:
      label: "⏰ 예상 소요 시간"
      placeholder: "예) 30분, 1시간, 2시간, 반나절"