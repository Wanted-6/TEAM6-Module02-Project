spring:
  application:
    name: project-module2-lms
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/meatdb
    username: meat4
    password: meat4

  servlet:
    multipart:
      location: C:/upload-files
      max-file-size: 10MB
      max-request-size: 10MB

  mvc:
    static-path-pattern: /static/**
    hiddenmethod:
      filter:
        enabled: true
  jpa:
    show-sql: true
    database: mysql
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true


