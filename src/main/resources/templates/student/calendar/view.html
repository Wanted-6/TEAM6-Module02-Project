<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>학생 캘린더</title>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <style>
        .calendar-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .calendar-area {
            flex: 1;
            min-width: 0;
        }

        .side-panel {
            flex: 0 0 320px;
            min-width: 320px;
            border-left: 1px solid #ddd;
            padding-left: 20px;
            background-color: #fff8dc;
        }
        .panel-box {
            margin-bottom: 20px;
        }

        .panel-item {
            margin-bottom: 8px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 6px;
            word-break: break-word;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            resize: vertical;
        }

        button {
            margin-top: 10px;
            padding: 8px 14px;
        }
        /* 오늘 날짜 강조 */
        .fc-day-today {
            background-color: #fff3cd !important; /* 연한 노란색 */
            border: 2px solid #ffc107 !important; /* 강조 테두리 */
        }

        /* 오늘 날짜 숫자 강조 */
        .fc-day-today .fc-daygrid-day-number {
            font-weight: bold;
            color: #d97706;
        }

        .dday-item {
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            word-break: break-word;
        }

        .dday-yellow {
            background-color: #fef3c7;
            color: #92400e;
        }

        .dday-orange {
            background-color: #fed7aa;
            color: #9a3412;
        }

        .dday-red {
            background-color: #fecaca;
            color: #991b1b;
        }

        .dday-default {
            background-color: #f3f4f6;
            color: #374151;
        }
    </style>
</head>
<body>
<h2>📅 나의 학습 캘린더</h2>

<div class="calendar-layout">
    <div class="calendar-area">
        <div id="calendar"></div>
    </div>

    <div class="side-panel">
        <h3 id="selectedDate">날짜를 선택하세요</h3>

        <div class="panel-box">
            <h4>그날 일정</h4>
            <div id="scheduleList">날짜를 클릭하면 일정이 표시됩니다.</div>
        </div>

        <div class="panel-box">
            <h4>메모</h4>
            <div id="memoList">날짜를 클릭하면 메모가 표시됩니다.</div>
        </div>

        <div class="panel-box">
            <h4>메모 추가</h4>
            <textarea id="memoContent" placeholder="메모를 입력하세요"></textarea>
            <button type="button" id="saveMemoBtn">추가</button>
        </div>

        <div class="panel-box">
            <h4>D-day</h4>
            <div id="ddayList">임박한 시험 일정이 표시됩니다.</div>
        </div>

    </div>
</div>

<script>
    let allEvents = [];
    let selectedDate = null;
    let calendar = null;
    let editingMemoId = null;

    function getTodayString() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function getDateDiff(todayStr, targetStr) {
        const today = new Date(todayStr + 'T00:00:00');
        const target = new Date(targetStr + 'T00:00:00');
        const diffMs = target - today;
        return Math.floor(diffMs / (1000 * 60 * 60 * 24));
    }

    function isDeadlineEvent(event) {
        return event.title && event.title.includes('마감');
    }

    function getDeadlineColor(diffDays) {
        if (diffDays === 3) return '#facc15'; // 노랑
        if (diffDays === 2) return '#fb923c'; // 주황
        if (diffDays === 1 || diffDays === 0) return '#ef4444'; // 빨강
        return '#c4b5fd'; // 기본 마감 일정색
    }

    function applyDeadlineColors(events) {
        const todayStr = getTodayString();

        return events.map(event => {
            let updatedEvent = { ...event };

            if (isDeadlineEvent(event)) {
                const diffDays = getDateDiff(todayStr, event.start);
                updatedEvent.color = getDeadlineColor(diffDays);
            }

            if (event.start < todayStr) {
                updatedEvent.color = '#9ca3af';
            }

            return updatedEvent;
        });
    }


    function renderDdayList() {
        const ddayList = document.getElementById('ddayList');
        ddayList.innerHTML = '';

        const todayStr = getTodayString();

        const imminentDeadlineEvents = allEvents
            .filter(event => isDeadlineEvent(event))
            .map(event => ({
                ...event,
                diffDays: getDateDiff(todayStr, event.start)
            }))
            .filter(event => event.diffDays >= 0 && event.diffDays <= 3)
            .sort((a, b) => a.diffDays - b.diffDays);

        if (imminentDeadlineEvents.length === 0) {
            ddayList.innerHTML = '<div class="panel-item">임박한 마감 일정 없음</div>';
            return;
        }

        imminentDeadlineEvents.forEach(event => {

            let label = '';
            let className = 'dday-default';

            if (event.diffDays === 0) {
                label = 'D-Day';
                className = 'dday-red';
            } else if (event.diffDays === 1) {
                label = 'D-1';
                className = 'dday-red';
            } else if (event.diffDays === 2) {
                label = 'D-2';
                className = 'dday-orange';
            } else if (event.diffDays === 3) {
                label = 'D-3';
                className = 'dday-yellow';
            }

            ddayList.innerHTML += `
                <div class="dday-item ${className}">
                    ${label} : ${event.title} (${event.start})
                </div>
            `;
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
        const calendarEl = document.getElementById('calendar');

        fetch('/student/calendar/events')
            .then(response => response.json())
            .then(data => {
                allEvents = applyDeadlineColors(data);

                calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    locale: 'ko',
                    height: 700,
                    events: allEvents,

                    dateClick: function(info) {
                        selectedDate = info.dateStr;
                        document.getElementById('selectedDate').innerText = selectedDate;

                        renderDayEvents(selectedDate);
                        loadMemos(selectedDate);
                    }
                });

                calendar.render();
                renderDdayList(); // D-day 표시
            });

        document.getElementById('saveMemoBtn').addEventListener('click', function () {
            saveMemo();
        });
    });

    function renderDayEvents(date) {
        const scheduleList = document.getElementById('scheduleList');
        scheduleList.innerHTML = '';

        // 메모를 제외한 일정만 필터링
        const dayEvents = allEvents.filter(event =>
            event.start === date && !event.title.startsWith('[메모]')
        );

        if (dayEvents.length === 0) {
            scheduleList.innerHTML = '<div class="panel-item">일정 없음</div>';
            return;
        }

        dayEvents.forEach(event => {
            scheduleList.innerHTML += `<div class="panel-item">${event.title}</div>`;
        });
    }

    function loadMemos(date) {
        fetch('/student/calendar/memos?date=' + date)
            .then(response => response.json())
            .then(data => {
                console.log('메모 조회 결과:', data);
                renderMemoList(data);
            })
            .catch(error => {
                console.error('메모 조회 오류:', error);
            });
    }

    function saveMemo() {
        const content = document.getElementById('memoContent').value.trim();

        if (!selectedDate) {
            alert('먼저 날짜를 선택하세요.');
            return;
        }

        if (!content) {
            alert('메모 내용을 입력하세요.');
            return;
        }

        const formData = new URLSearchParams();
        formData.append('content', content);
        formData.append('memoDate', selectedDate);

        const isEditMode = editingMemoId !== null;
        const requestUrl = isEditMode
            ? `/student/calendar/${editingMemoId}`
            : '/student/calendar';
        const requestMethod = isEditMode ? 'PUT' : 'POST';

        fetch(requestUrl, {
            method: requestMethod,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error(isEditMode ? '메모 수정 실패' : '메모 저장 실패');
                }
                return response.text();
            })
            .then(() => {
                document.getElementById('memoContent').value = '';
                editingMemoId = null;
                document.getElementById('saveMemoBtn').innerText = '추가';

                loadMemos(selectedDate);
                refreshCalendarEvents();
            })
            .catch(error => {
                console.error(error);
                alert(isEditMode
                    ? '메모 수정 중 오류가 발생했습니다.'
                    : '메모 저장 중 오류가 발생했습니다.');
            });
    }
    function refreshCalendarEvents() {
        fetch('/student/calendar/events')
            .then(response => response.json())
            .then(data => {
                allEvents = applyDeadlineColors(data);

                calendar.removeAllEvents();
                calendar.addEventSource(allEvents);

                renderDayEvents(selectedDate);
                renderDdayList();
            })
            .catch(error => {
                console.error('캘린더 새로고침 오류:', error);
            });
    }

    function renderMemoList(memos) {
        const memoList = document.getElementById('memoList');
        memoList.innerHTML = '';

        if (!memos || memos.length === 0) {course
            memoList.innerHTML = '<div class="panel-item">메모 없음</div>';
            return;
        }

        memos.forEach(memo => {
            const item = document.createElement('div');
            item.className = 'panel-item memo-item';

            const textDiv = document.createElement('div');
            textDiv.className = 'memo-text';
            textDiv.textContent = memo.content;

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'memo-actions';

            const editBtn = document.createElement('button');
            editBtn.type = 'button';
            editBtn.textContent = '수정';
            editBtn.addEventListener('click', function () {
                startEditMemo(memo.memoId, memo.content);
            });

            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.textContent = '삭제';
            deleteBtn.addEventListener('click', function () {
                deleteMemo(memo.memoId);
            });

            actionsDiv.appendChild(editBtn);
            actionsDiv.appendChild(deleteBtn);

            item.appendChild(textDiv);
            item.appendChild(actionsDiv);

            memoList.appendChild(item);
        });
    }
    function startEditMemo(memoId, content) {
        editingMemoId = memoId;
        document.getElementById('memoContent').value = content;
        document.getElementById('saveMemoBtn').innerText = '수정';
    }
    function deleteMemo(memoId) {
        if (!confirm('메모를 삭제하시겠습니까?')) {
            return;
        }

        fetch(`/student/calendar/${memoId}`, {
            method: 'DELETE'
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('메모 삭제 실패');
                }
                return response.text();
            })
            .then(() => {
                if (editingMemoId === memoId) {
                    editingMemoId = null;
                    document.getElementById('memoContent').value = '';
                    document.getElementById('saveMemoBtn').innerText = '추가';
                }

                loadMemos(selectedDate);
                refreshCalendarEvents();
            })
            .catch(error => {
                console.error(error);
                alert('메모 삭제 중 오류가 발생했습니다.');
            });
    }
