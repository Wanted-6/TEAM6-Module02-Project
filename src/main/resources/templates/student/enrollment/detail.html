<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>강의 상세</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/}" class="text-2xl font-extrabold tracking-tight text-[#2b3f8f]">
            64Lab
        </a>

        <div class="flex items-center gap-3">
            <th:block sec:authorize="isAnonymous()">
                <a th:href="@{/auth/login}"
                   class="rounded-full px-4 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100 hover:text-[#2b3f8f]">
                    로그인
                </a>
                <a th:href="@{/member/signup}"
                   class="rounded-full bg-[#2b3f8f] px-5 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    회원가입
                </a>
            </th:block>

            <th:block sec:authorize="isAuthenticated()">
                <div class="flex items-center gap-3">
                    <div class="h-9 w-9 overflow-hidden rounded-full border border-slate-200 shadow-sm">
                        <th:block th:if="${member != null and member.profile != null and member.profile.profileImage != null and !#strings.isEmpty(member.profile.profileImage)}">
                            <img th:src="@{/uploads/{file}(file=${member.profile.profileImage})}"
                                 class="h-full w-full object-cover"
                                 alt="프로필 이미지"
                                 onerror="this.src='/img/default-profile.png'">
                        </th:block>
                        <th:block th:unless="${member != null and member.profile != null and member.profile.profileImage != null and !#strings.isEmpty(member.profile.profileImage)}">
                            <img th:src="@{/img/default-profile.png}"
                                 class="h-full w-full object-cover"
                                 alt="기본 프로필 이미지">
                        </th:block>
                    </div>

                    <span class="hidden text-sm font-medium text-slate-600 sm:block">
                        <strong class="text-[#2b3f8f]"
                                th:text="${member != null and member.name != null and !#strings.isEmpty(member.name) ? member.name : #authentication.name}">
                            김학생
                        </strong>님, 환영합니다.
                    </span>
                </div>

                <form th:action="@{/auth/logout}" method="post" class="inline">
                    <button type="submit"
                            class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-[#2b3f8f] hover:text-[#2b3f8f]">
                        로그아웃
                    </button>
                </form>
            </th:block>
        </div>
    </div>
</header>

<div class="max-w-5xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">강의 상세</h1>
            <p class="text-slate-500 mt-2">강의 정보를 확인하고 수강신청할 수 있습니다.</p>
        </div>
        <a href="/student/enrollments/courses"
           class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">목록</a>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 space-y-6">
        <div>
            <p class="text-sm text-slate-500 mb-2" th:text="${course.category}">카테고리</p>
            <h2 class="text-2xl font-bold text-slate-900" th:text="${course.title}">강의명</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
            <div class="p-4 rounded-xl bg-slate-50">
                <p class="text-slate-500 mb-1">정원</p>
                <p class="font-medium" th:text="|${course.capacity}명|"></p>
            </div>
            <div class="p-4 rounded-xl bg-slate-50">
                <p class="text-slate-500 mb-1">기간</p>
                <p class="font-medium">
                    <span th:text="${course.startDate}"></span>
                    <span> ~ </span>
                    <span th:text="${course.endDate}"></span>
                </p>
            </div>
        </div>

        <div class="p-4 rounded-xl bg-slate-50">
            <p class="text-slate-500 mb-2">설명</p>
            <p class="leading-7" th:text="${course.description}"></p>
        </div>

        <div class="pt-2">
            <th:block th:if="${enrolled}">
                <span class="px-4 py-2 rounded-lg bg-slate-200 text-slate-600 text-sm">수강중</span>
            </th:block>

            <th:block th:unless="${enrolled}">
                <form th:action="@{/student/enrollments}" method="post" id="detailEnrollForm">
                    <input type="hidden" name="courseId" th:value="${course.courseId}">
                    <button type="button"
                            id="openEnrollModalBtn"
                            class="rounded-lg bg-blue-700 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-800">
                        수강신청
                    </button>
                </form>
            </th:block>

        </div>
    </div>
</div>
<div id="enrollConfirmModal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
    <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-xl">
        <h2 class="mb-4 text-xl font-bold text-slate-900">수강 신청 확인</h2>
        <p class="text-slate-700 leading-7">
            정말 수강 하시겠습니까?<br>
            한 번 신청한 강의는 절대 취소 할 수 없습니다. 신중히 선택해 주세요
        </p>

        <div class="mt-6 flex justify-end gap-3">
            <button type="button"
                    id="cancelEnrollBtn"
                    class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">
                아니오
            </button>
            <button type="button"
                    id="confirmEnrollBtn"
                    class="rounded-lg bg-blue-700 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-800">
                예
            </button>
        </div>
    </div>
</div>
<script>
    const enrollConfirmModal = document.getElementById("enrollConfirmModal");
    const openEnrollModalBtn = document.getElementById("openEnrollModalBtn");
    const confirmEnrollBtn = document.getElementById("confirmEnrollBtn");
    const cancelEnrollBtn = document.getElementById("cancelEnrollBtn");
    const detailEnrollForm = document.getElementById("detailEnrollForm");

    openEnrollModalBtn?.addEventListener("click", () => {
        enrollConfirmModal.classList.remove("hidden");
        enrollConfirmModal.classList.add("flex");
    });

    cancelEnrollBtn?.addEventListener("click", () => {
        enrollConfirmModal.classList.add("hidden");
        enrollConfirmModal.classList.remove("flex");
    });

    confirmEnrollBtn?.addEventListener("click", () => {
        detailEnrollForm?.submit();
    });
</script>
</body>
</html>
