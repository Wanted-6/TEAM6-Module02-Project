<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>강의신청</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="max-w-7xl mx-auto px-6 py-10">

    <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-900">강의신청</h1>
        <p class="text-slate-500 mt-2">신청 가능한 강의를 탐색하고 수강신청하세요.</p>
    </div>

    <div id="successMessage"
         th:if="${successMessage}"
         class="mb-6 rounded-lg bg-green-100 text-green-800 px-4 py-3 shadow-md transition-opacity duration-500"
         th:text="${successMessage}">
    </div>

    <div th:if="${errorMessage}" class="mb-4 rounded-lg bg-red-100 text-red-800 px-4 py-3"
         th:text="${errorMessage}"></div>

    <div class="flex gap-2 mb-8 flex-wrap">
        <a th:href="@{/student/enrollments/courses}"
           class="px-4 py-2 rounded-lg border bg-white hover:bg-slate-100">전체</a>

        <a th:href="@{/student/enrollments/courses(category='Backend')}"
           class="px-4 py-2 rounded-lg border bg-white hover:bg-slate-100">Backend</a>

        <a th:href="@{/student/enrollments/courses(category='Database')}"
           class="px-4 py-2 rounded-lg border bg-white hover:bg-slate-100">Database</a>

        <a th:href="@{/student/enrollments/courses(category='AI')}"
           class="px-4 py-2 rounded-lg border bg-white hover:bg-slate-100">AI</a>

        <a th:href="@{/student/enrollments/courses(category='Infra')}"
           class="px-4 py-2 rounded-lg border bg-white hover:bg-slate-100">Infra</a>

        <a th:href="@{/student/enrollments/courses(category='DevOps')}"
           class="px-4 py-2 rounded-lg border bg-white hover:bg-slate-100">DevOps</a>

        <a th:href="@{/student/enrollments/courses(category='Data')}"
           class="px-4 py-2 rounded-lg border bg-white hover:bg-slate-100">Data</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
        <div th:each="course : ${courseList}" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <div class="flex items-start justify-between mb-4">
                <span class="text-sm text-slate-500" th:text="${course.category}">카테고리</span>
                <span class="px-3 py-1 text-xs rounded-full bg-blue-100 text-blue-700">OPEN</span>
            </div>

            <h2 class="text-xl font-semibold text-slate-900 mb-2" th:text="${course.title}">강의명</h2>
            <p class="text-sm text-slate-700 min-h-[48px]" th:text="${course.description}">설명</p>

            <div class="mt-5 space-y-1 text-sm text-slate-600">
                <p th:text="|정원: ${course.capacity}명|"></p>
                <p th:text="|기간: ${course.startDate} ~ ${course.endDate}|"></p>
            </div>

            <div class="mt-6 flex flex-wrap gap-2 items-center">
                <a th:href="@{/student/enrollments/courses/{courseId}(courseId=${course.courseId})}"
                   class="px-4 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-700 text-sm">
                    강의상세
                </a>

                <th:block th:if="${enrolledCourseIds.contains(course.courseId)}">
                    <span class="px-4 py-2 rounded-lg bg-slate-200 text-slate-600 text-sm">수강중</span>
                </th:block>

                <th:block th:unless="${enrolledCourseIds.contains(course.courseId)}">
                    <form th:action="@{/student/enrollments}" method="post">
                        <input type="hidden" name="courseId" th:value="${course.courseId}">
                        <button type="submit"
                                class="px-4 py-2 rounded-lg bg-blue-700 text-white hover:bg-blue-800 text-sm">
                            수강신청
                        </button>
                    </form>
                </th:block>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(courseList)}"
         class="mt-8 rounded-xl bg-white border border-slate-200 p-8 text-center text-slate-500">
        조회된 강의가 없습니다.
    </div>
</div>
<script>
    const successMessage = document.getElementById("successMessage");

    if (successMessage) {
        setTimeout(() => {
            successMessage.style.opacity = "0";
            setTimeout(() => successMessage.remove(), 500);
        }, 3000);
    }
</script>
</body>
</html>
