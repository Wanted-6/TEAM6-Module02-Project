<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>강의 신청</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/}" class="text-2xl font-extrabold tracking-tight text-[#2b3f8f]">
            64Lab
        </a>

        <div class="flex items-center gap-3">
            <th:block sec:authorize="isAnonymous()">
                <a th:href="@{/auth/login}"
                   class="rounded-full px-4 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100 hover:text-[#2b3f8f]">
                    로그인
                </a>
                <a th:href="@{/member/signup}"
                   class="rounded-full bg-[#2b3f8f] px-5 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    회원가입
                </a>
            </th:block>

            <th:block sec:authorize="isAuthenticated()">
                <div class="flex items-center gap-3">
                    <div class="h-9 w-9 overflow-hidden rounded-full border border-slate-200 shadow-sm">
                        <th:block th:if="${member != null and member.profile != null and member.profile.profileImage != null and !#strings.isEmpty(member.profile.profileImage)}">
                            <img th:src="@{/uploads/{file}(file=${member.profile.profileImage})}"
                                 class="h-full w-full object-cover"
                                 alt="프로필 이미지"
                                 onerror="this.src='/img/default-profile.png'">
                        </th:block>
                        <th:block th:unless="${member != null and member.profile != null and member.profile.profileImage != null and !#strings.isEmpty(member.profile.profileImage)}">
                            <img th:src="@{/img/default-profile.png}"
                                 class="h-full w-full object-cover"
                                 alt="기본 프로필 이미지">
                        </th:block>
                    </div>

                    <span class="hidden text-sm font-medium text-slate-600 sm:block">
                        <strong class="text-[#2b3f8f]"
                                th:text="${member != null and member.name != null and !#strings.isEmpty(member.name) ? member.name : #authentication.name}">
                            김학생
                        </strong>님, 환영합니다.
                    </span>
                </div>

                <form th:action="@{/auth/logout}" method="post" class="inline">
                    <button type="submit"
                            class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-[#2b3f8f] hover:text-[#2b3f8f]">
                        로그아웃
                    </button>
                </form>
            </th:block>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-10">
    <div class="mb-8">
        <a th:href="@{/main}" class="text-5xl font-extrabold tracking-tight text-[#334a9f] transition hover:text-[#223374]">
            64Lab
        </a>
    </div>

    <div class="mb-8 flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">강의 신청</h1>
            <p class="mt-2 text-slate-500">신청 가능한 강의를 검색하고 수강신청해보세요.</p>
        </div>
        <a th:href="@{/main}"
           class="inline-flex items-center justify-center rounded-lg border border-slate-300 bg-white px-5 py-2 text-sm font-semibold text-slate-700 shadow-sm transition hover:bg-slate-100">
            메인페이지
        </a>
    </div>

    <div id="successMessage"
         th:if="${successMessage}"
         class="mb-6 rounded-lg bg-green-100 px-4 py-3 text-green-800 shadow-md transition-opacity duration-500"
         th:text="${successMessage}">
    </div>

    <div th:if="${errorMessage}" class="mb-4 rounded-lg bg-red-100 px-4 py-3 text-red-800"
         th:text="${errorMessage}"></div>

    <form th:action="@{/student/enrollments/courses}" method="get"
          class="mb-8 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
            <div>
                <label for="keyword" class="mb-2 block text-sm font-medium text-slate-700">검색어</label>
                <input id="keyword" type="text" name="keyword" th:value="${keyword}"
                       placeholder="강의명으로 검색"
                       class="w-full rounded-lg border-slate-300">
            </div>
            <div>
                <label for="category" class="mb-2 block text-sm font-medium text-slate-700">카테고리</label>
                <select id="category" name="category" class="w-full rounded-lg border-slate-300">
                    <option value="">전체</option>
                    <option value="Backend" th:selected="${selectedCategory == 'Backend'}">Backend</option>
                    <option value="Database" th:selected="${selectedCategory == 'Database'}">Database</option>
                    <option value="AI" th:selected="${selectedCategory == 'AI'}">AI</option>
                    <option value="Infra" th:selected="${selectedCategory == 'Infra'}">Infra</option>
                    <option value="DevOps" th:selected="${selectedCategory == 'DevOps'}">DevOps</option>
                    <option value="Data" th:selected="${selectedCategory == 'Data'}">Data</option>
                </select>
            </div>
            <div class="flex items-end gap-3">
                <button type="submit"
                        class="rounded-lg bg-slate-900 px-5 py-2 text-sm font-semibold text-white transition hover:bg-slate-700">
                    검색
                </button>
                <a th:href="@{/student/enrollments/courses}"
                   class="rounded-lg border border-slate-300 bg-white px-5 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">
                    초기화
                </a>
            </div>
        </div>
    </form>

    <div class="mb-8 flex flex-wrap gap-2">
        <a th:href="@{/student/enrollments/courses}"
           class="rounded-lg border bg-white px-4 py-2 hover:bg-slate-100">전체</a>

        <a th:href="@{/student/enrollments/courses(category='Backend')}"
           class="rounded-lg border bg-white px-4 py-2 hover:bg-slate-100">Backend</a>

        <a th:href="@{/student/enrollments/courses(category='Database')}"
           class="rounded-lg border bg-white px-4 py-2 hover:bg-slate-100">Database</a>

        <a th:href="@{/student/enrollments/courses(category='AI')}"
           class="rounded-lg border bg-white px-4 py-2 hover:bg-slate-100">AI</a>

        <a th:href="@{/student/enrollments/courses(category='Infra')}"
           class="rounded-lg border bg-white px-4 py-2 hover:bg-slate-100">Infra</a>

        <a th:href="@{/student/enrollments/courses(category='DevOps')}"
           class="rounded-lg border bg-white px-4 py-2 hover:bg-slate-100">DevOps</a>

        <a th:href="@{/student/enrollments/courses(category='Data')}"
           class="rounded-lg border bg-white px-4 py-2 hover:bg-slate-100">Data</a>
    </div>

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3">
        <a th:each="course : ${courseList}"
           th:href="@{/student/enrollments/courses/{courseId}(courseId=${course.courseId})}"
           class="block rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition hover:-translate-y-1 hover:shadow-md">
            <div class="mb-4 flex items-start justify-between">
                <span class="text-sm text-slate-500" th:text="${course.category}">카테고리</span>
                <span class="rounded-full bg-blue-100 px-3 py-1 text-xs text-blue-700">OPEN</span>
            </div>

            <h2 class="mb-2 text-xl font-semibold text-slate-900" th:text="${course.title}">강의명</h2>
            <p class="min-h-[48px] text-sm text-slate-700" th:text="${course.description}">설명</p>

            <div class="mt-5 space-y-1 text-sm text-slate-600">
                <p th:text="|정원: ${course.capacity}명|"></p>
                <p th:text="|기간: ${course.startDate} ~ ${course.endDate}|"></p>
            </div>

            <div class="mt-6 flex items-center justify-between">
                <span class="text-sm font-semibold text-slate-500">클릭해서 상세 보기</span>

                <th:block th:if="${enrolledCourseIds.contains(course.courseId)}">
                    <span class="rounded-lg bg-slate-200 px-4 py-2 text-sm text-slate-600">수강중</span>
                </th:block>
            </div>
        </a>
    </div>


    <div th:if="${#lists.isEmpty(courseList)}"
         class="mt-8 rounded-xl border border-slate-200 bg-white p-8 text-center text-slate-500">
        조회된 강의가 없습니다.
    </div>
</div>

<div id="enrollConfirmModal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
    <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-xl">
        <h2 class="text-xl font-bold text-slate-900 mb-4">수강 신청 확인</h2>
        <p class="text-slate-700 leading-7">
            정말 수강 하시겠습니까?<br>
            한 번 신청한 강의는 절대 취소 할 수 없습니다. 신중히 선택해 주세요
        </p>

        <div class="mt-6 flex justify-end gap-3">
            <button type="button"
                    id="cancelEnrollBtn"
                    class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">
                아니오
            </button>
            <button type="button"
                    id="confirmEnrollBtn"
                    class="rounded-lg bg-blue-700 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-800">
                예
            </button>
        </div>
    </div>
</div>

<script>
    const successMessage = document.getElementById("successMessage");
    const enrollConfirmModal = document.getElementById("enrollConfirmModal");
    const confirmEnrollBtn = document.getElementById("confirmEnrollBtn");
    const cancelEnrollBtn = document.getElementById("cancelEnrollBtn");
    const openEnrollButtons = document.querySelectorAll(".open-enroll-modal");

    let selectedEnrollForm = null;

    if (successMessage) {
        setTimeout(() => {
            successMessage.style.opacity = "0";
            setTimeout(() => successMessage.remove(), 500);
        }, 3000);
    }

    openEnrollButtons.forEach((button) => {
        button.addEventListener("click", () => {
            selectedEnrollForm = button.closest(".enroll-form");
            enrollConfirmModal.classList.remove("hidden");
            enrollConfirmModal.classList.add("flex");
        });
    });

    cancelEnrollBtn.addEventListener("click", () => {
        selectedEnrollForm = null;
        enrollConfirmModal.classList.add("hidden");
        enrollConfirmModal.classList.remove("flex");
    });

    confirmEnrollBtn.addEventListener("click", () => {
        if (selectedEnrollForm) {
            selectedEnrollForm.submit();
        }
    });
</script>
</body>
</html>
