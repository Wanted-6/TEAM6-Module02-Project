<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 코스 상세</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2b3f8f',
                        brandSoft: '#edf2ff',
                        ink: '#1b2540',
                        line: '#dbe3f1',
                        paper: '#f6f8fc'
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(43, 63, 143, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background:
                    radial-gradient(circle at top left, rgba(43, 63, 143, 0.08), transparent 28%),
                    linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%);
        }
    </style>
</head>
<body class="text-ink">
<div class="mx-auto max-w-5xl px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-8 rounded-[28px] border border-white/70 bg-white/90 p-6 shadow-soft">
        <p class="inline-flex rounded-full bg-brandSoft px-4 py-1 text-sm font-semibold text-brand">
            Student Course
        </p>

        <div class="mt-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-ink">코스 상세</h1>
                <p class="mt-2 text-sm leading-6 text-slate-600">수강 중인 코스 정보와 이동 메뉴를 확인합니다.</p>
            </div>

            <div class="flex flex-wrap gap-2">
                <a th:href="@{/main}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    메인
                </a>
                <a href="javascript:history.back()"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    이전
                </a>
                <a th:href="@{/student/courses(memberId=${memberId})}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    내 수강 코스
                </a>
                <a th:href="@{/student/courses/{courseId}/sections(courseId=${course.courseId}, memberId=${memberId})}"
                   class="rounded-full bg-brand px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    섹션 목록
                </a>
            </div>
        </div>
    </div>

    <div class="rounded-[28px] border border-slate-200 bg-white p-8 shadow-sm space-y-6">
        <div>
            <p class="inline-flex rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600"
               th:text="${course.category}">카테고리</p>
            <h2 class="mt-4 text-3xl font-extrabold text-slate-900" th:text="${course.title}">코스명</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
            <div class="rounded-2xl bg-slate-50 p-4">
                <p class="text-slate-500 mb-1">정원</p>
                <p class="font-semibold text-slate-800" th:text="|${course.capacity}명|">30명</p>
            </div>
            <div class="rounded-2xl bg-slate-50 p-4">
                <p class="text-slate-500 mb-1">상태</p>
                <p class="font-semibold text-slate-800" th:text="${course.approvalStatus}">APPROVED</p>
            </div>
        </div>

        <div class="rounded-2xl bg-slate-50 p-5">
            <p class="mb-2 text-sm font-semibold text-slate-500">설명</p>
            <p class="whitespace-pre-line text-slate-800" th:text="${course.description}">코스 설명</p>
        </div>

        <div class="flex flex-wrap gap-3 pt-2">
            <a th:href="@{/student/courses/{courseId}/sections(courseId=${course.courseId}, memberId=${memberId})}"
               class="rounded-full bg-brand px-5 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                섹션 보기
            </a>
        </div>
    </div>
</div>
</body>
</html>
