<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 수강 코스</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="max-w-6xl mx-auto px-6 py-10">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-900">내 수강 코스</h1>
        <p class="text-slate-500 mt-2">신청한 코스 목록입니다.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
        <div th:each="course : ${courseList}" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <h2 class="text-xl font-semibold text-slate-900 mb-2" th:text="${course.title}"></h2>
            <p class="text-sm text-slate-500 mb-3" th:text="${course.category}"></p>
            <p class="text-sm text-slate-700 mb-4" th:text="${course.description}"></p>

            <div class="space-y-1 text-sm text-slate-600">
                <p th:text="|정원: ${course.capacity}명|"></p>
                <p th:text="|상태: ${course.approvalStatus}|"></p>
            </div>

            <div class="mt-5 flex gap-2">
                <a th:href="@{/student/courses/{courseId}(courseId=${course.courseId}, memberId=${memberId})}"
                   class="px-4 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-700 text-sm">상세보기</a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(courseList)}" class="mt-8 rounded-xl bg-white border border-slate-200 p-8 text-center text-slate-500">
        수강 중인 코스가 없습니다.
    </div>
</div>
</body>
</html>
