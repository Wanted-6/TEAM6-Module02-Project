<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수료증</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[radial-gradient(circle_at_top,_#f8fafc,_#e2e8f0)] text-slate-900">
<div class="min-h-screen px-6 py-12">
    <div class="mx-auto flex max-w-5xl justify-end">
        <a th:href="@{/main}"
           class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-bold text-slate-700 transition hover:border-slate-400 hover:bg-slate-50">
            메인으로 돌아가기
        </a>
    </div>

    <div class="mx-auto mt-6 max-w-5xl">
        <div class="overflow-hidden rounded-[36px] border border-[#d7dce5] bg-white shadow-[0_30px_80px_rgba(15,23,42,0.12)]">
            <div class="border-b border-[#e6ebf2] bg-[linear-gradient(135deg,_#eff6ff,_#f8fafc)] px-10 py-8 sm:px-14">
                <p class="text-sm font-bold uppercase tracking-[0.35em] text-[#3157a4]">Certificate</p>
                <h1 class="mt-4 text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl">수료증</h1>
                <p class="mt-4 max-w-2xl text-sm leading-7 text-slate-600 sm:text-base">
                    아래 학생은 LMS 과정의 수료 기준을 충족하여 본 증서를 수여받았습니다.
                </p>
            </div>

            <div class="px-10 py-12 sm:px-14 sm:py-14">
                <div class="text-center">
                    <p class="text-sm font-semibold uppercase tracking-[0.28em] text-slate-400">Awarded To</p>
                    <h2 class="mt-5 text-4xl font-extrabold tracking-[0.08em] text-slate-900 sm:text-5xl"
                        th:text="${certificate.studentName}">
                        홍길동
                    </h2>
                    <div class="mx-auto mt-6 h-px w-48 bg-gradient-to-r from-transparent via-[#3157a4] to-transparent"></div>
                </div>

                <div class="mt-12 rounded-[28px] border border-slate-200 bg-slate-50/70 p-8">
                    <p class="text-center text-base leading-8 text-slate-700 sm:text-lg">
                        <span class="font-bold" th:text="${certificate.studentName}">홍길동</span>
                        학생은
                        <span class="font-bold text-[#1d4ed8]" th:text="${certificate.courseTitle}">Spring Boot 입문</span>
                        과정을 성실히 이수하였으며, 수료 요건을 충족하였기에 본 수료증을 수여합니다.
                    </p>
                </div>

                <div class="mt-10 grid gap-4 md:grid-cols-3">
                    <div class="rounded-2xl border border-slate-200 bg-white px-6 py-5">
                        <p class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400">총점</p>
                        <p class="mt-3 text-2xl font-extrabold text-slate-900"
                           th:text="|${certificate.totalScore}점|">
                            91점
                        </p>
                    </div>

                    <div class="rounded-2xl border border-slate-200 bg-white px-6 py-5">
                        <p class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400">수료 여부</p>
                        <p class="mt-3 text-2xl font-extrabold text-emerald-600">수료</p>
                    </div>

                    <div class="rounded-2xl border border-slate-200 bg-white px-6 py-5">
                        <p class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400">승인일</p>
                        <p class="mt-3 text-lg font-bold text-slate-900"
                           th:text="${#temporals.format(certificate.approvedAt, 'yyyy-MM-dd HH:mm')}">
                            2026-04-17 18:00
                        </p>
                    </div>
                </div>

                <div class="mt-12 flex flex-col gap-3 border-t border-slate-200 pt-8 sm:flex-row sm:items-center sm:justify-between">
                    <div>
                        <p class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400">Status</p>
                        <p class="mt-2 text-sm font-semibold text-slate-700"
                           th:text="|현재 상태: ${certificate.status}|">
                            현재 상태: APPROVED
                        </p>
                    </div>

                    <div class="flex flex-col gap-3 sm:flex-row">
                        <a th:href="@{/student/courses}"
                           class="inline-flex items-center justify-center rounded-2xl border border-slate-300 px-5 py-3 text-sm font-bold text-slate-700 transition hover:border-slate-400 hover:bg-slate-50">
                            내 강의실로 이동
                        </a>
                        <a th:href="@{/student/certificate/download(courseId=${courseId})}"
                           class="inline-flex items-center justify-center rounded-2xl bg-[#2563eb] px-5 py-3 text-sm font-bold text-white transition hover:bg-[#1d4ed8]">
                            PDF 다운로드
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
