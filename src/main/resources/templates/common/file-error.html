<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파일 안내</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2b3f8f',
                        brandSoft: '#edf2ff',
                        ink: '#1b2540'
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(43, 63, 143, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background:
                    radial-gradient(circle at top left, rgba(43, 63, 143, 0.08), transparent 28%),
                    linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%);
        }
    </style>
</head>
<body class="text-ink">
<div class="mx-auto max-w-4xl px-4 py-12 sm:px-6 lg:px-8">
    <div class="rounded-[28px] border border-white/70 bg-white/90 p-8 shadow-soft">
        <p class="inline-flex rounded-full bg-brandSoft px-4 py-1 text-sm font-semibold text-brand">
            File Guide
        </p>

        <h1 class="mt-5 text-3xl font-extrabold tracking-tight text-ink">파일 안내</h1>

        <p class="mt-4 text-base leading-7 text-slate-600"
           th:text="${errorMessage}">
            파일이 아직 등록되지 않았거나 삭제되었습니다.
        </p>

        <div class="mt-8 flex flex-wrap gap-3">
            <a th:href="@{/main}"
               class="rounded-full border border-slate-200 bg-white px-5 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                메인
            </a>
            <a href="javascript:history.back()"
               class="rounded-full bg-brand px-5 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                이전으로
            </a>
        </div>
    </div>
</div>
</body>
</html>
