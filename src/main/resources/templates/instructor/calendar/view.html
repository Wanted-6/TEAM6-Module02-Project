<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>강사 캘린더</title>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

    <style>
        .calendar-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .calendar-area {
            flex: 1;
            min-width: 0;
        }

        .side-panel {
            flex: 0 0 320px;
            min-width: 320px;
            border-left: 1px solid #ddd;
            padding-left: 20px;
        }

        .panel-box {
            margin-bottom: 20px;
        }

        .panel-item {
            margin-bottom: 8px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 6px;
            word-break: break-word;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            resize: vertical;
        }

        button {
            margin-top: 10px;
            padding: 8px 14px;
        }
        /* 오늘 날짜 강조 */
        .fc-day-today {
            background-color: #fff3cd !important; /* 연한 노란색 */
            border: 2px solid #ffc107 !important; /* 강조 테두리 */
        }

        /* 오늘 날짜 숫자 강조 */
        .fc-day-today .fc-daygrid-day-number {
            font-weight: bold;
            color: #d97706;
        }
    </style>
</head>
<body>
<div style="max-width: 1400px; margin: 24px auto 0; padding: 0 16px;">
    <a th:href="@{/main}" style="font-size: 3rem; font-weight: 800; letter-spacing: -0.04em; color: #334a9f; text-decoration: none;">
        64Lab
    </a>
</div>
<h2>📅 강의 일정 캘린더</h2>

<div class="calendar-layout">
    <div class="calendar-area">
        <div id="calendar"></div>
    </div>

    <div class="side-panel">
        <h3 id="selectedDate">날짜를 선택하세요</h3>

        <div class="panel-box">
            <h4>그날 일정</h4>
            <div id="scheduleList">날짜를 클릭하면 일정이 표시됩니다.</div>
        </div>

        <div class="panel-box">
            <h4>메모</h4>
            <div id="memoList">날짜를 클릭하면 메모가 표시됩니다.</div>
        </div>

        <div class="panel-box">
            <h4>메모 추가</h4>
            <textarea id="memoContent" placeholder="메모를 입력하세요"></textarea>
            <button type="button" id="saveMemoBtn">추가</button>
        </div>
    </div>
</div>

<script>
    let allEvents = [];
    let selectedDate = null;
    let calendar = null;

    document.addEventListener('DOMContentLoaded', function () {
        const calendarEl = document.getElementById('calendar');

        fetch('/instructor/calendar/events')
            .then(response => response.json())
            .then(data => {
                allEvents = applyExamDeadlineColors(data);

                calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    locale: 'ko',
                    height: 700,
                    events: allEvents,

                    dateClick: function(info) {
                        selectedDate = info.dateStr;
                        document.getElementById('selectedDate').innerText = selectedDate;

                        renderDayEvents(selectedDate);
                        loadMemos(selectedDate);
                    }
                });

                calendar.render();
            });

        document.getElementById('saveMemoBtn').addEventListener('click', function () {
            saveMemo();
        });
    });

    function renderDayEvents(date) {
        const scheduleList = document.getElementById('scheduleList');
        scheduleList.innerHTML = '';

        const dayEvents = allEvents.filter(event =>
            event.start === date && !event.title.startsWith('[메모]')
        );

        if (dayEvents.length === 0) {
            scheduleList.innerHTML = '<div class="panel-item">일정 없음</div>';
            return;
        }

        dayEvents.forEach(event => {
            scheduleList.innerHTML += `<div class="panel-item">${event.title}</div>`;
        });
    }

    function loadMemos(date) {
        fetch('/instructor/calendar/memos?date=' + date)
            .then(response => response.json())
            .then(data => {
                const memoList = document.getElementById('memoList');
                memoList.innerHTML = '';

                if (data.length === 0) {
                    memoList.innerHTML = '<div class="panel-item">메모 없음</div>';
                    return;
                }

                data.forEach(memo => {
                    memoList.innerHTML += `<div class="panel-item">${memo.content}</div>`;
                });
            });
    }

    function saveMemo() {
        const content = document.getElementById('memoContent').value.trim();

        if (!selectedDate) {
            alert('먼저 날짜를 선택하세요.');
            return;
        }

        if (!content) {
            alert('메모 내용을 입력하세요.');
            return;
        }

        const formData = new URLSearchParams();
        formData.append('content', content);
        formData.append('memoDate', selectedDate);

        fetch('/instructor/calendar', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('메모 저장 실패');
                }
                return response.text();
            })
            .then(() => {
                document.getElementById('memoContent').value = '';

                // ✅ 오늘 날짜 가져오기
                const todayStr = getTodayString();

                // ✅ 과거 날짜 여부에 따라 색상 결정
                const memoColor = selectedDate < todayStr
                    ? '#9ca3af'   // 회색 (과거 일정)
                    : '#C8E6C9';  // 기존 연두색

                const newMemoEvent = {
                    id: 'memo-temp-' + Date.now(),
                    title: '[메모] ' + content,
                    start: selectedDate,
                    color: memoColor
                };

                allEvents.push(newMemoEvent);
                calendar.addEvent(newMemoEvent);

                loadMemos(selectedDate);
                renderDayEvents(selectedDate);
            })
            .catch(error => {
                console.error(error);
                alert('메모 저장 중 오류가 발생했습니다.');
            });
    }
    function renderMemoList(memos) {
        const memoList = document.getElementById('memoList');
        memoList.innerHTML = '';

        if (!memos || memos.length === 0) {
            memoList.innerHTML = '<div class="panel-item">메모 없음</div>';
            return;
        }

        memos.forEach(memo => {
            memoList.innerHTML += `
            <div class="panel-item">
                ${memo.content}
            </div>
        `;
        });
    }
    function refreshCalendarEvents() {
        fetch('/instructor/calendar/events')
            .then(response => response.json())
            .then(data => {
                allEvents = applyExamDeadlineColors(data);

                calendar.removeAllEvents();
                calendar.addEventSource(allEvents);

                renderDayEvents(selectedDate);
                renderDdayList();
            })
            .catch(error => {
                console.error('캘린더 새로고침 오류:', error);
            });
    }
    function getTodayString() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function applyExamDeadlineColors(events) {
        const todayStr = getTodayString();

        return events.map(event => {
            let updatedEvent = { ...event };

            // 기존 색상 유지 (시험 일정 등)
            if (event.title && event.title.includes('시험 마감')) {
                // 기존 로직 유지 – 색상 변경 없음
            }

            // 오늘보다 이전 일정은 회색 처리
            if (event.start < todayStr) {
                updatedEvent.color = '#9ca3af';
            }

            return updatedEvent;
        });
    }
</script>
</body>
</html>
