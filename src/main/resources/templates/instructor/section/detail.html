<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>섹션 상세</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2b3f8f',
                        brandSoft: '#edf2ff',
                        ink: '#1b2540',
                        line: '#dbe3f1'
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(43, 63, 143, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background:
                    radial-gradient(circle at top left, rgba(43, 63, 143, 0.08), transparent 28%),
                    linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%);
        }
    </style>
</head>
<body class="text-ink">

<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/main}" class="text-2xl font-extrabold tracking-tight text-brand">64Lab</a>

        <div class="flex items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="h-9 w-9 overflow-hidden rounded-full border border-slate-200 shadow-sm">
                    <img th:src="${member != null and member.profile != null and member.profile.profileImage != null and member.profile.profileImage != '' ? '/uploads/' + member.profile.profileImage : '/img/default-profile.png'}"
                         class="h-full w-full object-cover"
                         onerror="this.src='/img/default-profile.png'">
                </div>
                <span class="hidden text-sm font-medium text-slate-600 sm:block">
                    <strong class="text-brand"
                            th:text="${member != null and member.name != null ? member.name : #authentication.name}">사용자</strong>님, 환영합니다.
                </span>
            </div>

            <form th:action="@{/auth/logout}" method="post" class="inline">
                <button type="submit"
                        class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    로그아웃
                </button>
            </form>
        </div>
    </div>
</header>

<div class="mx-auto max-w-5xl px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-8 rounded-[28px] border border-white/70 bg-white/90 p-6 shadow-soft">
        <p class="inline-flex rounded-full bg-brandSoft px-4 py-1 text-sm font-semibold text-brand">
            Section Detail
        </p>

        <div class="mt-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-ink">섹션 상세</h1>
                <p class="mt-2 text-sm leading-6 text-slate-600">섹션 상세 정보를 확인합니다.</p>
            </div>

            <div class="flex flex-wrap gap-2">
                <a th:href="@{/main}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    메인
                </a>
                <a href="javascript:history.back()"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    이전
                </a>
                <a th:href="@{/courses/{courseId}(courseId=${section.courseId})}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    코스 상세
                </a>
                <a th:href="@{/courses/{courseId}/sections(courseId=${section.courseId})}"
                   class="rounded-full bg-brand px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    섹션 목록
                </a>
            </div>
        </div>
    </div>

    <div class="rounded-[28px] border border-slate-200 bg-white p-8 shadow-sm space-y-6">
        <div class="flex flex-wrap items-start justify-between gap-3">
            <div>
                <h2 class="text-2xl font-extrabold text-slate-900" th:text="${section.title}">섹션명</h2>
            </div>

            <a th:href="@{/sections/{sectionId}/modify(sectionId=${section.sectionId})}"
               class="rounded-full bg-brand px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                수정
            </a>
        </div>

        <div class="grid grid-cols-1 gap-4 text-sm md:grid-cols-2">
            <div class="rounded-2xl bg-slate-50 p-4">
                <p class="mb-1 text-slate-500">섹션 순서</p>
                <p class="font-semibold text-slate-800" th:text="${section.sectionOrder}"></p>
            </div>

            <div class="rounded-2xl bg-slate-50 p-4">
                <p class="mb-1 text-slate-500">오픈일</p>
                <p class="font-semibold text-slate-800" th:text="${section.openDate}"></p>
            </div>
        </div>

        <div class="rounded-2xl bg-slate-50 p-5">
            <p class="mb-2 text-sm font-semibold text-slate-500">영상 URL</p>
            <p class="break-all text-slate-800" th:text="${section.videoUrl} ?: '등록된 영상이 없습니다.'"></p>
        </div>

        <div class="rounded-2xl bg-slate-50 p-5">
            <p class="mb-2 text-sm font-semibold text-slate-500">자료 파일</p>

            <a th:if="${section.materialFile != null and section.materialFile != ''}"
               th:href="@{/download/section/{fileName}(fileName=${#strings.substring(section.materialFile, section.materialFile.lastIndexOf('/') + 1)})}"
               th:text="${#strings.substring(section.materialFile, section.materialFile.lastIndexOf('/') + 1)}"
               class="font-semibold text-brand hover:underline">
                파일 다운로드
            </a>

            <span th:if="${section.materialFile == null or section.materialFile == ''}"
                  class="text-slate-700">
                등록된 자료가 없습니다.
            </span>
        </div>

        <div class="flex flex-wrap gap-3 pt-2">
            <form th:action="@{/sections/{sectionId}/delete(sectionId=${section.sectionId})}"
                  method="post"
                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                <button type="submit"
                        class="rounded-full bg-red-600 px-5 py-2 text-sm font-semibold text-white transition hover:bg-red-700">
                    삭제
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
