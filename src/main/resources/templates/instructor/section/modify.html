<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>섹션 수정</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="max-w-4xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">섹션 수정</h1>
            <p class="text-slate-500 mt-2">기존 섹션 정보를 수정합니다.</p>
        </div>
        <a th:href="@{/sections/{sectionId}(sectionId=${section.sectionId})}"
           class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">상세</a>
    </div>

    <form th:action="@{/sections/{sectionId}/modify(sectionId=${section.sectionId})}" method="post"
          class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 space-y-6">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium mb-2">섹션 ID</label>
                <input type="text" th:value="${section.sectionId}" class="w-full rounded-lg border-slate-300 bg-slate-100" readonly>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">코스 ID</label>
                <input type="text" th:value="${section.courseId}" class="w-full rounded-lg border-slate-300 bg-slate-100" readonly>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">제목</label>
            <input type="text" name="title" th:value="${section.title}" class="w-full rounded-lg border-slate-300" required>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">영상 URL</label>
            <input type="text" name="videoUrl" th:value="${section.videoUrl}" class="w-full rounded-lg border-slate-300">
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">자료 파일</label>
            <input type="text" name="materialFile" th:value="${section.materialFile}" class="w-full rounded-lg border-slate-300">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium mb-2">섹션 순서</label>
                <input type="number" name="sectionOrder" th:value="${section.sectionOrder}" class="w-full rounded-lg border-slate-300" required>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">오픈일</label>
                <input type="date" name="openDate" th:value="${section.openDate}" class="w-full rounded-lg border-slate-300">
            </div>
        </div>

        <div class="flex justify-end gap-3">
            <a th:href="@{/sections/{sectionId}(sectionId=${section.sectionId})}"
               class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">취소</a>
            <button type="submit" class="px-5 py-2 rounded-lg bg-blue-700 text-white hover:bg-blue-800">수정</button>
        </div>
    </form>
</div>
</body>
</html>
