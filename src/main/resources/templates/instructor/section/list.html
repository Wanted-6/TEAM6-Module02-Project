<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>섹션 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="max-w-6xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">섹션 목록</h1>
            <p class="text-slate-500 mt-2" th:text="|코스 ID ${courseId}의 섹션 목록|"></p>
        </div>
        <div class="flex gap-3">
            <a th:href="@{/courses/{courseId}(courseId=${courseId})}"
               class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">코스 상세</a>
            <a th:href="@{/courses/{courseId}/sections/regist(courseId=${courseId})}"
               class="px-4 py-2 rounded-lg bg-blue-700 text-white hover:bg-blue-800">섹션 등록</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="mb-6 rounded-lg bg-green-100 text-green-800 px-4 py-3" th:text="${successMessage}"></div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-slate-100 text-slate-700">
            <tr>
                <th class="px-4 py-3 text-left">섹션 ID</th>
                <th class="px-4 py-3 text-left">순서</th>
                <th class="px-4 py-3 text-left">제목</th>
                <th class="px-4 py-3 text-left">오픈일</th>
                <th class="px-4 py-3 text-left">자료</th>
                <th class="px-4 py-3 text-left">관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="section : ${sectionList}" class="border-t border-slate-200 hover:bg-slate-50">
                <td class="px-4 py-3" th:text="${section.sectionId}"></td>
                <td class="px-4 py-3" th:text="${section.sectionOrder}"></td>
                <td class="px-4 py-3 font-medium" th:text="${section.title}"></td>
                <td class="px-4 py-3" th:text="${section.openDate}"></td>
                <td class="px-4 py-3" th:text="${section.materialFile} ?: '-'"></td>
                <td class="px-4 py-3">
                    <div class="flex gap-2">
                        <a th:href="@{/sections/{sectionId}(sectionId=${section.sectionId})}"
                           class="px-3 py-1 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">상세</a>
                        <a th:href="@{/sections/{sectionId}/modify(sectionId=${section.sectionId})}"
                           class="px-3 py-1 rounded-lg border border-blue-300 bg-blue-50 text-blue-700 hover:bg-blue-100">수정</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(sectionList)}" class="p-8 text-center text-slate-500">
            등록된 섹션이 없습니다.
        </div>
    </div>
</div>
</body>
</html>
