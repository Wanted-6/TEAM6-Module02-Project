<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>섹션 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2b3f8f',
                        brandSoft: '#edf2ff',
                        ink: '#1b2540',
                        line: '#dbe3f1'
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(43, 63, 143, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background:
                    radial-gradient(circle at top left, rgba(43, 63, 143, 0.08), transparent 28%),
                    linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%);
        }
    </style>
</head>
<body class="text-ink">
<div class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-8 rounded-[28px] border border-white/70 bg-white/90 p-6 shadow-soft">
        <p class="inline-flex rounded-full bg-brandSoft px-4 py-1 text-sm font-semibold text-brand">
            Instructor Section
        </p>

        <div class="mt-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-ink">섹션 목록</h1>
                <p class="mt-2 text-sm leading-6 text-slate-600">코스에 등록된 섹션을 관리합니다.</p>
            </div>

            <div class="flex flex-wrap gap-2">
                <a th:href="@{/main}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    메인
                </a>
                <a href="javascript:history.back()"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    이전
                </a>
                <a th:href="@{/courses/{courseId}(courseId=${courseId})}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    코스 상세
                </a>
                <a th:href="@{/courses/{courseId}/sections/regist(courseId=${courseId})}"
                   class="rounded-full bg-brand px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    섹션 등록
                </a>
            </div>
        </div>
    </div>

    <div th:if="${successMessage}"
         class="mb-6 rounded-2xl border border-green-200 bg-green-50 px-4 py-3 text-green-700"
         th:text="${successMessage}"></div>

    <div class="overflow-hidden rounded-[28px] border border-slate-200 bg-white shadow-sm">
        <table class="w-full text-sm">
            <thead class="bg-slate-100 text-slate-700">
            <tr>
                <th class="px-4 py-3 text-left">순번</th>
                <th class="px-4 py-3 text-left">섹션 순서</th>
                <th class="px-4 py-3 text-left">제목</th>
                <th class="px-4 py-3 text-left">오픈일</th>
                <th class="px-4 py-3 text-left">자료</th>
                <th class="px-4 py-3 text-left">관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="section, stat : ${sectionList}" class="border-t border-slate-200 hover:bg-slate-50">
                <td class="px-4 py-3" th:text="${stat.count}"></td>
                <td class="px-4 py-3" th:text="${section.sectionOrder}"></td>
                <td class="px-4 py-3 font-medium text-slate-900" th:text="${section.title}"></td>
                <td class="px-4 py-3" th:text="${section.openDate}"></td>
                <td class="px-4 py-3" th:text="${section.materialFile} ?: '-'"></td>
                <td class="px-4 py-3">
                    <div class="flex gap-2">
                        <a th:href="@{/sections/{sectionId}(sectionId=${section.sectionId})}"
                           class="rounded-full border border-slate-300 bg-white px-3 py-1 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                            상세
                        </a>
                        <a th:href="@{/sections/{sectionId}/modify(sectionId=${section.sectionId})}"
                           class="rounded-full border border-[#cdd8f6] bg-brandSoft px-3 py-1 text-sm font-semibold text-brand transition hover:bg-[#dfe8ff]">
                            수정
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(sectionList)}" class="p-8 text-center text-slate-500">
            등록된 섹션이 없습니다.
        </div>
    </div>
</div>
</body>
</html>
