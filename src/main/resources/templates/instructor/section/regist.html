<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>섹션 등록</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="max-w-4xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">섹션 등록</h1>
            <p class="text-slate-500 mt-2" th:text="|코스 ID ${courseId}에 새 섹션을 등록합니다.|"></p>
        </div>
        <a th:href="@{/courses/{courseId}/sections(courseId=${courseId})}"
           class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">목록</a>
    </div>

    <form th:action="@{/courses/{courseId}/sections(courseId=${courseId})}" method="post"
          class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 space-y-6">

        <div>
            <label class="block text-sm font-medium mb-2">섹션 ID</label>
            <input type="number" name="sectionId" class="w-full rounded-lg border-slate-300" required>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">제목</label>
            <input type="text" name="title" class="w-full rounded-lg border-slate-300" required>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">영상 URL</label>
            <input type="text" name="videoUrl" class="w-full rounded-lg border-slate-300">
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">자료 파일</label>
            <input type="text" name="materialFile" class="w-full rounded-lg border-slate-300">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium mb-2">섹션 순서</label>
                <input type="number" name="sectionOrder" class="w-full rounded-lg border-slate-300" required>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">오픈일</label>
                <input type="date" name="openDate" class="w-full rounded-lg border-slate-300">
            </div>
        </div>

        <div class="flex justify-end gap-3">
            <a th:href="@{/courses/{courseId}/sections(courseId=${courseId})}"
               class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">취소</a>
            <button type="submit" class="px-5 py-2 rounded-lg bg-blue-700 text-white hover:bg-blue-800">등록</button>
        </div>
    </form>
</div>
</body>
</html>
