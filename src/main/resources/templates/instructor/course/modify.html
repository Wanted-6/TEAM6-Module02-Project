<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코스 수정</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2b3f8f',
                        brandSoft: '#edf2ff',
                        ink: '#1b2540',
                        line: '#dbe3f1'
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(43, 63, 143, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background:
                    radial-gradient(circle at top left, rgba(43, 63, 143, 0.08), transparent 28%),
                    linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%);
        }
    </style>
</head>
<body class="text-ink">
<div class="mx-auto max-w-4xl px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-8 rounded-[28px] border border-white/70 bg-white/90 p-6 shadow-soft">
        <p class="inline-flex rounded-full bg-brandSoft px-4 py-1 text-sm font-semibold text-brand">
            Course Modify
        </p>

        <div class="mt-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-ink">코스 수정</h1>
                <p class="mt-2 text-sm leading-6 text-slate-600">기존 코스 정보를 수정합니다.</p>
            </div>

            <div class="flex flex-wrap gap-2">
                <a th:href="@{/main}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    메인
                </a>
                <a href="javascript:history.back()"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    이전
                </a>
                <a th:href="@{/courses/{courseId}(courseId=${course.courseId}, role='INSTRUCTOR')}"
                   class="rounded-full bg-brand px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    코스 상세
                </a>
            </div>
        </div>
    </div>

    <div th:if="${errorMessage}"
         class="mb-6 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700"
         th:text="${errorMessage}"></div>

    <div th:if="${successMessage}"
         class="mb-6 rounded-2xl border border-green-200 bg-green-50 px-4 py-3 text-green-700"
         th:text="${successMessage}"></div>

    <form th:action="@{/courses/{courseId}/modify(courseId=${course.courseId}, role='INSTRUCTOR')}"
          method="post"
          enctype="multipart/form-data"
          class="rounded-[28px] border border-slate-200 bg-white p-8 shadow-sm space-y-6">

        <input type="hidden" name="instructorLoginId" th:value="${#authentication.name}"/>

        <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">코스명</label>
            <input type="text"
                   name="title"
                   th:value="${course.title}"
                   class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-brand"
                   required>
        </div>

        <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">설명</label>
            <textarea name="description"
                      rows="5"
                      class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-brand"
                      th:text="${course.description}"></textarea>
        </div>

        <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">카테고리</label>
                <select name="category"
                        class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-brand"
                        required>
                    <option value="Backend" th:selected="${course.category == 'Backend'}">Backend</option>
                    <option value="Database" th:selected="${course.category == 'Database'}">Database</option>
                    <option value="AI" th:selected="${course.category == 'AI'}">AI</option>
                    <option value="Infra" th:selected="${course.category == 'Infra'}">Infra</option>
                    <option value="DevOps" th:selected="${course.category == 'DevOps'}">DevOps</option>
                    <option value="Data" th:selected="${course.category == 'Data'}">Data</option>
                </select>
            </div>

            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">코스 썸네일</label>
                <input type="file"
                       name="thumbnailFile"
                       accept="image/*"
                       class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm outline-none transition focus:border-brand">
                <p class="mt-2 text-xs text-slate-500">
                    현재 파일:
                    <span th:text="${course.thumbnailImage != null and !#strings.isEmpty(course.thumbnailImage)} ? ${course.thumbnailImage} : '없음'"></span>
                </p>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-6 md:grid-cols-3">
            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">정원</label>
                <input type="number"
                       name="capacity"
                       th:value="${course.capacity}"
                       class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-brand"
                       required>
            </div>

            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">시작일</label>
                <input type="date"
                       name="startDate"
                       th:value="${course.startDate}"
                       class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-brand"
                       required>
            </div>

            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">종료일</label>
                <input type="date"
                       name="endDate"
                       th:value="${course.endDate}"
                       class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-brand"
                       required>
            </div>
        </div>

        <div class="flex flex-wrap justify-end gap-3 pt-2">
            <a th:href="@{/courses/{courseId}(courseId=${course.courseId}, role='INSTRUCTOR')}"
               class="rounded-full border border-slate-200 bg-white px-5 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                취소
            </a>
            <button type="submit"
                    class="rounded-full bg-brand px-5 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                수정
            </button>
        </div>
    </form>
</div>
</body>
</html>
