<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수강생 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2b3f8f',
                        brandSoft: '#edf2ff',
                        ink: '#1b2540',
                        line: '#dbe3f1'
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(43, 63, 143, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background:
                    radial-gradient(circle at top left, rgba(43, 63, 143, 0.08), transparent 28%),
                    linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%);
        }
    </style>
</head>
<body class="text-ink">
<div class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-8 rounded-[28px] border border-white/70 bg-white/90 p-6 shadow-soft">
        <p class="inline-flex rounded-full bg-brandSoft px-4 py-1 text-sm font-semibold text-brand">
            Course Students
        </p>

        <div class="mt-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-ink">수강생 목록</h1>
                <p class="mt-2 text-sm leading-6 text-slate-600">코스를 수강 중인 학생 목록입니다.</p>
            </div>

            <div class="flex flex-wrap gap-2">
                <a th:href="@{/main}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    메인
                </a>
                <a href="javascript:history.back()"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    이전
                </a>
                <a th:href="@{/courses/{courseId}(courseId=${courseId})}"
                   class="rounded-full bg-brand px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    코스 상세
                </a>
            </div>
        </div>
    </div>

    <div class="overflow-hidden rounded-[28px] border border-slate-200 bg-white shadow-sm">
        <table class="w-full text-sm">
            <thead class="bg-slate-100 text-slate-700">
            <tr>
                <th class="px-4 py-3 text-left">순번</th>
                <th class="px-4 py-3 text-left">이름</th>
                <th class="px-4 py-3 text-left">로그인 ID</th>
                <th class="px-4 py-3 text-left">전화번호</th>
                <th class="px-4 py-3 text-left">이메일</th>
                <th class="px-4 py-3 text-left">상태</th>
                <th class="px-4 py-3 text-left">신청일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student, stat : ${studentList}" class="border-t border-slate-200 hover:bg-slate-50">
                <td class="px-4 py-3" th:text="${stat.count}"></td>
                <td class="px-4 py-3 font-medium text-slate-900" th:text="${student.name}"></td>
                <td class="px-4 py-3" th:text="${student.loginId}"></td>
                <td class="px-4 py-3" th:text="${student.phone}"></td>
                <td class="px-4 py-3" th:text="${student.email}"></td>
                <td class="px-4 py-3" th:text="${student.enrollmentStatus}"></td>
                <td class="px-4 py-3" th:text="${student.enrolledAt}"></td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(studentList)}" class="p-8 text-center text-slate-500">
            등록된 수강생이 없습니다.
        </div>
    </div>
</div>
</body>
</html>
