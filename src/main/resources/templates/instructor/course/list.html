<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코스 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2b3f8f',
                        brandSoft: '#edf2ff',
                        ink: '#1b2540',
                        line: '#dbe3f1',
                        paper: '#f6f8fc'
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(43, 63, 143, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background:
                    radial-gradient(circle at top left, rgba(43, 63, 143, 0.08), transparent 28%),
                    linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%);
        }
    </style>
</head>
<body class="text-ink">
<div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-8 rounded-[28px] border border-white/70 bg-white/90 p-6 shadow-soft">
        <p class="inline-flex rounded-full bg-brandSoft px-4 py-1 text-sm font-semibold text-brand">
            Instructor Course
        </p>

        <div class="mt-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-ink">코스 목록</h1>
                <p class="mt-2 text-sm leading-6 text-slate-600">등록된 코스를 확인하고 상세 화면으로 이동합니다.</p>
            </div>

            <div class="flex flex-wrap gap-2">
                <a th:href="@{/main}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    메인
                </a>
                <a href="javascript:history.back()"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    이전
                </a>
                <a th:if="${role == 'INSTRUCTOR'}"
                   th:href="@{/courses/regist(role='INSTRUCTOR')}"
                   class="rounded-full bg-brand px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    코스 등록
                </a>
            </div>
        </div>
    </div>

    <form action="/courses" method="get" class="mb-6 rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm">
        <input type="hidden" name="role" value="INSTRUCTOR">

        <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">검색어</label>
                <input type="text"
                       name="keyword"
                       th:value="${keyword}"
                       placeholder="코스명 검색"
                       class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-brand">
            </div>

            <div>
                <label class="mb-2 block text-sm font-semibold text-slate-700">카테고리</label>
                <select name="category"
                        class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-brand">
                    <option value="">전체</option>
                    <option value="Backend" th:selected="${category == 'Backend'}">Backend</option>
                    <option value="Database" th:selected="${category == 'Database'}">Database</option>
                    <option value="AI" th:selected="${category == 'AI'}">AI</option>
                    <option value="Infra" th:selected="${category == 'Infra'}">Infra</option>
                    <option value="DevOps" th:selected="${category == 'DevOps'}">DevOps</option>
                    <option value="Data" th:selected="${category == 'Data'}">Data</option>
                </select>
            </div>

            <div class="flex items-end gap-3">
                <button type="submit"
                        class="rounded-full bg-brand px-5 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    검색
                </button>
                <a th:href="@{/courses(role='INSTRUCTOR')}"
                   class="rounded-full border border-slate-200 bg-white px-5 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    초기화
                </a>
            </div>
        </div>
    </form>

    <div class="mb-8 flex flex-wrap gap-3">
        <a th:href="@{/courses(role='INSTRUCTOR')}"
           class="rounded-full border px-5 py-2 text-sm font-semibold transition"
           th:classappend="${category == null or category == ''} ? ' border-brand bg-brand text-white' : ' border-slate-300 bg-white text-slate-700 hover:border-brand hover:text-brand'">
            전체
        </a>

        <a th:href="@{/courses(role='INSTRUCTOR', category='Backend')}"
           class="rounded-full border px-5 py-2 text-sm font-semibold transition"
           th:classappend="${category == 'Backend'} ? ' border-brand bg-brand text-white' : ' border-slate-300 bg-white text-slate-700 hover:border-brand hover:text-brand'">
            Backend
        </a>

        <a th:href="@{/courses(role='INSTRUCTOR', category='Database')}"
           class="rounded-full border px-5 py-2 text-sm font-semibold transition"
           th:classappend="${category == 'Database'} ? ' border-brand bg-brand text-white' : ' border-slate-300 bg-white text-slate-700 hover:border-brand hover:text-brand'">
            Database
        </a>

        <a th:href="@{/courses(role='INSTRUCTOR', category='AI')}"
           class="rounded-full border px-5 py-2 text-sm font-semibold transition"
           th:classappend="${category == 'AI'} ? ' border-brand bg-brand text-white' : ' border-slate-300 bg-white text-slate-700 hover:border-brand hover:text-brand'">
            AI
        </a>

        <a th:href="@{/courses(role='INSTRUCTOR', category='Infra')}"
           class="rounded-full border px-5 py-2 text-sm font-semibold transition"
           th:classappend="${category == 'Infra'} ? ' border-brand bg-brand text-white' : ' border-slate-300 bg-white text-slate-700 hover:border-brand hover:text-brand'">
            Infra
        </a>

        <a th:href="@{/courses(role='INSTRUCTOR', category='DevOps')}"
           class="rounded-full border px-5 py-2 text-sm font-semibold transition"
           th:classappend="${category == 'DevOps'} ? ' border-brand bg-brand text-white' : ' border-slate-300 bg-white text-slate-700 hover:border-brand hover:text-brand'">
            DevOps
        </a>

        <a th:href="@{/courses(role='INSTRUCTOR', category='Data')}"
           class="rounded-full border px-5 py-2 text-sm font-semibold transition"
           th:classappend="${category == 'Data'} ? ' border-brand bg-brand text-white' : ' border-slate-300 bg-white text-slate-700 hover:border-brand hover:text-brand'">
            Data
        </a>
    </div>

    <div th:if="${errorMessage}"
         class="mb-6 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700"
         th:text="${errorMessage}"></div>

    <div th:if="${successMessage}"
         class="mb-6 rounded-2xl border border-green-200 bg-green-50 px-4 py-3 text-green-700"
         th:text="${successMessage}"></div>

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3">
        <a th:each="course : ${courseList}"
           th:href="@{/courses/{courseId}(courseId=${course.courseId}, role='INSTRUCTOR')}"
           class="block overflow-hidden rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm transition hover:-translate-y-1 hover:border-brand hover:shadow-lg">

            <div class="mb-4 flex items-start justify-end">
                <div class="flex flex-col items-end gap-2">
                    <span class="rounded-full px-3 py-1 text-xs font-semibold"
                          th:classappend="${course.isOpen} ? ' bg-blue-100 text-blue-700' : ' bg-slate-200 text-slate-600'"
                          th:text="${course.isOpen} ? 'OPEN' : 'CLOSED'"></span>

                    <span class="rounded-full bg-amber-100 px-3 py-1 text-xs font-semibold text-amber-700"
                          th:text="${course.approvalStatus} ?: 'PENDING'"></span>
                </div>
            </div>

            <div class="mb-5 overflow-hidden rounded-[20px] border border-slate-200 bg-slate-100">
                <img th:if="${course.thumbnailImage != null and !#strings.isEmpty(course.thumbnailImage)}"
                     th:src="@{|/${course.thumbnailImage}|}"
                     alt="코스 썸네일"
                     class="h-48 w-full object-cover">

                <div th:unless="${course.thumbnailImage != null and !#strings.isEmpty(course.thumbnailImage)}"
                     class="flex h-48 w-full items-center justify-center text-sm text-slate-400">
                    등록된 썸네일이 없습니다.
                </div>
            </div>

            <p class="text-sm font-semibold text-slate-500" th:text="${course.category}">카테고리</p>
            <h2 class="mt-2 text-xl font-extrabold text-slate-900" th:text="${course.title}">코스명</h2>
            <p class="mt-3 min-h-[48px] text-sm leading-6 text-slate-600" th:text="${course.description}">설명</p>
        </a>
    </div>

    <div th:if="${#lists.isEmpty(courseList)}"
         class="mt-8 rounded-[28px] border border-dashed border-slate-300 bg-white px-8 py-16 text-center text-slate-500">
        조회된 코스가 없습니다.
    </div>
</div>
</body>
</html>
