<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코스 상세</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2b3f8f',
                        brandSoft: '#edf2ff',
                        ink: '#1b2540',
                        line: '#dbe3f1',
                        paper: '#f6f8fc'
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(43, 63, 143, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background:
                    radial-gradient(circle at top left, rgba(43, 63, 143, 0.08), transparent 28%),
                    linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%);
        }
    </style>
</head>
<body class="text-ink">

<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/main}" class="text-2xl font-extrabold tracking-tight text-brand">64Lab</a>

        <div class="flex items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="h-9 w-9 overflow-hidden rounded-full border border-slate-200 shadow-sm">
                    <img th:src="${member != null and member.profile != null and member.profile.profileImage != null and member.profile.profileImage != '' ? '/uploads/' + member.profile.profileImage : '/img/default-profile.png'}"
                         class="h-full w-full object-cover"
                         onerror="this.src='/img/default-profile.png'">
                </div>
                <span class="hidden text-sm font-medium text-slate-600 sm:block">
                    <strong class="text-brand"
                            th:text="${member != null and member.name != null ? member.name : #authentication.name}">사용자</strong>님, 환영합니다.
                </span>
            </div>

            <form th:action="@{/auth/logout}" method="post" class="inline">
                <button type="submit"
                        class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    로그아웃
                </button>
            </form>
        </div>
    </div>
</header>

<div class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-8 rounded-[28px] border border-white/70 bg-white/90 p-6 shadow-soft">
        <p class="inline-flex rounded-full bg-brandSoft px-4 py-1 text-sm font-semibold text-brand">
            Instructor Course
        </p>

        <div class="mt-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-ink">코스 상세</h1>
                <p class="mt-2 text-sm leading-6 text-slate-600">코스 정보와 관리 기능을 확인합니다.</p>
            </div>

            <div class="flex flex-wrap gap-2">
                <a th:href="@{/main}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    메인
                </a>
                <a href="javascript:history.back()"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    이전
                </a>
                <a th:href="@{/courses}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    코스 목록
                </a>
                <a th:href="@{/courses/{courseId}/students(courseId=${course.courseId})}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    수강생 목록
                </a>
            </div>
        </div>
    </div>

    <div th:if="${errorMessage}"
         class="mb-6 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700"
         th:text="${errorMessage}"></div>

    <div th:if="${successMessage}"
         class="mb-6 rounded-2xl border border-green-200 bg-green-50 px-4 py-3 text-green-700"
         th:text="${successMessage}"></div>

    <div class="rounded-[28px] border border-slate-200 bg-white overflow-hidden shadow-sm">
        <div class="p-8 space-y-8">

            <div class="grid grid-cols-1 lg:grid-cols-[360px_1fr] gap-8">
                <div class="overflow-hidden rounded-[24px] border border-slate-200 bg-slate-100">
                    <img th:if="${course.thumbnailImage != null and !#strings.isEmpty(course.thumbnailImage)}"
                         th:src="@{|/${course.thumbnailImage}|}"
                         alt="코스 썸네일"
                         class="w-full h-72 object-cover">

                    <div th:unless="${course.thumbnailImage != null and !#strings.isEmpty(course.thumbnailImage)}"
                         class="flex h-72 w-full items-center justify-center text-sm text-slate-400">
                        등록된 썸네일이 없습니다.
                    </div>
                </div>

                <div class="space-y-5">
                    <div class="flex flex-wrap gap-2">
                        <span class="rounded-full px-3 py-1 text-xs font-semibold"
                              th:classappend="${course.isOpen} ? ' bg-blue-100 text-blue-700' : ' bg-slate-200 text-slate-600'"
                              th:text="${course.isOpen} ? 'OPEN' : 'CLOSED'">
                        </span>

                        <span class="rounded-full bg-amber-100 px-3 py-1 text-xs font-semibold text-amber-700"
                              th:text="${course.approvalStatus} ?: 'PENDING'">
                        </span>
                    </div>

                    <div>
                        <p class="text-sm font-semibold text-slate-500" th:text="${course.category}">카테고리</p>
                        <h2 class="mt-2 text-3xl font-extrabold text-slate-900" th:text="${course.title}">코스명</h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        <div class="rounded-2xl bg-slate-50 p-4">
                            <p class="text-slate-500 mb-1">정원</p>
                            <p class="font-semibold text-slate-800" th:text="|${course.capacity}명|">30명</p>
                        </div>

                        <div class="rounded-2xl bg-slate-50 p-4">
                            <p class="text-slate-500 mb-1">공개 여부</p>
                            <p class="font-semibold text-slate-800" th:text="${course.isOpen} ? 'OPEN' : 'CLOSED'">CLOSED</p>
                        </div>

                        <div class="rounded-2xl bg-slate-50 p-4">
                            <p class="text-slate-500 mb-1">시작일</p>
                            <p class="font-semibold text-slate-800" th:text="${course.startDate}">2026-04-01</p>
                        </div>

                        <div class="rounded-2xl bg-slate-50 p-4">
                            <p class="text-slate-500 mb-1">종료일</p>
                            <p class="font-semibold text-slate-800" th:text="${course.endDate}">2026-06-30</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="rounded-2xl bg-slate-50 p-5">
                <p class="mb-2 text-sm font-semibold text-slate-500">코스 설명</p>
                <p class="whitespace-pre-line text-slate-800" th:text="${course.description}">코스 설명</p>
            </div>

            <div class="flex flex-wrap gap-3 pt-2">
                <a th:href="@{/courses/{courseId}/modify(courseId=${course.courseId})}"
                   class="rounded-full bg-brand px-5 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    수정
                </a>

                <a th:href="@{/courses/{courseId}/sections(courseId=${course.courseId})}"
                   class="rounded-full border border-[#cdd8f6] bg-brandSoft px-5 py-2 text-sm font-semibold text-brand transition hover:bg-[#dfe8ff]">
                    섹션 관리
                </a>

                <a th:if="${hasAssignment}"
                   th:href="@{/courses/{courseId}/assignment(courseId=${course.courseId})}"
                   class="rounded-full border border-emerald-300 bg-emerald-50 px-5 py-2 text-sm font-semibold text-emerald-700 transition hover:bg-emerald-100">
                    과제 상세
                </a>

                <a th:unless="${hasAssignment}"
                   th:href="@{/courses/{courseId}/assignment/regist(courseId=${course.courseId})}"
                   class="rounded-full border border-emerald-300 bg-emerald-50 px-5 py-2 text-sm font-semibold text-emerald-700 transition hover:bg-emerald-100">
                    과제 등록
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
