<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의 코스 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f6f7fb] text-slate-900">
<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/}" class="text-2xl font-extrabold tracking-tight text-[#2b3f8f]">
            64Lab
        </a>

        <div class="flex items-center gap-3">
            <th:block sec:authorize="isAnonymous()">
                <a th:href="@{/auth/login}"
                   class="rounded-full px-4 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100 hover:text-[#2b3f8f]">
                    로그인
                </a>
                <a th:href="@{/member/signup}"
                   class="rounded-full bg-[#2b3f8f] px-5 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    회원가입
                </a>
            </th:block>

            <th:block sec:authorize="isAuthenticated()">
                <div class="flex items-center gap-3">
                    <div class="h-9 w-9 overflow-hidden rounded-full border border-slate-200 shadow-sm">
                        <th:block th:if="${member != null and member.profile != null and member.profile.profileImage != null and !#strings.isEmpty(member.profile.profileImage)}">
                            <img th:src="@{/uploads/{file}(file=${member.profile.profileImage})}"
                                 class="h-full w-full object-cover"
                                 alt="프로필 이미지"
                                 onerror="this.src='/img/default-profile.png'">
                        </th:block>
                        <th:block th:unless="${member != null and member.profile != null and member.profile.profileImage != null and !#strings.isEmpty(member.profile.profileImage)}">
                            <img th:src="@{/img/default-profile.png}"
                                 class="h-full w-full object-cover"
                                 alt="기본 프로필 이미지">
                        </th:block>
                    </div>

                    <span class="hidden text-sm font-medium text-slate-600 sm:block">
                        <strong class="text-[#2b3f8f]"
                                th:text="${member != null and member.name != null and !#strings.isEmpty(member.name) ? member.name : #authentication.name}">
                            김학생
                        </strong>님, 환영합니다.
                    </span>
                </div>

                <form th:action="@{/auth/logout}" method="post" class="inline">
                    <button type="submit"
                            class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-[#2b3f8f] hover:text-[#2b3f8f]">
                        로그아웃
                    </button>
                </form>
            </th:block>
        </div>
    </div>
</header>

<div class="min-h-screen">
    <div class="mx-auto max-w-7xl px-6 py-10">
        <div class="mb-8">
            <a th:href="@{/main}" class="text-5xl font-extrabold tracking-tight text-[#334a9f] transition hover:text-[#223374]">
                64Lab
            </a>
        </div>
        <div class="mb-10 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
            <div>
                <p class="text-sm font-bold uppercase tracking-[0.25em] text-[#5b63b7]">담당 강의 목록</p>
                <h1 class="mt-3 text-4xl font-extrabold tracking-tight">담당 코스 목록</h1>
                <p class="mt-3 max-w-2xl text-sm leading-6 text-slate-600">관리할 코스를 선택하면 해당 코스의 성적 목록과 학생 관리 화면으로 이어진다.</p>
            </div>
            <a th:href="@{/main}" class="inline-flex items-center rounded-2xl bg-[#334155] px-5 py-3 text-sm font-bold text-white transition hover:bg-[#1f2937]">
                메인으로 돌아가기
            </a>
        </div>

        <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3" th:if="${courseList != null and !#lists.isEmpty(courseList)}">
            <a th:each="course : ${courseList}"
               th:href="@{/instructor/grades(courseId=${course.courseId})}"
               class="group overflow-hidden rounded-[28px] border border-slate-200 bg-white shadow-sm transition hover:-translate-y-1 hover:shadow-xl">
                <div class="h-44 bg-gradient-to-br from-[#dbeafe] via-[#eff6ff] to-[#c7d2fe]"></div>
                <div class="p-6">
                    <div class="mb-4 flex items-center justify-between gap-3">
                        <span class="rounded-full bg-[#eef2ff] px-3 py-1 text-xs font-bold text-[#4f46e5]"
                              th:text="${course.category} ?: '코스'">코스</span>
                        <span class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400"
                              th:text="${course.approvalStatus}">승인됨</span>
                    </div>

                    <h2 class="text-2xl font-extrabold leading-tight" th:text="${course.title}">Spring Boot 입문</h2>
                    <p class="mt-3 line-clamp-3 text-sm leading-6 text-slate-600" th:text="${course.description}">코스 설명</p>

                    <div class="mt-6 grid grid-cols-2 gap-3 text-sm text-slate-600">
                        <div class="rounded-2xl bg-slate-50 px-4 py-3">
                            <p class="text-xs font-bold uppercase tracking-[0.18em] text-slate-400">시작일</p>
                            <p class="mt-2 font-semibold text-slate-800" th:text="${course.startDate}">2026-03-10</p>
                        </div>
                        <div class="rounded-2xl bg-slate-50 px-4 py-3">
                            <p class="text-xs font-bold uppercase tracking-[0.18em] text-slate-400">종료일</p>
                            <p class="mt-2 font-semibold text-slate-800" th:text="${course.endDate}">2026-04-14</p>
                        </div>
                    </div>

                    <div class="mt-6 flex items-center justify-between">
                        <p class="text-sm font-semibold text-slate-500" th:text="|정원 ${course.capacity}명|">정원 30명</p>
                        <span class="inline-flex items-center rounded-2xl bg-[#1d4ed8] px-4 py-2 text-sm font-bold text-white transition group-hover:bg-[#1e40af]">
                            성적 관리
                        </span>
                    </div>
                </div>
            </a>
        </div>

        <div th:if="${courseList == null or #lists.isEmpty(courseList)}"
             class="rounded-[28px] border border-dashed border-slate-300 bg-white px-8 py-20 text-center text-slate-500">
            <p class="text-lg font-bold text-slate-700">담당 중인 코스가 없습니다.</p>
            <p class="mt-3 text-sm">코스가 승인되면 이 화면에서 바로 학생 관리로 이동할 수 있다.</p>
        </div>
    </div>
</div>
</body>
</html>
