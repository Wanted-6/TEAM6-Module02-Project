<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>학생 명단 및 관리</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            color: #222;
        }

        .page-wrapper {
            max-width: 1600px;
            margin: 0 auto;
            padding: 32px 24px 48px;
        }

        .page-title {
            margin: 0 0 8px;
            font-size: 32px;
        }

        .page-desc {
            margin: 0 0 24px;
            color: #666;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .course-badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background-color: #e8f0ff;
            color: #1d4ed8;
            font-weight: bold;
        }

        .table-wrapper {
            overflow-x: auto;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1350px;
        }

        th, td {
            border: 1px solid #e1e1e1;
            padding: 12px;
            text-align: center;
            vertical-align: middle;
        }

        th {
            background-color: #f8fafc;
            font-size: 14px;
            white-space: nowrap;
        }

        td {
            background-color: #fff;
            font-size: 14px;
        }

        .student-col {
            min-width: 120px;
            font-weight: bold;
        }

        .email-col {
            min-width: 200px;
        }

        .summary-col {
            min-width: 180px;
        }

        .score-col {
            min-width: 100px;
        }

        .section-box {
            min-width: 150px;
        }

        .attendance-select {
            width: 100%;
            min-width: 120px;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
        }

        .status-present {
            background-color: #e8f7ec;
            color: #166534;
        }

        .status-late {
            background-color: #fff7db;
            color: #a16207;
        }

        .status-absent {
            background-color: #fdecec;
            color: #b91c1c;
        }

        .empty-message {
            padding: 24px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/}" class="text-2xl font-extrabold tracking-tight text-[#2b3f8f]">
            64Lab
        </a>

        <div class="flex items-center gap-3">
            <th:block sec:authorize="isAnonymous()">
                <a th:href="@{/auth/login}"
                   class="rounded-full px-4 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100 hover:text-[#2b3f8f]">
                    로그인
                </a>
                <a th:href="@{/member/signup}"
                   class="rounded-full bg-[#2b3f8f] px-5 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    회원가입
                </a>
            </th:block>

            <th:block sec:authorize="isAuthenticated()">
                <div class="flex items-center gap-3">
                    <div class="h-9 w-9 overflow-hidden rounded-full border border-slate-200 shadow-sm">
                        <th:block th:if="${member != null and member.profile != null and member.profile.profileImage != null and !#strings.isEmpty(member.profile.profileImage)}">
                            <img th:src="@{/uploads/{file}(file=${member.profile.profileImage})}"
                                 class="h-full w-full object-cover"
                                 alt="프로필 이미지"
                                 onerror="this.src='/img/default-profile.png'">
                        </th:block>
                        <th:block th:unless="${member != null and member.profile != null and member.profile.profileImage != null and !#strings.isEmpty(member.profile.profileImage)}">
                            <img th:src="@{/img/default-profile.png}"
                                 class="h-full w-full object-cover"
                                 alt="기본 프로필 이미지">
                        </th:block>
                    </div>

                    <span class="hidden text-sm font-medium text-slate-600 sm:block">
                        <strong class="text-[#2b3f8f]"
                                th:text="${member != null and member.name != null and !#strings.isEmpty(member.name) ? member.name : #authentication.name}">
                            김학생
                        </strong>님, 환영합니다.
                    </span>
                </div>

                <form th:action="@{/auth/logout}" method="post" class="inline">
                    <button type="submit"
                            class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-[#2b3f8f] hover:text-[#2b3f8f]">
                        로그아웃
                    </button>
                </form>
            </th:block>
        </div>
    </div>
</header>

<div class="page-wrapper">
    <div class="top-bar">
        <div>
            <h1 class="page-title">학생 명단 및 관리</h1>
            <p class="page-desc">한 화면에서 학생 성적과 섹션별 출결 상태를 확인할 수 있다.</p>
        </div>
        <div class="course-badge" th:text="|코스 ID: ${courseId}|">코스 ID: 1</div>
    </div>

    <div class="table-wrapper" th:if="${studentList != null and !#lists.isEmpty(studentList)}">
        <table>
            <thead>
            <tr>
                <th class="student-col">학생 이름</th>
                <th class="email-col">이메일</th>
                <th>진도율</th>
                <th class="summary-col">출결 요약</th>
                <th class="score-col">과제 점수</th>
                <th class="score-col">시험 점수</th>
                <th class="score-col">태도 점수</th>
                <th th:each="section : ${studentList[0].sectionAttendanceList}"
                    class="section-box"
                    th:text="${section.sectionTitle}">
                    섹션명
                </th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student : ${studentList}">
                <td class="student-col" th:text="${student.studentName}">김학생</td>
                <td class="email-col" th:text="${student.email}">student@test.com</td>
                <td th:text="|${student.progressRate}%|">50%</td>
                <td class="summary-col" th:text="${student.attendanceSummary}">출석 3 / 지각 1 / 결석 0</td>
                <td class="score-col" th:text="${student.assignmentScore}">95.0</td>
                <td class="score-col" th:text="${student.examScore}">88.0</td>
                <td class="score-col" th:text="${student.attitudeScore}">92.0</td>
                <td th:each="sectionAttendance : ${student.sectionAttendanceList}" class="section-box">
                    <select class="attendance-select"
                            th:classappend="${sectionAttendance.status == 'PRESENT'} ? ' status-present' :
                                            (${sectionAttendance.status == 'LATE'} ? ' status-late' : ' status-absent')">
                        <option value="PRESENT" th:selected="${sectionAttendance.status == 'PRESENT'}">출석</option>
                        <option value="LATE" th:selected="${sectionAttendance.status == 'LATE'}">지각</option>
                        <option value="ABSENT" th:selected="${sectionAttendance.status == 'ABSENT'}">결석</option>
                    </select>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="table-wrapper" th:if="${studentList == null or #lists.isEmpty(studentList)}">
        <div class="empty-message">수강 중인 학생이 없습니다.</div>
    </div>
</div>
</body>
</html>
