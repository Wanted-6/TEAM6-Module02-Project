<!DOCTYPE html>
<html class="light" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>로그인 | Intellectual Atelier</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#b6c4ff",
                        "surface-tint": "#4059aa",
                        "on-surface": "#191c1e",
                        "on-tertiary-container": "#f39461",
                        "on-background": "#191c1e",
                        "surface-dim": "#d9dadc",
                        "primary-fixed": "#dce1ff",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#1e3a8a",
                        "on-surface-variant": "#444651",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "outline": "#757682",
                        "on-tertiary-fixed": "#341100",
                        "on-secondary-fixed": "#111a37",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#ffb691",
                        "secondary": "#555d7e",
                        "outline-variant": "#c5c5d3",
                        "error": "#ba1a1a",
                        "surface-bright": "#f8f9fb",
                        "secondary-fixed-dim": "#bdc5eb",
                        "on-primary-fixed-variant": "#264191",
                        "surface-container": "#edeef0",
                        "on-primary-fixed": "#00164e",
                        "inverse-on-surface": "#f0f1f3",
                        "on-secondary-fixed-variant": "#3d4565",
                        "tertiary-container": "#6e2c00",
                        "secondary-container": "#d0d8ff",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "background": "#f8f9fb",
                        "inverse-primary": "#b6c4ff",
                        "surface-container-low": "#f3f4f6",
                        "surface": "#f8f9fb",
                        "surface-variant": "#e1e2e4",
                        "tertiary-fixed": "#ffdbcb",
                        "on-tertiary-fixed-variant": "#773205",
                        "on-secondary-container": "#555e7f",
                        "secondary-fixed": "#dce1ff",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e1e2e4",
                        "on-primary-container": "#90a8ff",
                        "surface-container-high": "#e7e8ea",
                        "primary": "#00236f",
                        "tertiary": "#4b1c00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-[440px]">

    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-30 h-16 rounded-2xl bg-gradient-to-br from-primary to-primary-container mb-6 shadow-sm">
            <span class="material-symbols-outlined text-on-primary text-4xl" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tight text-primary mb-2">Intellectual Atelier</h1>
        <p class="text-on-surface-variant font-medium">Editorial-First Learning Management System</p>
    </div>

    <div class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0_12px_32px_-4px_rgba(25,28,30,0.06)]">

        <div th:if="${param.error}" class="mb-6 p-4 rounded-lg bg-error-container border border-error/20 flex items-center gap-3">
            <span class="material-symbols-outlined text-on-error-container text-[20px]">🚨</span>
            <p class="text-sm font-semibold text-on-error-container">
                <span th:if="${param.error[0] == 'pending'}">승인 대기 중입니다.</span>
                <span th:if="${param.error[0] == 'rejected'}">신청이 반려되었습니다. 다시 신청해주세요.</span>
                <span th:unless="${param.error[0] == 'pending' or param.error[0] == 'rejected'}">아이디 또는 비밀번호가 올바르지 않습니다.</span>
            </p>
        </div>

        <form th:action="@{/auth/login}" method="POST" class="space-y-6">

            <div class="space-y-2">
                <label class="block text-sm font-semibold text-on-surface tracking-tight" for="memberId">아이디</label>
                <div class="relative group">
                    <input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-0 rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all text-sm"
                           id="memberId" name="memberId" placeholder="아이디를 입력하세요" required="required" type="text" autofocus="autofocus"/>
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-semibold text-on-surface tracking-tight" for="pass">비밀번호</label>
                <div class="relative group">
                    <input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-0 rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all text-sm"
                           id="pass" name="pass" placeholder="비밀번호를 입력하세요" required="required" type="password"/>
                </div>
            </div>

            <button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-4 rounded-lg shadow-sm hover:opacity-95 active:scale-[0.98] transition-all duration-200" type="submit">
                로그인
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-on-surface-variant font-medium space-x-3">
            <nav class="flex items-center justify-center space-x-4 text-sm font-medium text-on-surface-variant">
                <a th:href="@{/auth/find-id}" class="hover:text-primary transition-colors">아이디 찾기</a>
                <span class="text-outline-variant">•</span>
                <a th:href="@{/auth/find-pw}" class="hover:text-primary transition-colors">비밀번호 찾기</a>
                <span class="text-outline-variant">•</span>
                <a th:href="@{/member/signup}" class="text-primary font-bold hover:underline decoration-2 underline-offset-4">회원가입</a>
            </nav>
        </div>
    </div>

    <footer class="mt-8 text-center">
        <p class="text-xs text-outline uppercase tracking-widest font-medium">
            © 2026 The Intellectual Atelier. Academic Sanctuary.
        </p>
    </footer>
</main>

<div class="fixed -z-10 top-0 right-0 w-1/3 h-1/2 bg-gradient-to-bl from-primary-fixed/20 to-transparent blur-3xl pointer-events-none"></div>
<div class="fixed -z-10 bottom-0 left-0 w-1/3 h-1/2 bg-gradient-to-tr from-tertiary-fixed/10 to-transparent blur-3xl pointer-events-none"></div>
</body>
</html>
