<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>64Lab | 로그인</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        headline: ['Manrope', 'sans-serif'],
                        body: ['Noto Sans KR', 'sans-serif']
                    },
                    colors: {
                        brand: '#2b3f8f',
                        brandSoft: '#edf2ff',
                        ink: '#1b2540',
                        line: '#dbe3f1',
                        paper: '#f6f8fc'
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(43, 63, 143, 0.08)'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex min-h-screen flex-col text-ink">

<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/}" class="font-headline text-2xl font-extrabold tracking-tight text-brand">64Lab</a>
        <div class="flex items-center gap-3">
            <a th:href="@{/member/signup}" class="rounded-full bg-brand px-5 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                회원가입
            </a>
        </div>
    </div>
</header>

<main class="flex flex-1 items-center justify-center p-6">
    <div class="w-full max-w-md rounded-[40px] bg-white p-10 shadow-soft border border-line/50">

        <div class="mb-10 text-center">
            <a th:href="@{/}" class="font-headline text-3xl font-extrabold tracking-tight text-brand">64Lab</a>
            <p class="mt-4 font-medium text-slate-500">스파르타식 학습 관리 플랫폼</p>
        </div>

        <div th:if="${param.error}" class="mb-6 flex items-start gap-3 rounded-2xl border border-red-200 bg-red-50 p-4">
            <span class="material-symbols-outlined text-red-500">error</span>
            <div class="text-sm font-bold text-red-700 mt-0.5">
                <span th:if="${#strings.equals(param.error, 'pending')}">승인 대기 중입니다.</span>
                <span th:if="${#strings.equals(param.error, 'rejected')}">신청이 반려되었습니다. 다시 신청해주세요.</span>
                <span th:unless="${#strings.equals(param.error, 'pending') or #strings.equals(param.error, 'rejected')}">
                    아이디 또는 비밀번호가 올바르지 않습니다.
                </span>
            </div>
        </div>

        <form th:action="@{/auth/login}" method="POST" class="space-y-6">
            <div>
                <label class="mb-2 block text-sm font-bold text-slate-700 ml-1" for="memberId">아이디</label>
                <input type="text" id="memberId" name="memberId" required autofocus placeholder="아이디를 입력하세요"
                       class="w-full rounded-2xl border border-line bg-slate-50 px-5 py-4 text-sm outline-none transition focus:border-brand focus:bg-white focus:ring-2 focus:ring-brandSoft">
            </div>

            <div>
                <label class="mb-2 block text-sm font-bold text-slate-700 ml-1" for="pass">비밀번호</label>
                <input type="password" id="pass" name="pass" required placeholder="비밀번호를 입력하세요"
                       class="w-full rounded-2xl border border-line bg-slate-50 px-5 py-4 text-sm outline-none transition focus:border-brand focus:bg-white focus:ring-2 focus:ring-brandSoft">
            </div>

            <button type="submit" class="w-full rounded-2xl bg-brand py-4 text-lg font-bold text-white shadow-md transition hover:bg-[#223374] active:scale-[0.98]">
                로그인
            </button>
        </form>

        <div class="mt-8 flex justify-center gap-4 text-sm font-medium text-slate-500">
            <a th:href="@{/auth/find-id}" class="transition hover:text-brand">아이디 찾기</a>
            <span class="text-line text-slate-300">|</span>
            <a th:href="@{/auth/find-pw}" class="transition hover:text-brand">비밀번호 찾기</a>
            <span class="text-line text-slate-300">|</span>
            <a th:href="@{/member/signup}" class="font-bold text-brand transition hover:underline underline-offset-4">회원가입</a>
        </div>

    </div>
</main>

<footer class="mt-auto border-t border-white/60 bg-white/80 py-6 text-center text-sm text-slate-500">
    <p>© 2026 64Lab. Sparta-Style Managed Learning.</p>
</footer>

</body>
</html>
