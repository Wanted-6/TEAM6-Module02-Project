<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>64Lab | 알림</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { headline: ['Manrope', 'sans-serif'], body: ['Noto Sans KR', 'sans-serif'] },
                    colors: { brand: '#2b3f8f', brandSoft: '#edf2ff', ink: '#1b2540', line: '#dbe3f1' },
                    boxShadow: { soft: '0 18px 40px rgba(43, 63, 143, 0.08)' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%); }
        .content-card { background: #ffffff; border-radius: 40px; }
    </style>
</head>
<body class="flex min-h-screen items-center justify-center p-6 text-ink">

<div class="content-card w-full max-w-md p-10 shadow-soft border border-line/50">
    <div class="mb-8 text-center">
        <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-red-50 text-red-500">
            <span class="material-symbols-outlined text-5xl">warning</span>
        </div>
        <h1 class="font-headline text-2xl font-extrabold tracking-tight text-ink">로그인 실패</h1>
        <p class="mt-3 font-medium text-slate-500">입력하신 정보를 다시 확인해 주세요.</p>
    </div>

    <div class="mb-10 rounded-2xl border border-red-100 bg-red-50/50 p-5 text-center">
        <p class="text-[15px] font-semibold leading-relaxed text-red-600" th:text="${message}">
            존재하지 않는 아이디거나 비밀번호가 일치하지 않습니다.
        </p>
    </div>

    <div class="space-y-3">
        <a href="/auth/login" class="block w-full rounded-2xl bg-brand py-4 text-center text-sm font-bold text-white shadow-md transition hover:bg-[#223374] active:scale-[0.98]">
            다시 로그인하기
        </a>
        <a href="/" class="block w-full rounded-2xl border border-line bg-white py-4 text-center text-sm font-bold text-slate-600 transition hover:bg-slate-50">
            메인으로 이동
        </a>
    </div>
</div>

</body>
</html>
