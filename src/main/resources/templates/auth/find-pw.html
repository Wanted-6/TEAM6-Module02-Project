<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>64Lab | 비밀번호 찾기</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { headline: ['Manrope', 'sans-serif'], body: ['Noto Sans KR', 'sans-serif'] },
                    colors: { brand: '#2b3f8f', brandSoft: '#edf2ff', ink: '#1b2540', line: '#dbe3f1', error: '#ba1a1a', success: '#059669' },
                    boxShadow: { soft: '0 18px 40px rgba(43, 63, 143, 0.08)' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%); }
    </style>
</head>
<body class="flex min-h-screen flex-col text-ink">

<main class="flex flex-1 items-center justify-center p-6">
    <div class="w-full max-w-md rounded-[40px] bg-white p-10 shadow-soft border border-line/50">

        <div class="mb-10 text-center">
            <h1 class="font-headline text-2xl font-extrabold tracking-tight text-ink">비밀번호 찾기</h1>
            <p class="mt-3 text-sm font-medium text-slate-500">아이디와 이메일을 입력하시면<br>임시 비밀번호를 발송해 드립니다.</p>
        </div>

        <form id="findPwForm" class="space-y-6" onsubmit="event.preventDefault(); findPw();" novalidate>
            <div class="space-y-2">
                <label class="ml-1 text-xs font-bold text-slate-700" for="loginId">아이디</label>
                <input id="loginId" name="loginId" class="w-full rounded-2xl border border-line bg-slate-50 px-5 py-3.5 text-sm outline-none transition focus:border-brand focus:bg-white focus:ring-2 focus:ring-brandSoft" placeholder="아이디 입력" type="text"/>
                <p id="loginId-error" class="hidden text-xs text-error mt-1.5 flex items-center gap-1 ml-1">
                    <span class="material-symbols-outlined text-[14px]">error</span> 아이디를 입력해 주세요.
                </p>
            </div>

            <div class="space-y-2">
                <label class="ml-1 text-xs font-bold text-slate-700" for="email">이메일</label>
                <input id="email" name="email" class="w-full rounded-2xl border border-line bg-slate-50 px-5 py-3.5 text-sm outline-none transition focus:border-brand focus:bg-white focus:ring-2 focus:ring-brandSoft" placeholder="가입한 이메일" type="email"/>
                <p id="email-error" class="hidden text-xs text-error mt-1.5 flex items-center gap-1 ml-1">
                    <span class="material-symbols-outlined text-[14px]">error</span> <span id="email-error-text">이메일을 확인해 주세요.</span>
                </p>
            </div>

            <button class="w-full rounded-2xl bg-brand py-4 text-sm font-bold text-white shadow-md transition hover:bg-[#223374] active:scale-[0.98]" type="submit">
                임시 비밀번호 발급
            </button>
        </form>

        <div id="result-box" class="hidden mt-8 rounded-2xl p-4 flex items-center gap-3 border">
            <span id="result-icon" class="material-symbols-outlined"></span>
            <p id="result-msg" class="text-sm font-bold"></p>
        </div>

        <div class="mt-10 text-center">
            <a th:href="@{/auth/login}" class="inline-flex items-center gap-2 text-sm font-bold text-brand hover:underline underline-offset-4">
                <span class="material-symbols-outlined text-base">arrow_back</span> 로그인으로 돌아가기
            </a>
        </div>
    </div>
</main>

<script>
    document.getElementById('loginId').addEventListener('input', () => document.getElementById('loginId-error').classList.add('hidden'));
    document.getElementById('email').addEventListener('input', () => document.getElementById('email-error').classList.add('hidden'));

    async function findPw() {
        const loginId = document.getElementById('loginId').value.trim();
        const email = document.getElementById('email').value.trim();
        const loginIdError = document.getElementById('loginId-error');
        const emailError = document.getElementById('email-error');
        const resultBox = document.getElementById('result-box');
        const resultMsg = document.getElementById('result-msg');
        const resultIcon = document.getElementById('result-icon');

        resultBox.classList.add('hidden');
        let isValid = true;

        if (!loginId) { loginIdError.classList.remove('hidden'); isValid = false; }
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email || !emailRegex.test(email)) { emailError.classList.remove('hidden'); isValid = false; }

        if (!isValid) return;

        try {
            const response = await fetch(`/auth/find-pw`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ loginId: loginId, email: email })
            });
            const text = await response.text();

            resultBox.className = 'mt-8 rounded-2xl p-4 flex items-center gap-3 border';
            if (response.ok) {
                resultBox.classList.add('bg-emerald-50', 'border-emerald-100');
                resultIcon.className = 'material-symbols-outlined text-success';
                resultIcon.textContent = 'mark_email_read';
                resultMsg.className = 'text-sm font-bold text-success';
            } else {
                resultBox.classList.add('bg-red-50', 'border-red-100');
                resultIcon.className = 'material-symbols-outlined text-error';
                resultIcon.textContent = 'error';
                resultMsg.className = 'text-sm font-bold text-error';
            }
            resultMsg.textContent = text;
            resultBox.classList.remove('hidden');
        } catch (error) { console.error(error); }
    }
</script>
</body>
</html>
