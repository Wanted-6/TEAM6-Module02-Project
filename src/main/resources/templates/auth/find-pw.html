<!DOCTYPE html>
<html class="light" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Intellectual Atelier | 비밀번호 찾기</title>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#00236f",
                        "on-primary": "#ffffff",
                        "surface": "#f8f9fb",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#444651",
                        "surface-container-low": "#f3f4f6",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "success": "#059669",
                        "success-container": "#d1fae5"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fb; }
        h1, h2 { font-family: 'Manrope', sans-serif; }
        .editorial-gradient { background: linear-gradient(135deg, #00236f 0%, #1e3a8a 100%); }
    </style>
</head>
<body class="flex flex-col min-h-screen text-on-surface">

<main class="flex-grow flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-[420px] space-y-8">

        <div class="text-center space-y-2">
            <h1 class="text-2xl font-bold tracking-tight text-on-surface">비밀번호 찾기</h1>
            <p class="text-sm text-on-surface-variant font-medium">가입하신 아이디와 이메일을 입력하시면<br>임시 비밀번호를 발송해 드립니다.</p>
        </div>

        <div class="bg-surface-container-lowest p-8 rounded-xl shadow-sm">

            <form id="findPwForm" class="space-y-5" onsubmit="event.preventDefault(); findPw();" novalidate>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-on-surface-variant tracking-tight" for="loginId">아이디</label>
                    <input id="loginId" name="loginId" class="w-full bg-surface-container-low border-0 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/40 outline-none transition-all" placeholder="아이디를 입력하세요" type="text"/>
                    <p id="loginId-error" class="hidden text-xs text-error mt-1.5 flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px]">error</span>
                        <span id="loginId-error-text">아이디를 입력해 주세요.</span>
                    </p>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-on-surface-variant tracking-tight" for="email">이메일</label>
                    <input id="email" name="email" class="w-full bg-surface-container-low border-0 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/40 outline-none transition-all" placeholder="가입하신 이메일 주소" type="email"/>
                    <p id="email-error" class="hidden text-xs text-error mt-1.5 flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px]">error</span>
                        <span id="email-error-text">올바른 이메일 형식을 입력해 주세요.</span>
                    </p>
                </div>

                <button class="w-full editorial-gradient text-on-primary py-3.5 rounded-lg font-bold tracking-tight shadow-lg hover:opacity-95 transition-all transform active:scale-[0.98]" type="submit">
                    임시 비밀번호 발급
                </button>
            </form>

            <div id="result-box" class="hidden mt-6 p-4 rounded-lg flex items-center gap-3">
                <span id="result-icon" class="material-symbols-outlined text-[20px]"></span>
                <p id="result-msg" class="text-sm font-semibold"></p>
            </div>

            <div class="mt-8 text-center">
                <a th:href="@{/auth/login}" class="text-sm text-primary font-bold hover:underline underline-offset-4 flex items-center justify-center gap-1">
                    <span class="material-symbols-outlined text-[16px]">arrow_back</span> 로그인으로 돌아가기
                </a>
            </div>
        </div>
    </div>
</main>

<script>
    // 입력할 때마다 에러 메시지 바로바로 숨겨주기
    document.getElementById('loginId').addEventListener('input', () => document.getElementById('loginId-error').classList.add('hidden'));
    document.getElementById('email').addEventListener('input', () => document.getElementById('email-error').classList.add('hidden'));

    async function findPw() {
        const loginId = document.getElementById('loginId').value.trim();
        const email = document.getElementById('email').value.trim();

        const loginIdError = document.getElementById('loginId-error');
        const emailError = document.getElementById('email-error');
        const emailErrorText = document.getElementById('email-error-text');

        const resultBox = document.getElementById('result-box');
        const resultMsg = document.getElementById('result-msg');
        const resultIcon = document.getElementById('result-icon');

        resultBox.classList.add('hidden');
        let isValid = true;

        if (!loginId) {
            loginIdError.classList.remove('hidden');
            isValid = false;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email) {
            emailErrorText.textContent = '이메일을 입력해 주세요.';
            emailError.classList.remove('hidden');
            isValid = false;
        } else if (!emailRegex.test(email)) {
            emailErrorText.textContent = '올바른 이메일 형식을 입력해 주세요.';
            emailError.classList.remove('hidden');
            isValid = false;
        }

        if (!isValid) return;

        try {
            const response = await fetch(`/auth/find-pw`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ loginId: loginId, email: email })
            });

            const text = await response.text();
            resultBox.className = 'mt-6 p-4 rounded-lg flex items-center gap-3';

            if (response.ok) {
                resultBox.classList.add('bg-success-container');
                resultIcon.className = 'material-symbols-outlined text-success text-[20px]';
                resultIcon.textContent = 'mark_email_read';
                resultMsg.className = 'text-sm font-semibold text-success';
            } else {
                resultBox.classList.add('bg-error-container');
                resultIcon.className = 'material-symbols-outlined text-on-error-container text-[20px]';
                resultIcon.textContent = 'error';
                resultMsg.className = 'text-sm font-semibold text-on-error-container';
            }

            resultMsg.textContent = text;
            resultBox.classList.remove('hidden');

        } catch (error) {
            console.error(error);
        }
    }
</script>
</body>
</html>
