<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 코스 상세</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="max-w-5xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">관리자 코스 상세</h1>
            <p class="text-slate-500 mt-2">코스 승인 상태를 관리합니다.</p>
        </div>
        <a href="/admin/courses" class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">목록</a>
    </div>

    <div th:if="${successMessage}" class="mb-6 rounded-lg bg-green-100 text-green-800 px-4 py-3" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="mb-6 rounded-lg bg-red-100 text-red-800 px-4 py-3" th:text="${errorMessage}"></div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 space-y-6">
        <div>
            <h2 class="text-2xl font-bold text-slate-900" th:text="${course.title}">코스명</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
            <div class="p-4 rounded-xl bg-slate-50">
                <p class="text-slate-500 mb-1">강사</p>
                <p class="font-medium">
                    <span th:text="${course.instructorName}">강사명</span>
                    <span class="text-slate-500" th:text="| (${course.instructorLoginId})|">(loginId)</span>
                </p>
            </div>

            <div class="p-4 rounded-xl bg-slate-50">
                <p class="text-slate-500 mb-1">승인 상태</p>
                <p class="font-medium" th:text="${course.approvalStatus}">PENDING</p>
            </div>

            <div class="p-4 rounded-xl bg-slate-50">
                <p class="text-slate-500 mb-1">공개 여부</p>
                <p class="font-medium" th:text="${course.isOpen} ? 'OPEN' : 'CLOSED'">CLOSED</p>
            </div>

            <div class="p-4 rounded-xl bg-slate-50">
                <p class="text-slate-500 mb-1">검토자</p>
                <p class="font-medium" th:if="${course.reviewerName != null}" th:text="${course.reviewerName}">검토자명</p>
                <p class="font-medium" th:unless="${course.reviewerName != null}">-</p>
            </div>
        </div>

        <div class="p-4 rounded-xl bg-slate-50">
            <p class="text-slate-500 mb-2">설명</p>
            <p th:text="${course.description}">설명</p>
        </div>

        <div class="p-4 rounded-xl bg-slate-50" th:if="${course.rejectReason != null}">
            <p class="text-slate-500 mb-2">반려 사유</p>
            <p th:text="${course.rejectReason}">반려 사유</p>
        </div>

        <div class="flex flex-wrap gap-3 pt-2">
            <a th:href="@{/admin/courses/{courseId}/instructor(courseId=${courseId})}"
               class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">
                강사 정보
            </a>
        </div>

        <div class="flex flex-col gap-4 pt-2">
            <form th:action="@{/admin/courses/{courseId}/approve(courseId=${courseId})}" method="post" class="flex gap-3 items-center flex-wrap">
                <input type="text" name="adminLoginId" placeholder="관리자 로그인 ID" class="rounded-lg border-slate-300" required>
                <button type="submit" class="px-4 py-2 rounded-lg bg-emerald-600 text-white hover:bg-emerald-700">승인</button>
            </form>

            <form th:action="@{/admin/courses/{courseId}/reject(courseId=${courseId})}" method="post" class="flex gap-3 items-center flex-wrap">
                <input type="text" name="adminLoginId" placeholder="관리자 로그인 ID" class="rounded-lg border-slate-300" required>
                <input type="text" name="rejectReason" placeholder="반려 사유 입력" class="rounded-lg border-slate-300 min-w-[260px]" required>
                <button type="submit" class="px-4 py-2 rounded-lg bg-amber-600 text-white hover:bg-amber-700">반려</button>
            </form>

            <form th:action="@{/admin/courses/{courseId}/delete(courseId=${courseId})}" method="post"
                  onsubmit="return confirm('정말 삭제 처리하시겠습니까?');"
                  class="flex gap-3 items-center flex-wrap">
                <input type="text" name="adminLoginId" placeholder="관리자 로그인 ID" class="rounded-lg border-slate-300" required>
                <button type="submit" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700">삭제 처리</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
