<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 코스 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="max-w-7xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">관리자 코스 목록</h1>
            <p class="text-slate-500 mt-2">코스 승인/반려/삭제를 관리합니다.</p>
        </div>
        <a href="/main" class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">메인</a>
    </div>

    <div th:if="${successMessage}" class="mb-6 rounded-lg bg-green-100 text-green-800 px-4 py-3" th:text="${successMessage}"></div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-slate-100 text-slate-700">
            <tr>
                <th class="px-4 py-3 text-left">코스 ID</th>
                <th class="px-4 py-3 text-left">제목</th>
                <th class="px-4 py-3 text-left">강사 ID</th>
                <th class="px-4 py-3 text-left">상태</th>
                <th class="px-4 py-3 text-left">공개 여부</th>
                <th class="px-4 py-3 text-left">관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="course : ${courseList}" class="border-t border-slate-200 hover:bg-slate-50">
                <td class="px-4 py-3" th:text="${course.courseId}"></td>
                <td class="px-4 py-3 font-medium" th:text="${course.title}"></td>
                <td class="px-4 py-3" th:text="${course.instructorId}"></td>
                <td class="px-4 py-3" th:text="${course.approvalStatus}"></td>
                <td class="px-4 py-3" th:text="${course.isOpen} ? 'OPEN' : 'CLOSED'"></td>
                <td class="px-4 py-3">
                    <a th:href="@{/admin/courses/{courseId}(courseId=${course.courseId})}"
                       class="px-3 py-1 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">상세</a>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(courseList)}" class="p-8 text-center text-slate-500">
            조회된 코스가 없습니다.
        </div>
    </div>
</div>
</body>
</html>
