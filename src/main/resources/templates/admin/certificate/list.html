<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수료증 신청 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f6f7fb] text-slate-900">
<div th:replace="~{common/topbar :: topbar}"></div>
<div class="min-h-screen">
    <div class="mx-auto max-w-7xl px-6 py-10">
        <div class="mb-8 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
            <div>
                <p class="text-sm font-bold uppercase tracking-[0.25em] text-[#5b63b7]">Certificate Admin</p>
                <h1 class="mt-3 text-4xl font-extrabold tracking-tight">수료증 신청 목록</h1>
                <p class="mt-3 max-w-2xl text-sm leading-6 text-slate-600">
                    학생이 신청한 수료증 요청 내역을 확인하는 화면입니다. 승인 대기 상태인 요청은 바로 승인 처리할 수 있습니다.
                </p>
            </div>
            <a th:href="@{/main}" class="inline-flex items-center rounded-2xl bg-[#334155] px-5 py-3 text-sm font-bold text-white transition hover:bg-[#1f2937]">
                메인으로 돌아가기
            </a>
        </div>

        <div class="overflow-hidden rounded-[28px] border border-slate-200 bg-white shadow-sm"
             th:if="${certificateList != null and !#lists.isEmpty(certificateList)}">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-bold uppercase tracking-[0.18em] text-slate-500">학생</th>
                        <th class="px-6 py-4 text-left text-xs font-bold uppercase tracking-[0.18em] text-slate-500">이메일</th>
                        <th class="px-6 py-4 text-left text-xs font-bold uppercase tracking-[0.18em] text-slate-500">코스</th>
                        <th class="px-6 py-4 text-left text-xs font-bold uppercase tracking-[0.18em] text-slate-500">총점</th>
                        <th class="px-6 py-4 text-left text-xs font-bold uppercase tracking-[0.18em] text-slate-500">상태</th>
                        <th class="px-6 py-4 text-left text-xs font-bold uppercase tracking-[0.18em] text-slate-500">신청일</th>
                        <th class="px-6 py-4 text-left text-xs font-bold uppercase tracking-[0.18em] text-slate-500">처리</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                    <tr th:each="certificate : ${certificateList}" class="hover:bg-slate-50/80">
                        <td class="px-6 py-5">
                            <div class="font-bold text-slate-900" th:text="${certificate.studentName}">김학생</div>
                            <div class="mt-1 text-xs text-slate-500" th:text="|회원번호 ${certificate.memberId}|">회원번호 1</div>
                        </td>
                        <td class="px-6 py-5 text-sm text-slate-600" th:text="${certificate.studentEmail}">student1@test.com</td>
                        <td class="px-6 py-5">
                            <div class="font-semibold text-slate-800" th:text="${certificate.courseTitle}">Spring Boot 입문</div>
                            <div class="mt-1 text-xs text-slate-500" th:text="|코스번호 ${certificate.courseId}|">코스번호 1</div>
                        </td>
                        <td class="px-6 py-5 text-sm font-bold text-slate-900" th:text="|${certificate.totalScore}점|">88점</td>
                        <td class="px-6 py-5">
                            <span th:if="${certificate.status == 'REQUESTED'}"
                                  class="inline-flex rounded-full bg-amber-100 px-3 py-1 text-xs font-bold text-amber-700">
                                승인 대기
                            </span>
                            <span th:if="${certificate.status == 'APPROVED'}"
                                  class="inline-flex rounded-full bg-emerald-100 px-3 py-1 text-xs font-bold text-emerald-700">
                                승인 완료
                            </span>
                            <span th:if="${certificate.status == 'ISSUED'}"
                                  class="inline-flex rounded-full bg-blue-100 px-3 py-1 text-xs font-bold text-blue-700">
                                발급 완료
                            </span>
                            <span th:if="${certificate.status == 'REVOKED'}"
                                  class="inline-flex rounded-full bg-rose-100 px-3 py-1 text-xs font-bold text-rose-700">
                                회수됨
                            </span>
                        </td>
                        <td class="px-6 py-5 text-sm text-slate-600" th:text="${certificate.requestedAt}">2026-04-17T15:00</td>
                        <td class="px-6 py-5">
                            <form th:if="${certificate.status == 'REQUESTED'}"
                                  th:action="@{/admin/certificates/{certificateId}/approve(certificateId=${certificate.certificateId})}"
                                  method="post">
                                <button type="submit"
                                        class="rounded-xl bg-[#2563eb] px-4 py-2 text-sm font-bold text-white transition hover:bg-[#1d4ed8]">
                                    승인
                                </button>
                            </form>

                            <button th:if="${certificate.status != 'REQUESTED'}"
                                    type="button"
                                    class="rounded-xl bg-slate-100 px-4 py-2 text-sm font-bold text-slate-500"
                                    disabled>
                                처리 완료
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div th:if="${certificateList == null or #lists.isEmpty(certificateList)}"
             class="rounded-[28px] border border-dashed border-slate-300 bg-white px-8 py-20 text-center text-slate-500">
            <p class="text-lg font-bold text-slate-700">수료증 신청 내역이 없습니다.</p>
            <p class="mt-3 text-sm">학생이 수료증 발급을 신청하면 이 화면에 목록이 표시됩니다.</p>
        </div>
    </div>
</div>
</body>
</html>
