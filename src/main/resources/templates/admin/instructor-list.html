<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 대시보드 - 강사 승인</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f7f6; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 1000px; margin: auto; }
        h2 { color: #333; margin-top: 0; }

        /* 알림 메시지 */
        .alert { padding: 15px; background-color: #d4edda; color: #155724; border-radius: 5px; margin-bottom: 20px; font-weight: bold; }

        /* 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background-color: #0056b3; color: white; font-weight: bold; }
        tr:hover { background-color: #f9f9f9; }

        /* 버튼 스타일 */
        .btn-group { display: flex; justify-content: center; gap: 10px; }
        form { margin: 0; }
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-approve { background-color: #28a745; }
        .btn-approve:hover { background-color: #218838; }
        .btn-reject { background-color: #dc3545; }
        .btn-reject:hover { background-color: #c82333; }

        /* 텅 비었을 때 */
        .empty-msg { text-align: center; padding: 50px; color: #777; }

        /* 비활성화 버튼 및 텍스트 스타일 */
        .btn-disabled { background-color: #6c757d; cursor: not-allowed; opacity: 0.8; }
        .status-text { display: block; margin-top: 5px; font-size: 13px; font-weight: bold; }
        .text-success { color: #28a745; }
        .text-danger { color: #dc3545; }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-top h2 { margin: 0; }

        /* 메인으로 가기 버튼 */
        .btn-home {
            background-color: #0056b3; color: white; padding: 10px 16px;
            text-decoration: none; border-radius: 5px; font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn-home:hover { background-color: #004494; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <h2>👨‍🏫 강사 가입 승인 대기열</h2>
        <a th:href="@{/}" class="btn-home">🏠 메인으로</a>
    </div>

    <div th:if="${message}" class="alert" th:text="${message}"></div>

    <table>
        <thead>
        <tr>
            <th>아이디</th>
            <th>이름</th>
            <th>이메일</th>
            <th>제출 서류</th>
            <th>가입 신청일</th>
            <th>승인 / 반려</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(instructors)}">
            <td colspan="6" class="empty-msg">현재 승인 대기 중인 강사가 없습니다. 🎉</td>
        </tr>

        <tr th:each="inst : ${instructors}">
            <td th:text="${inst.loginId}">teacher1</td>
            <td th:text="${inst.name}">김강사</td>
            <td th:text="${inst.email}">test@test.com</td>

            <td>
                <a th:if="${inst.gradCertPath != null}"
                   th:href="@{'/uploads/' + ${#strings.replace(inst.gradCertPath, '/uploads/', '')}}"
                   target="_blank" style="color: #0056b3; text-decoration: none;">📄 졸업증명서</a><br>

                <a th:if="${inst.careerCertPath != null}"
                   th:href="@{'/uploads/' + ${#strings.replace(inst.careerCertPath, '/uploads/', '')}}"
                   target="_blank" style="color: #0056b3; text-decoration: none;">📄 경력증명서</a>

                <span th:if="${inst.gradCertPath == null and inst.careerCertPath == null}" style="color: #999;">첨부파일 없음</span>
            </td>

            <td th:text="${inst.createdAt != null ? #temporals.format(inst.createdAt, 'yyyy-MM-dd HH:mm') : '-'}">2026-04-16</td>

            <td>
                <div class="btn-group" th:if="${inst.approvalStatus == null or #strings.toString(inst.approvalStatus) == 'PENDING'}">
                    <form th:action="@{/admin/instructors/{id}/approve(id=${inst.memberId})}" method="post">
                        <button type="submit" class="btn-approve" onclick="return confirm('이 강사를 승인하시겠습니까?');">승인</button>
                    </form>

                    <form th:action="@{/admin/instructors/{id}/reject(id=${inst.memberId})}" method="post" onsubmit="return confirmReject(this);">
                        <input type="hidden" name="reason" class="reject-reason-input">
                        <button type="submit" class="btn-reject">반려</button>
                    </form>
                </div>

                <div th:if="${inst.approvalStatus != null and #strings.toString(inst.approvalStatus) == 'APPROVED'}">
                    <button type="button" class="btn btn-disabled" disabled>승인완료</button>
                    <span class="status-text text-success" th:text="${inst.approvalCode}">승인코드 표시</span>
                </div>

                <div th:if="${inst.approvalStatus != null and #strings.toString(inst.approvalStatus) == 'REJECTED'}">
                    <button type="button" class="btn btn-disabled" disabled>반려처리됨</button>
                    <span class="status-text text-danger" th:text="${inst.rejectReason}">반려사유 표시</span>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    function confirmReject(form) {
        let reason = prompt("반려 사유를 입력해 주세요. (강사에게 메일로 발송됩니다)");

        if (reason) {
            form.querySelector('.reject-reason-input').value = reason;
            return true;
        }

        alert("반려 사유가 입력되지 않아 취소되었습니다.");
        return false;
    }
</script>

</body>
</html>
