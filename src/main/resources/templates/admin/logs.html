<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 접속 로그</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">

<div class="max-w-7xl mx-auto py-10 px-4">

    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <h1 class="text-3xl font-extrabold text-blue-900">사용자 접속 로그 모니터링</h1>

        <div class="flex items-center gap-4">
            <div class="bg-white shadow-sm border border-blue-100 rounded-xl px-5 py-3 flex items-center gap-3">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span class="text-sm font-bold text-slate-600">현재 활성 사용자</span>
                <span class="text-xl font-extrabold text-blue-600" th:text="${activeUsers} + '명'">0명</span>
            </div>

            <a th:href="@{/main}" class="bg-white text-blue-900 px-5 py-3 rounded-xl text-sm font-bold hover:bg-slate-100 transition shadow-sm border border-blue-100 flex items-center gap-2">
                <span class="material-symbols-outlined text-base"></span> 메인페이지
            </a>

            <a th:href="@{/admin/audit-logs}" class="bg-blue-900 text-white px-5 py-3 rounded-xl text-sm font-bold hover:bg-blue-800 transition shadow-sm flex items-center gap-2">
                <span class="material-symbols-outlined text-base"></span> API 성능 통계
            </a>
        </div>
    </div>

    <div class="bg-white shadow-md rounded-2xl overflow-hidden border border-slate-200">
        <div class="overflow-x-auto">
            <table class="min-w-full text-left text-sm whitespace-nowrap">
                <thead class="bg-slate-100 text-slate-600 font-bold border-b border-slate-200">
                <tr>
                    <th scope="col" class="px-6 py-4">No</th>
                    <th scope="col" class="px-6 py-4">접속 일시</th>
                    <th scope="col" class="px-6 py-4">로그인 ID</th>
                    <th scope="col" class="px-6 py-4">IP 주소</th>
                    <th scope="col" class="px-6 py-4 text-center">접속 상태</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr th:each="log, iterStat : ${logs}" class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 font-semibold text-slate-500" th:text="${iterStat.count}">1</td>

                    <td class="px-6 py-4 text-slate-700" th:text="${#temporals.format(log.loginTime, 'yyyy-MM-dd HH:mm:ss')}">2026-04-19 18:00:00</td>

                    <td class="px-6 py-4 font-bold text-blue-700" th:text="${log.loginId}">User123</td>

                    <td class="px-6 py-4 text-slate-600 font-mono text-xs" th:text="${log.ipAddress}">192.168.0.1</td>

                    <td class="px-6 py-4 text-center">
                        <span th:if="${log.success}" class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">접속 성공</span>
                        <span th:unless="${log.success}" class="px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold">접속 실패</span>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(logs)}">
                    <td colspan="5" class="px-6 py-12 text-center text-slate-500 font-medium">
                        수집된 접속 로그가 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
