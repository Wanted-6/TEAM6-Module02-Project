<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>강사 승인 코드 인증 - Wanted LMS</title>
    <style>
        /* 기본 배경 및 폰트 세팅 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 하얀색 중앙 카드 박스 */
        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h2 { text-align: center; color: #333; margin-top: 0; margin-bottom: 10px; }
        p { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: bold; font-size: 14px; }

        /* 입력창 스타일 */
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            letter-spacing: 2px; /* 코드가 잘 보이게 자간을 넓힘 */
            text-transform: uppercase; /* 소문자를 쳐도 대문자로 보이게 자동 변환! */
        }
        input[type="text"]:focus {
            border-color: #0056b3;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 86, 179, 0.2);
        }

        /* 버튼 스타일 */
        button {
            width: 100%;
            padding: 14px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #004494; }

        /* 에러 메시지 (틀렸을 때만 나타남) */
        .error-message {
            color: #dc3545;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 10px;
            border-radius: 5px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>강사 권한 활성화</h2>
    <p>관리자에게 메일로 발급받은<br>6자리 승인 코드를 입력해 주세요.</p>

    <div th:if="${error}" class="error-message" th:text="${error}"></div>

    <form th:action="@{/member/verify-code}" method="post">
        <div class="form-group">
            <label for="code">승인 코드</label>
            <input type="text" id="code" name="code" placeholder="예: A9B2C1"
                   maxlength="6" pattern="[A-Za-z0-9]{6}"
                   title="6자리 영문/숫자를 입력해주세요." required autofocus>
        </div>
        <button type="submit">인증 완료하기</button>
    </form>
</div>

</body>
</html>
