<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>64Lab | 회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { headline: ['Manrope', 'sans-serif'], body: ['Noto Sans KR', 'sans-serif'] }, colors: { brand: '#2b3f8f', brandSoft: '#edf2ff', ink: '#1b2540', line: '#dbe3f1', paper: '#f6f8fc', error: '#ba1a1a' }, boxShadow: { soft: '0 18px 40px rgba(43, 63, 143, 0.08)' } } } }
    </script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-ink">

<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/}" class="font-headline text-2xl font-extrabold tracking-tight text-brand">64Lab</a>
        <a th:href="@{/auth/login}" class="text-sm font-bold text-slate-600 hover:text-brand transition">로그인</a>
    </div>
</header>

<main class="flex-grow flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-[480px] bg-white p-10 rounded-[40px] shadow-soft border border-line/50">

        <div class="text-center mb-8">
            <h1 class="font-headline text-3xl font-extrabold text-ink">회원가입</h1>
            <p class="mt-3 text-sm font-medium text-slate-500">스파르타식 학습 관리 플랫폼에 합류하세요</p>
        </div>

        <div th:if="${message}" class="mb-6 p-4 rounded-2xl bg-red-50 flex items-center gap-3">
            <span class="material-symbols-outlined text-red-500">info</span>
            <p class="text-sm font-bold text-red-700" th:text="${message}">안내 메시지</p>
        </div>

        <form th:action="@{/member/signup}" method="POST" enctype="multipart/form-data" class="space-y-6" id="signupForm" onsubmit="return validateForm()">

            <div class="space-y-2">
                <label class="ml-1 text-xs font-bold text-slate-700">가입 유형</label>
                <div class="flex p-1 bg-slate-50 rounded-2xl border border-line">
                    <input type="hidden" id="memberRole" name="memberRole" value="STUDENT">
                    <button type="button" id="btn-student" onclick="selectRole('STUDENT')" class="flex-1 py-3 text-sm font-bold rounded-xl bg-white text-brand shadow-sm transition-all">수강생</button>
                    <button type="button" id="btn-instructor" onclick="selectRole('INSTRUCTOR')" class="flex-1 py-3 text-sm font-bold text-slate-500 hover:text-ink transition-all">강사</button>
                </div>
            </div>

            <div class="space-y-2">
                <label class="ml-1 text-xs font-bold text-slate-700">아이디</label>
                <div class="flex gap-2">
                    <input id="memberId" name="memberId" class="flex-grow rounded-2xl border border-line bg-slate-50 px-5 py-3.5 text-sm outline-none transition focus:border-brand focus:bg-white" placeholder="사용할 아이디 입력" type="text" required/>
                    <button class="px-5 py-3.5 bg-slate-100 text-slate-700 text-sm font-bold rounded-2xl hover:bg-slate-200 transition" type="button" onclick="checkDuplicateId()">중복확인</button>
                </div>
                <p id="id-msg" class="hidden text-xs mt-1.5 ml-1 font-bold"></p>
            </div>

            <div class="space-y-2">
                <label class="ml-1 text-xs font-bold text-slate-700">비밀번호</label>
                <input id="memberPassword" name="memberPassword" class="w-full rounded-2xl border border-line bg-slate-50 px-5 py-3.5 text-sm outline-none transition focus:border-brand focus:bg-white" placeholder="영문, 숫자, 특수문자 포함 8자 이상" type="password" required oninput="validatePasswordComplexity(); checkPasswordMatch();"/>
                <p id="pw-complexity-msg" class="text-xs text-slate-500 mt-1.5 ml-1 font-medium flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">info</span> 안전한 비밀번호를 설정해주세요.
                </p>
            </div>

            <div class="space-y-2">
                <label class="ml-1 text-xs font-bold text-slate-700">비밀번호 확인</label>
                <input id="passwordConfirm" type="password" class="w-full rounded-2xl border border-line bg-slate-50 px-5 py-3.5 text-sm outline-none transition focus:border-brand focus:bg-white" placeholder="비밀번호 재입력" required oninput="checkPasswordMatch()"/>
                <p id="password-error" class="hidden text-xs text-error mt-1.5 ml-1 font-bold flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">error</span> 비밀번호가 일치하지 않습니다.
                </p>
            </div>

            <div class="space-y-2">
                <label class="ml-1 text-xs font-bold text-slate-700">이름</label>
                <input id="memberName" name="memberName" class="w-full rounded-2xl border border-line bg-slate-50 px-5 py-3.5 text-sm outline-none transition focus:border-brand focus:bg-white" placeholder="실명 입력" type="text" required/>
            </div>

            <div class="space-y-2">
                <label class="ml-1 text-xs font-bold text-slate-700">이메일</label>
                <input id="memberEmail" name="memberEmail" class="w-full rounded-2xl border border-line bg-slate-50 px-5 py-3.5 text-sm outline-none transition focus:border-brand focus:bg-white" placeholder="example@email.com" type="email" required onblur="checkDuplicateEmail()"/>
                <p id="email-msg" class="hidden text-xs mt-1.5 ml-1 font-bold"></p>
            </div>

            <div class="space-y-2">
                <label class="ml-1 text-xs font-bold text-slate-700">휴대폰 번호</label>
                <input id="memberPhone" name="memberPhone" class="w-full rounded-2xl border border-line bg-slate-50 px-5 py-3.5 text-sm outline-none transition focus:border-brand focus:bg-white" placeholder="010-0000-0000" type="tel" maxlength="13" required onblur="validatePhoneFormat()"/>
                <p id="phone-msg" class="hidden text-xs mt-1.5 ml-1 font-bold"></p>
            </div>

            <div id="instructor-fields" class="hidden space-y-4 pt-4 border-t border-line border-dashed">
                <div class="space-y-2">
                    <label class="ml-1 text-xs font-bold text-brand">졸업증명서 첨부 (이미지/PDF)</label>
                    <input id="gradCert" name="gradCert" type="file" accept="image/*,.pdf" class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-brandSoft file:text-brand hover:file:bg-[#dce4fa] cursor-pointer outline-none"/>
                </div>
                <div class="space-y-2">
                    <label class="ml-1 text-xs font-bold text-brand">경력증명서 첨부 (이미지/PDF)</label>
                    <input id="careerCert" name="careerCert" type="file" accept="image/*,.pdf" class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-brandSoft file:text-brand hover:file:bg-[#dce4fa] cursor-pointer outline-none"/>
                </div>
            </div>

            <div class="pt-2">
                <label class="flex items-start gap-3 cursor-pointer">
                    <input id="agreeTerms" class="mt-0.5 rounded border-line text-brand focus:ring-brand" type="checkbox" onchange="hideTermsError()"/>
                    <span class="text-xs font-bold text-slate-600 leading-relaxed">
                        <a href="#" class="text-brand underline underline-offset-2">이용약관</a> 및
                        <a href="#" class="text-brand underline underline-offset-2">개인정보 처리방침</a>에 동의합니다.
                    </span>
                </label>
                <p id="terms-msg" class="hidden text-xs text-error mt-1.5 ml-1 font-bold flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">error</span> 약관 동의가 필요합니다.
                </p>
            </div>

            <button class="w-full rounded-2xl bg-brand py-4 text-base font-bold text-white shadow-md transition hover:bg-[#223374] active:scale-[0.98]" type="submit">
                가입하기
            </button>
        </form>
    </div>
</main>

<script>
    // JS 로직은 기존 파일과 100% 동일하게 유지합니다.
    let isIdChecked = false, isPasswordValid = false, isEmailValid = false, isPhoneValid = false;

    document.addEventListener('DOMContentLoaded', function () {
        const phoneInput = document.getElementById('memberPhone');
        if (phoneInput) {
            phoneInput.addEventListener('input', function (e) {
                let val = e.target.value.replace(/[^0-9]/g, '');
                if (val.length > 11) val = val.substring(0, 11);
                let res = '';
                if (val.length < 4) res = val;
                else if (val.length < 7) res = val.substr(0, 3) + '-' + val.substr(3);
                else if (val.length < 11) res = val.substr(0, 3) + '-' + val.substr(3, 3) + '-' + val.substr(6);
                else res = val.substr(0, 3) + '-' + val.substr(3, 4) + '-' + val.substr(7);
                e.target.value = res;
            });
        }
    });

    function selectRole(role) {
        document.getElementById('memberRole').value = role;
        const btnS = document.getElementById('btn-student'), btnI = document.getElementById('btn-instructor'), fields = document.getElementById('instructor-fields');
        if (role === 'STUDENT') {
            btnS.className = 'flex-1 py-3 text-sm font-bold rounded-xl bg-white text-brand shadow-sm transition-all';
            btnI.className = 'flex-1 py-3 text-sm font-bold text-slate-500 hover:text-ink transition-all';
            fields.classList.add('hidden');
        } else {
            btnI.className = 'flex-1 py-3 text-sm font-bold rounded-xl bg-white text-brand shadow-sm transition-all';
            btnS.className = 'flex-1 py-3 text-sm font-bold text-slate-500 hover:text-ink transition-all';
            fields.classList.remove('hidden');
        }
    }

    async function checkDuplicateId() {
        const memberId = document.getElementById('memberId').value;
        const msgEl = document.getElementById('id-msg');
        msgEl.classList.remove('hidden');
        if(!memberId || memberId.length < 4) {
            msgEl.innerHTML = '아이디는 4글자 이상이어야 합니다.'; msgEl.className = 'text-xs text-error mt-1.5 ml-1 font-bold'; isIdChecked = false; return;
        }
        try {
            const response = await fetch(`/api/member/check-id?memberId=${memberId}`);
            if(await response.json()) {
                msgEl.innerHTML = '이미 사용중인 아이디입니다.'; msgEl.className = 'text-xs text-error mt-1.5 ml-1 font-bold'; isIdChecked = false;
            } else {
                msgEl.innerHTML = '사용 가능한 아이디입니다.'; msgEl.className = 'text-xs text-green-600 mt-1.5 ml-1 font-bold'; isIdChecked = true;
            }
        } catch (e) { console.error(e); }
    }
    document.getElementById('memberId').addEventListener('input', () => { isIdChecked = false; document.getElementById('id-msg').classList.add('hidden'); });

    function validatePasswordComplexity() {
        const pw = document.getElementById('memberPassword').value;
        const msgEl = document.getElementById('pw-complexity-msg');
        let count = (/[A-Z]/.test(pw)?1:0) + (/[a-z]/.test(pw)?1:0) + (/\d/.test(pw)?1:0) + (/[^A-Za-z0-9]/.test(pw)?1:0);
        if (pw.length >= 8 && count >= 3) {
            msgEl.innerHTML = '사용 가능한 비밀번호입니다.'; msgEl.className = 'text-xs text-green-600 mt-1.5 ml-1 font-bold'; isPasswordValid = true;
        } else {
            msgEl.innerHTML = '비밀번호 조건을 다시 확인해주세요.'; msgEl.className = 'text-xs text-error mt-1.5 ml-1 font-bold'; isPasswordValid = false;
        }
    }

    function checkPasswordMatch() {
        const p1 = document.getElementById('memberPassword').value, p2 = document.getElementById('passwordConfirm').value;
        const err = document.getElementById('password-error');
        if (p2 === '') { err.classList.add('hidden'); return; }
        p1 !== p2 ? err.classList.remove('hidden') : err.classList.add('hidden');
    }

    async function checkDuplicateEmail() {
        const email = document.getElementById('memberEmail').value;
        const msgEl = document.getElementById('email-msg');
        if(!email) return;
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            msgEl.innerHTML = '올바른 이메일 형식을 입력해주세요.'; msgEl.className = 'text-xs text-error mt-1.5 ml-1 font-bold'; msgEl.classList.remove('hidden'); isEmailValid = false; return;
        }
        try {
            const response = await fetch(`/api/member/check-email?email=${email}`);
            msgEl.classList.remove('hidden');
            if(await response.json()) { msgEl.innerHTML = '이미 사용중인 이메일입니다.'; msgEl.className = 'text-xs text-error mt-1.5 ml-1 font-bold'; isEmailValid = false; }
            else { msgEl.innerHTML = '사용 가능한 이메일입니다.'; msgEl.className = 'text-xs text-green-600 mt-1.5 ml-1 font-bold'; isEmailValid = true; }
        } catch(e) {}
    }
    document.getElementById('memberEmail').addEventListener('input', () => { isEmailValid = false; document.getElementById('email-msg').classList.add('hidden'); });

    async function validatePhoneFormat() {
        const phone = document.getElementById('memberPhone').value;
        const msgEl = document.getElementById('phone-msg');
        if(!phone) return;
        if (!/^010-\d{4}-\d{4}$/.test(phone)) {
            msgEl.innerHTML = '010-0000-0000 형식으로 입력해주세요.'; msgEl.className = 'text-xs text-error mt-1.5 ml-1 font-bold'; msgEl.classList.remove('hidden'); isPhoneValid = false; return;
        }
        try {
            const response = await fetch(`/api/member/check-phone?phone=${phone}`);
            msgEl.classList.remove('hidden');
            if(await response.json()) { msgEl.innerHTML = '이미 사용중인 전화번호입니다.'; msgEl.className = 'text-xs text-error mt-1.5 ml-1 font-bold'; isPhoneValid = false; }
            else { msgEl.innerHTML = '사용 가능한 전화번호입니다.'; msgEl.className = 'text-xs text-green-600 mt-1.5 ml-1 font-bold'; isPhoneValid = true; }
        } catch(e) {}
    }
    document.getElementById('memberPhone').addEventListener('input', () => { isPhoneValid = false; document.getElementById('phone-msg').classList.add('hidden'); });

    function hideTermsError() { document.getElementById('terms-msg').classList.add('hidden'); }

    function validateForm() {
        if (!isIdChecked) return alert("아이디 중복확인을 진행해주세요."), document.getElementById('memberId').focus(), false;
        if (!isPasswordValid) return alert("비밀번호 조건을 충족하지 않았습니다."), document.getElementById('memberPassword').focus(), false;
        if (document.getElementById('memberPassword').value !== document.getElementById('passwordConfirm').value) return alert("비밀번호가 일치하지 않습니다."), document.getElementById('passwordConfirm').focus(), false;
        if (!isEmailValid) return alert("이메일 중복확인을 진행해주세요."), document.getElementById('memberEmail').focus(), false;
        if (!isPhoneValid) return alert("전화번호 형식을 확인하거나 중복확인을 진행해주세요."), document.getElementById('memberPhone').focus(), false;
        if (!document.getElementById('agreeTerms').checked) return document.getElementById('terms-msg').classList.remove('hidden'), alert("이용약관 동의가 필요합니다."), false;
        return true;
    }
</script>
</body>
</html>
