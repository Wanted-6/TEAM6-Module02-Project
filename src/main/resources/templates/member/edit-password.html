<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정 - Wanted LMS</title>
    <style>
        /* 기본 배경 및 폰트 세팅 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f7f6; /* 연한 회색 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 중앙에 배치될 하얀색 카드 박스 */
        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* 부드러운 그림자 */
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* 입력 폼 스타일 */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            border-color: #0056b3; /* 클릭 시 파란색 테두리 */
            outline: none;
            box-shadow: 0 0 5px rgba(0, 86, 179, 0.2);
        }

        /* 버튼 스타일 */
        button {
            width: 100%;
            padding: 14px;
            background-color: #0056b3; /* 메인 브랜드 컬러 (필요시 수정) */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #004494; /* 마우스 올렸을 때 조금 더 어두운 파란색 */
        }

        /* 에러 메시지 스타일 */
        .error-msg {
            color: #dc3545; /* 빨간색 */
            font-size: 12px;
            margin-top: 5px;
            display: none; /* 평소에는 숨겨둠 */
        }
    </style>
</head>
<body>

<div class="card">
    <h2>비밀번호 재설정</h2>
    <p>안전한 사용을 위해 임시 비밀번호를<br>새로운 비밀번호로 변경해 주세요.</p>

    <form th:action="@{/member/edit-password}" method="post" onsubmit="return validatePassword()">

        <div class="form-group">
            <label for="newPassword">새 비밀번호</label>
            <input type="password" id="newPassword" name="newPassword"
                   pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,16}"
                   title="영문, 숫자, 특수문자를 포함하여 8~16자로 입력해주세요."
                   placeholder="영문, 숫자, 특수문자 포함 8~16자" required>
        </div>

        <div class="form-group">
            <label for="confirmPassword">새 비밀번호 확인</label>
            <input type="password" id="confirmPassword" placeholder="비밀번호를 다시 입력해 주세요." required>
            <div id="passwordError" class="error-msg">비밀번호가 일치하지 않습니다.</div>
        </div>

        <button type="submit">비밀번호 변경하기</button>
    </form>
</div>

<script>
    function validatePassword() {
        var newPassword = document.getElementById("newPassword").value;
        var confirmPassword = document.getElementById("confirmPassword").value;
        var errorMsg = document.getElementById("passwordError");

        // 두 비밀번호가 다르면
        if (newPassword !== confirmPassword) {
            errorMsg.style.display = "block"; // 에러 메시지 켜기
            document.getElementById("confirmPassword").focus(); // 다시 입력하라고 커서 이동
            return false; // 서버로 전송 취소!
        }

        // 같으면 전송!
        errorMsg.style.display = "none";
        return true;
    }
</script>

</body>
</html>
