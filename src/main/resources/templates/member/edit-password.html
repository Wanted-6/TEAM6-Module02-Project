<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>64Lab | 비밀번호 재설정</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { headline: ['Manrope', 'sans-serif'], body: ['Noto Sans KR', 'sans-serif'] }, colors: { brand: '#2b3f8f', brandSoft: '#edf2ff', ink: '#1b2540', line: '#dbe3f1', error: '#ba1a1a' }, boxShadow: { soft: '0 18px 40px rgba(43, 63, 143, 0.08)' } } } }
    </script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%); }
    </style>
</head>
<body class="flex flex-col min-h-screen text-ink">

<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/}" class="font-headline text-2xl font-extrabold tracking-tight text-brand">64Lab</a>
    </div>
</header>

<main class="flex-grow flex items-center justify-center p-6">
    <div class="w-full max-w-md rounded-[40px] bg-white p-10 shadow-soft border border-line/50">

        <div class="text-center mb-8">
            <h2 class="font-headline text-2xl font-extrabold text-ink">비밀번호 재설정</h2>
            <p class="mt-3 text-sm font-medium text-slate-500">안전한 사용을 위해 임시 비밀번호를<br>새로운 비밀번호로 변경해 주세요.</p>
        </div>

        <form th:action="@{/member/edit-password}" method="post" onsubmit="return validatePassword()" class="space-y-6">
            <div class="space-y-2">
                <label class="ml-1 text-xs font-bold text-slate-700" for="newPassword">새 비밀번호</label>
                <input type="password" id="newPassword" name="newPassword"
                       pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,16}"
                       title="영문, 숫자, 특수문자를 포함하여 8~16자로 입력해주세요."
                       placeholder="영문, 숫자, 특수문자 포함 8~16자" required
                       class="w-full rounded-2xl border border-line bg-slate-50 px-5 py-4 text-sm outline-none transition focus:border-brand focus:bg-white focus:ring-2 focus:ring-brandSoft">
            </div>

            <div class="space-y-2">
                <label class="ml-1 text-xs font-bold text-slate-700" for="confirmPassword">새 비밀번호 확인</label>
                <input type="password" id="confirmPassword" placeholder="비밀번호를 다시 입력해 주세요." required
                       class="w-full rounded-2xl border border-line bg-slate-50 px-5 py-4 text-sm outline-none transition focus:border-brand focus:bg-white focus:ring-2 focus:ring-brandSoft">
                <div id="passwordError" class="hidden text-xs text-error mt-1.5 ml-1 font-bold">비밀번호가 일치하지 않습니다.</div>
            </div>

            <button type="submit" class="w-full rounded-2xl bg-brand py-4 text-base font-bold text-white shadow-md transition hover:bg-[#223374] active:scale-[0.98]">
                비밀번호 변경하기
            </button>
        </form>
    </div>
</main>

<script>
    function validatePassword() {
        var newPassword = document.getElementById("newPassword").value;
        var confirmPassword = document.getElementById("confirmPassword").value;
        var errorMsg = document.getElementById("passwordError");

        if (newPassword !== confirmPassword) {
            errorMsg.classList.remove("hidden");
            document.getElementById("confirmPassword").focus();
            return false;
        }
        errorMsg.classList.add("hidden");
        return true;
    }
</script>
</body>
</html>
