<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>64Lab | 마이페이지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { headline: ['Manrope', 'sans-serif'], body: ['Noto Sans KR', 'sans-serif'] }, colors: { brand: '#2b3f8f', brandSoft: '#edf2ff', ink: '#1b2540', line: '#dbe3f1' }, boxShadow: { soft: '0 18px 40px rgba(43, 63, 143, 0.08)' } } } }
    </script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background-color: white; color: #2b3f8f; box-shadow: 0 4px 12px rgba(43, 63, 143, 0.08); border-right: 4px solid #2b3f8f; font-weight: 800; }
    </style>
</head>
<body class="text-ink">

<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/}" class="font-headline text-2xl font-extrabold tracking-tight text-brand">64Lab</a>

        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="h-9 w-9 overflow-hidden rounded-full border border-slate-200">
                    <img class="profile-sync h-full w-full object-cover"
                         th:src="${member != null and member.profile != null and member.profile.profileImage != null and member.profile.profileImage != '' and member.profile.profileImage != 'default-profile.png'} ? '/uploads/' + ${member.profile.profileImage} + '?t=' + ${#dates.createNow().getTime()} : '/img/default-profile.png'"
                         onerror="this.src='/img/default-profile.png'">
                </div>
                <span class="text-sm font-medium text-slate-700">
                    <strong class="font-bold text-brand" th:text="${member != null ? member.name : #authentication.name}">관리자1</strong>님, 환영합니다.
                </span>
            </div>
            <form th:action="@{/auth/logout}" th:method="post" class="inline">
                <button type="submit" class="rounded-full border border-slate-300 bg-white px-4 py-1.5 text-sm font-bold text-slate-700 transition hover:bg-slate-50">
                    로그아웃
                </button>
            </form>
        </div>
    </div>
</header>

<main class="mx-auto max-w-6xl px-4 py-10">
    <div class="flex flex-col gap-8 md:flex-row">

        <aside class="w-full md:w-64 shrink-0">
            <div class="sticky top-24 space-y-2 rounded-[24px] border border-line bg-white/50 p-3 shadow-sm">
                <button onclick="switchTab('profile')" class="sidebar-item active flex w-full items-center gap-3 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-500 transition hover:bg-white hover:text-ink">
                    <span class="material-symbols-outlined">id_card</span> 프로필 설정
                </button>
                <button onclick="switchTab('account')" class="sidebar-item flex w-full items-center gap-3 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-500 transition hover:bg-white hover:text-ink">
                    <span class="material-symbols-outlined">lock_person</span> 계정 및 보안
                </button>
                <button th:if="${member.role != null and member.role.name() == 'STUDENT'}" onclick="switchTab('grades')" class="sidebar-item flex w-full items-center gap-3 rounded-xl px-4 py-3.5 text-sm font-bold text-slate-500 transition hover:bg-white hover:text-ink">
                    <span class="material-symbols-outlined">monitoring</span> 성적 분석 차트
                </button>
            </div>
        </aside>

        <div class="flex-1">
            <section id="profile" class="tab-content active rounded-[32px] border border-line bg-white shadow-soft overflow-hidden">
                <div class="border-b border-line bg-slate-50 px-8 py-5">
                    <h2 class="text-xl font-extrabold text-ink">프로필 설정</h2>
                </div>
                <div class="p-8">
                    <form action="/member/profile/update" method="post" enctype="multipart/form-data">
                        <div class="flex flex-col gap-8 md:flex-row md:items-start">
                            <div class="flex flex-col items-center">
                                <div class="group relative h-36 w-36 overflow-hidden rounded-full border-4 border-white bg-brandSoft shadow-lg">
                                    <img id="profilePreview" class="profile-sync h-full w-full object-cover"
                                         th:src="${member.profile != null and member.profile.profileImage != null and member.profile.profileImage != '' and member.profile.profileImage != 'default-profile.png'} ? '/uploads/' + ${member.profile.profileImage} + '?t=' + ${#dates.createNow().getTime()} : '/img/default-profile.png'" onerror="this.src='/img/default-profile.png'">
                                    <label class="absolute inset-0 flex cursor-pointer flex-col items-center justify-center bg-ink/50 text-white opacity-0 backdrop-blur-sm transition-opacity group-hover:opacity-100">
                                        <span class="material-symbols-outlined mb-1">photo_camera</span>
                                        <span class="text-xs font-bold">사진 변경</span>
                                        <input type="file" id="profileImageInput" name="profileImage" class="hidden" accept="image/*">
                                    </label>
                                </div>
                                <input type="hidden" id="useDefaultImage" name="useDefaultImage" value="false">
                                <button type="button" onclick="setDefaultProfile()" class="mt-3 text-xs font-bold text-slate-500 hover:text-brand underline">기본 사진으로 변경</button>
                                <p class="mt-4 text-base font-bold text-ink" th:text="${member.name}">이름</p>
                            </div>
                            <div class="flex-1">
                                <label class="mb-2 block text-sm font-bold text-slate-700">한 줄 소개글</label>
                                <textarea name="bio" rows="4" th:text="${member.profile?.bio}" class="w-full resize-none rounded-2xl border border-line bg-slate-50 p-4 text-sm outline-none transition focus:border-brand focus:bg-white"></textarea>
                            </div>
                        </div>
                        <div class="mt-8 text-right">
                            <button type="submit" class="rounded-2xl bg-brand px-8 py-3.5 text-sm font-bold text-white transition hover:bg-[#223374] active:scale-95">저장하기</button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="account" class="tab-content rounded-[32px] border border-line bg-white shadow-soft overflow-hidden">
                <div class="border-b border-line bg-slate-50 px-8 py-5">
                    <h2 class="text-xl font-extrabold text-ink">계정 및 보안</h2>
                </div>
                <div class="p-8">
                    <div id="password-verify-section" class="flex flex-col items-center py-10">
                        <span class="material-symbols-outlined text-5xl text-slate-300 mb-4">lock</span>
                        <h3 class="mb-2 text-lg font-bold text-ink">정보 변경을 위해 비밀번호를 확인합니다</h3>
                        <div class="flex w-full max-w-sm gap-2 mt-4">
                            <input type="password" id="currentPasswordVerify" class="flex-1 rounded-2xl border border-line bg-slate-50 px-4 py-3.5 text-sm outline-none transition focus:border-brand" placeholder="현재 비밀번호" onkeypress="if(event.key === 'Enter') verifyCurrentPassword()">
                            <button type="button" onclick="verifyCurrentPassword()" class="rounded-2xl bg-ink px-6 text-sm font-bold text-white transition hover:bg-slate-800">확인</button>
                        </div>
                        <p id="verifyErrorMsg" class="hidden mt-3 text-xs font-bold text-red-500">비밀번호가 일치하지 않습니다.</p>
                    </div>

                    <div id="account-forms-section" class="hidden space-y-10">
                        <div>
                            <label class="mb-2 block text-sm font-bold text-slate-700">로그인 이메일</label>
                            <input type="email" th:value="${member.email}" readonly class="w-full rounded-2xl border border-line bg-slate-100 px-4 py-3.5 text-sm text-slate-500 outline-none cursor-not-allowed">
                        </div>

                        <form id="phoneForm" data-action="/member/phone/update">
                            <label class="mb-2 block text-sm font-bold text-slate-700">전화번호 변경</label>
                            <div class="flex gap-2">
                                <input type="text" name="phone" id="phoneInput" th:value="${member.phone}" maxlength="13" placeholder="010-0000-0000" class="flex-1 rounded-2xl border border-line bg-slate-50 px-4 py-3.5 text-sm outline-none transition focus:border-brand">
                                <button type="submit" class="rounded-2xl bg-slate-100 px-6 text-sm font-bold text-slate-700 transition hover:bg-slate-200">저장</button>
                            </div>
                            <p id="phoneErrorMsg" class="hidden mt-2 text-xs font-bold text-red-500">형식에 맞게 입력해주세요.</p>
                        </form>

                        <form id="passwordForm" data-action="/member/edit-password" class="border-t border-line pt-8">
                            <label class="mb-2 block text-sm font-bold text-slate-700">새로운 비밀번호 설정</label>
                            <div class="grid gap-4 sm:grid-cols-2">
                                <input type="password" name="newPassword" id="newPassword" placeholder="영문, 숫자, 특수문자 포함 8~16자" class="rounded-2xl border border-line bg-slate-50 px-4 py-3.5 text-sm outline-none transition focus:border-brand">
                                <input type="password" id="confirmPassword" placeholder="비밀번호 다시 입력" class="rounded-2xl border border-line bg-slate-50 px-4 py-3.5 text-sm outline-none transition focus:border-brand">
                            </div>
                            <p id="passwordMessage" class="mt-2 text-xs font-bold text-red-500"></p>
                            <button type="submit" class="mt-4 w-full rounded-2xl bg-brand py-3.5 text-sm font-bold text-white transition hover:bg-[#223374]">비밀번호 업데이트</button>
                        </form>

                        <form action="/member/delete" method="post" id="deleteForm" class="border-t border-line pt-8 text-right" th:data-has-teaching="${hasTeachingCourses != null ? hasTeachingCourses : false}" onsubmit="return validateWithdrawal(event);">
                            <button type="submit" class="text-sm font-bold text-red-500 hover:underline">회원 탈퇴</button>
                        </form>
                    </div>
                </div>
            </section>

            <section id="grades" th:if="${member.role != null and member.role.name() == 'STUDENT'}" class="tab-content rounded-[32px] border border-line bg-white shadow-soft overflow-hidden">
                <div class="border-b border-line bg-slate-50 px-8 py-5 flex items-center justify-between">
                    <h2 class="text-xl font-extrabold text-ink">학습 성취도 분석</h2>
                    <select th:if="${not #lists.isEmpty(enrolledCourses)}" id="courseSelector" onchange="loadCourseGrade()" class="rounded-xl border border-line bg-white px-4 py-2 text-sm font-bold text-slate-700 outline-none">
                        <option th:each="course : ${enrolledCourses}" th:value="${course['enrollmentId']}" th:text="${course['courseName']}"></option>
                    </select>
                </div>
                <div class="p-10 flex justify-center">
                    <div th:if="${#lists.isEmpty(enrolledCourses)}" class="text-center py-12 text-slate-500">
                        <span class="material-symbols-outlined text-5xl mb-3">school</span>
                        <p class="font-bold">수강 중인 강의가 없습니다.</p>
                    </div>
                    <div th:unless="${#lists.isEmpty(enrolledCourses)}" class="w-full max-w-md">
                        <canvas id="gradeRadarChart"></canvas>
                    </div>
                </div>
            </section>
        </div>
    </div>
</main>

<script th:inline="javascript">
    let currentVerifiedPassword = "";

    function setDefaultProfile() {
        document.getElementById('profileImageInput').value = '';
        document.getElementById('useDefaultImage').value = 'true';
        document.querySelectorAll('.profile-sync').forEach(img => img.src = '/img/default-profile.png');
    }

    async function verifyCurrentPassword() {
        const pw = document.getElementById('currentPasswordVerify').value;
        const msg = document.getElementById('verifyErrorMsg');
        if (!pw) { msg.classList.remove('hidden'); return; }
        try {
            const res = await fetch('/api/member/verify-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }) });
            if (res.ok && await res.json()) {
                currentVerifiedPassword = pw;
                document.getElementById('password-verify-section').classList.add('hidden');
                document.getElementById('account-forms-section').classList.remove('hidden');
            } else { msg.classList.remove('hidden'); }
        } catch (e) { alert('오류가 발생했습니다.'); }
    }

    function validateWithdrawal() {
        if (document.getElementById('courseSelector')?.options.length > 0) { alert('수강 중인 강좌가 있어 탈퇴할 수 없습니다.'); return false; }
        if (document.getElementById('deleteForm')?.getAttribute('data-has-teaching') === 'true') { alert('진행 중인 수업이 있어 탈퇴할 수 없습니다.'); return false; }
        return confirm('정말 탈퇴하시겠습니까?');
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content, .sidebar-item').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelector(`.sidebar-item[onclick*="${tabId}"]`).classList.add('active');
        if(tabId === 'grades') loadCourseGrade();
        else if (tabId === 'account') {
            document.getElementById('password-verify-section').classList.remove('hidden');
            document.getElementById('account-forms-section').classList.add('hidden');
            document.getElementById('currentPasswordVerify').value = '';
            currentVerifiedPassword = "";
        }
    }

    let radarChart;
    async function loadCourseGrade() {
        const id = document.getElementById('courseSelector')?.value;
        if(!id) return;
        try {
            const res = await fetch(`/api/grades/chart?enrollmentId=${id}`);
            if (res.ok) initRadarChart(await res.json());
        } catch(e) {}
    }
    function initRadarChart(d) {
        const ctx = document.getElementById('gradeRadarChart')?.getContext('2d');
        if(!ctx) return;
        if(radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
            type: 'radar',
            data: { labels: ['출석', '과제', '시험', '태도', '총점'], datasets: [{ label: '점수', data: [d.attendance, d.assignment, d.exam, d.attitude, d.total], backgroundColor: 'rgba(43, 63, 143, 0.2)', borderColor: '#2b3f8f', pointBackgroundColor: '#2b3f8f' }] },
            options: { scales: { r: { suggestedMin: 0, suggestedMax: 100 } }, plugins: { legend: { display: false } } }
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('phoneInput')?.addEventListener('input', function (e) {
            let v = e.target.value.replace(/[^0-9]/g, ''); if (v.length > 11) v = v.substring(0, 11);
            e.target.value = v.length < 4 ? v : v.length < 7 ? v.substr(0,3)+'-'+v.substr(3) : v.length < 11 ? v.substr(0,3)+'-'+v.substr(3,3)+'-'+v.substr(6) : v.substr(0,3)+'-'+v.substr(3,4)+'-'+v.substr(7);
        });

        document.getElementById('profileImageInput')?.addEventListener('change', function(e) {
            document.getElementById('useDefaultImage').value = 'false';
            if (e.target.files[0]) {
                const r = new FileReader();
                r.onload = ev => document.querySelectorAll('.profile-sync').forEach(img => img.src = ev.target.result);
                r.readAsDataURL(e.target.files[0]);
            }
        });

        if(document.getElementById('courseSelector')) loadCourseGrade();

        const phoneForm = document.getElementById('phoneForm');
        if (phoneForm) {
            phoneForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                const phoneInput = document.getElementById('phoneInput');
                const phoneRegex = /^010-\d{4}-\d{4}$/;

                if (!phoneRegex.test(phoneInput.value)) {
                    document.getElementById('phoneErrorMsg').classList.remove('hidden');
                    return;
                }
                document.getElementById('phoneErrorMsg').classList.add('hidden');

                const formData = new FormData(this);
                try {
                    const response = await fetch(this.getAttribute('data-action'), { method: 'POST', body: formData });
                    if (response.ok) {
                        alert('전화번호가 성공적으로 변경되었습니다.');
                    } else {
                        alert('변경에 실패했습니다. 다시 시도해주세요.');
                    }
                } catch (error) {
                    alert('서버와 통신 중 오류가 발생했습니다.');
                }
            });
        }
        const passwordForm = document.getElementById('passwordForm');
        if (passwordForm) {
            passwordForm.addEventListener('submit', async function (e) {
                e.preventDefault();

                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const msg = document.getElementById('passwordMessage');

                if (currentVerifiedPassword && newPassword === currentVerifiedPassword) {
                    msg.textContent = '현재 사용중인 비밀번호와 같습니다.';
                    return;
                }

                const pwRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,16}$/;
                if (!pwRegex.test(newPassword)) {
                    msg.textContent = '영문, 숫자, 특수문자를 포함하여 8~16자로 입력해주세요.';
                    return;
                }

                if (newPassword !== confirmPassword) {
                    msg.textContent = '비밀번호가 일치하지 않습니다.';
                    return;
                }

                msg.textContent = '';

                const formData = new FormData(this);
                try {
                    const response = await fetch(this.getAttribute('data-action'), { method: 'POST', body: formData });

                    // 수정된 부분: 비밀번호 변경 완료 시 억지로 화면에 남아있지 않고 메인/로그인 화면으로 이동시킵니다.
                    if (response.ok || response.redirected) {
                        alert('비밀번호가 성공적으로 변경되었습니다.\n안전한 이용을 위해 다시 로그인해 주세요.');
                        window.location.href = '/'; // 메인으로 이동하면 권한 없음으로 자연스럽게 로그인 화면으로 갑니다.
                    } else {
                        alert('비밀번호 변경에 실패했습니다. 다시 시도해주세요.');
                    }
                } catch (error) {
                    alert('서버와 통신 중 오류가 발생했습니다.');
                }
            });
        }
    });
</script>
</body>
</html>
