<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코스 과제 상세</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="max-w-4xl mx-auto px-6 py-10">

    <div th:if="${errorMessage}"
         class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-700"
         th:text="${errorMessage}">
        에러 메시지
    </div>

    <div th:if="${successMessage}"
         class="mb-6 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-green-700"
         th:text="${successMessage}">
        성공 메시지
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 space-y-6">
        <div>
            <h1 class="text-3xl font-bold text-slate-900" th:text="${assignment.title}">과제 제목</h1>
            <p class="text-slate-500 mt-2">코스 과제 상세 정보입니다.</p>
        </div>

        <div>
            <p class="text-sm text-slate-500 mb-2">마감일</p>
            <p th:text="${#temporals.format(assignment.dueDate, 'yyyy-MM-dd HH:mm')}">2026-04-20 23:59</p>
        </div>

        <div>
            <p class="text-sm text-slate-500 mb-2">설명</p>
            <p class="whitespace-pre-line" th:text="${assignment.description}">과제 설명</p>
        </div>

        <div>
            <p class="text-sm text-slate-500 mb-2">첨부 파일</p>

            <a th:if="${assignment.attachmentFile != null and assignment.attachmentFile != ''}"
               th:href="@{/download/assignment/{fileName}(fileName=${#strings.substring(assignment.attachmentFile, assignment.attachmentFile.lastIndexOf('/') + 1)})}"
               th:text="${#strings.substring(assignment.attachmentFile, assignment.attachmentFile.lastIndexOf('/') + 1)}"
               class="text-blue-600 hover:underline">
                assignment1.pdf
            </a>

            <span th:if="${assignment.attachmentFile == null or assignment.attachmentFile == ''}">
                -
             </span>
        </div>

        <div class="flex justify-end gap-3">
            <a th:if="${role == 'INSTRUCTOR'}"
               th:href="@{/courses/{courseId}/assignment/modify(courseId=${courseId})}"
               class="px-4 py-2 rounded-lg bg-blue-700 text-white hover:bg-blue-800">
                과제 수정
            </a>

            <a th:if="${role == 'INSTRUCTOR'}"
               th:href="@{/courses/{courseId}/assignment/submissions(courseId=${courseId})}"
               class="px-4 py-2 rounded-lg border border-emerald-300 text-emerald-700 bg-emerald-50 hover:bg-emerald-100">
                제출 목록
            </a>

            <a th:if="${role == 'STUDENT'}"
               th:href="@{/courses/{courseId}/assignment/submissions/regist(courseId=${courseId})}"
               class="px-4 py-2 rounded-lg border border-blue-300 text-blue-700 bg-blue-50 hover:bg-blue-100">
                과제 제출
            </a>
        </div>
    </div>

</div>
</body>
</html>
