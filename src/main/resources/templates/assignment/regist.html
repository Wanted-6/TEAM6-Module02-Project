<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코스 과제 등록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2b3f8f',
                        brandSoft: '#edf2ff',
                        ink: '#1b2540',
                        line: '#dbe3f1'
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(43, 63, 143, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background:
                    radial-gradient(circle at top left, rgba(43, 63, 143, 0.08), transparent 28%),
                    linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%);
        }
    </style>
</head>
<body class="text-ink">

<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/main}" class="text-2xl font-extrabold tracking-tight text-brand">64Lab</a>

        <div class="flex items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="h-9 w-9 overflow-hidden rounded-full border border-slate-200 shadow-sm">
                    <img th:src="${member != null and member.profile != null and member.profile.profileImage != null and member.profile.profileImage != '' ? '/uploads/' + member.profile.profileImage : '/img/default-profile.png'}"
                         class="h-full w-full object-cover"
                         onerror="this.src='/img/default-profile.png'">
                </div>
                <span class="hidden text-sm font-medium text-slate-600 sm:block">
                    <strong class="text-brand"
                            th:text="${member != null and member.name != null ? member.name : #authentication.name}">사용자</strong>님, 환영합니다.
                </span>
            </div>

            <form th:action="@{/auth/logout}" method="post" class="inline">
                <button type="submit"
                        class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    로그아웃
                </button>
            </form>
        </div>
    </div>
</header>

<div class="mx-auto max-w-4xl px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-8 rounded-[28px] border border-white/70 bg-white/90 p-6 shadow-soft">
        <p class="inline-flex rounded-full bg-brandSoft px-4 py-1 text-sm font-semibold text-brand">
            Assignment Regist
        </p>

        <div class="mt-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-ink">코스 과제 등록</h1>
                <p class="mt-2 text-sm leading-6 text-slate-600">현재 코스에 과제를 등록합니다.</p>
            </div>

            <div class="flex flex-wrap gap-2">
                <a th:href="@{/main}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    메인
                </a>
                <a href="javascript:history.back()"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    이전
                </a>
                <a th:href="@{/courses/{courseId}(courseId=${courseId}, role='INSTRUCTOR')}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    코스 상세
                </a>
            </div>
        </div>
    </div>

    <div th:if="${errorMessage}"
         class="mb-6 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700"
         th:text="${errorMessage}">
        에러 메시지
    </div>

    <div th:if="${successMessage}"
         class="mb-6 rounded-2xl border border-green-200 bg-green-50 px-4 py-3 text-green-700"
         th:text="${successMessage}">
        성공 메시지
    </div>

    <form th:action="@{/courses/{courseId}/assignment(courseId=${courseId})}"
          method="post"
          enctype="multipart/form-data"
          class="rounded-[28px] border border-slate-200 bg-white p-8 shadow-sm space-y-6">

        <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">제목</label>
            <input type="text"
                   name="title"
                   class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-brand"
                   required>
        </div>

        <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">설명</label>
            <textarea name="description"
                      rows="6"
                      class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-brand"></textarea>
        </div>

        <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">첨부 파일</label>
            <input type="file"
                   name="attachmentUpload"
                   class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm outline-none transition focus:border-brand">
        </div>

        <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">마감일</label>
            <input type="datetime-local"
                   name="dueDate"
                   class="w-full rounded-2xl border border-slate-300 px-4 py-3 outline-none transition focus:border-brand"
                   required>
        </div>

        <div class="flex flex-wrap justify-end gap-3 pt-2">
            <a th:href="@{/courses/{courseId}(courseId=${courseId}, role='INSTRUCTOR')}"
               class="rounded-full border border-slate-200 bg-white px-5 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                취소
            </a>
            <button type="submit"
                    class="rounded-full bg-brand px-5 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                등록
            </button>
        </div>
    </form>
</div>
</body>
</html>
