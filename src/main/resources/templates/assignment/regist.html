<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코스 과제 등록</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">

<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/main}" class="text-2xl font-extrabold tracking-tight text-[#2b3f8f]">64Lab</a>

        <div class="flex items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="h-9 w-9 overflow-hidden rounded-full border border-slate-200 shadow-sm">
                    <img th:src="${member != null and member.profile != null and member.profile.profileImage != null and member.profile.profileImage != '' ? '/uploads/' + member.profile.profileImage : '/img/default-profile.png'}"
                         class="h-full w-full object-cover"
                         onerror="this.src='/img/default-profile.png'">
                </div>
                <span class="hidden text-sm font-medium text-slate-600 sm:block">
                    <strong class="text-[#2b3f8f]"
                            th:text="${member != null and member.name != null ? member.name : #authentication.name}">사용자</strong>님, 환영합니다.
                </span>
            </div>

            <form th:action="@{/auth/logout}" method="post" class="inline">
                <button type="submit"
                        class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-[#2b3f8f] hover:text-[#2b3f8f]">
                    로그아웃
                </button>
            </form>
        </div>
    </div>
</header>

<div class="max-w-4xl mx-auto px-6 py-10">

    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">코스 과제 등록</h1>
            <p class="text-slate-500 mt-2">현재 코스에 과제를 등록합니다.</p>
        </div>
        <a th:href="@{/courses/{courseId}/assignment(courseId=${courseId})}"
           class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">
            상세
        </a>
    </div>

    <div th:if="${errorMessage}"
         class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-700"
         th:text="${errorMessage}">
        에러 메시지
    </div>

    <div th:if="${successMessage}"
         class="mb-6 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-green-700"
         th:text="${successMessage}">
        성공 메시지
    </div>

    <form th:action="@{/courses/{courseId}/assignment(courseId=${courseId})}"
          method="post"
          enctype="multipart/form-data"
          class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 space-y-6">

        <div>
            <label class="block text-sm font-medium mb-2">제목</label>
            <input type="text" name="title" class="w-full rounded-lg border-slate-300" required>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">설명</label>
            <textarea name="description" rows="6" class="w-full rounded-lg border-slate-300"></textarea>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">첨부 파일</label>
            <input type="file" name="attachmentUpload" class="w-full rounded-lg border-slate-300">
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">마감일</label>
            <input type="datetime-local" name="dueDate" class="w-full rounded-lg border-slate-300" required>
        </div>

        <div class="flex justify-end gap-3">
            <a th:href="@{/courses/{courseId}/assignment(courseId=${courseId})}"
               class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">
                취소
            </a>
            <button type="submit"
                    class="px-5 py-2 rounded-lg bg-blue-700 text-white hover:bg-blue-800">
                등록
            </button>
        </div>
    </form>
</div>
</body>
</html>
