<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 등록</title>
    <link rel="stylesheet" href="/css/board/crud.css">
</head>
<body th:attr="data-current-role=${currentRole},data-current-member-id=${currentMemberId}">
<div class="page-wrapper">
    <div class="top-utility">
        <div class="page-main">
            <h1 class="page-title">게시글 등록</h1>
            <p class="page-desc">게시판 종류에 맞는 항목만 입력하면 된다.</p>
        </div>
    </div>

    <div class="box">
        <form method="post" action="/board/regist">
            <input type="hidden" name="postType" th:value="${boardType}">

            <div class="form-row">
                <label>게시판 종류</label>
                <div class="context-badge" th:text="${boardType}">FREE</div>
            </div>

            <div class="form-row" th:if="${boardType.name() == 'COURSE_NOTICE' or boardType.name() == 'SECTION_QNA'}">
                <label for="courseId">코스</label>
                <select id="courseId" name="courseId">
                    <option value="">코스를 선택하세요.</option>
                    <option th:each="course : ${courses}"
                            th:value="${course.courseId}"
                            th:text="${course.title}"
                            th:selected="${selectedCourseId != null and selectedCourseId == course.courseId}">Spring Boot 입문</option>
                </select>
            </div>

            <div class="form-row" th:if="${boardType.name() == 'SECTION_QNA' and selectedCourseId != null}">
                <label>선택한 코스명</label>
                <input type="text" id="selectedCourseTitle" readonly th:value="${selectedCourseTitle}">
            </div>

            <div class="form-row" th:if="${boardType.name() == 'SECTION_QNA'}">
                <label for="sectionId">섹션</label>
                <select id="sectionId" name="sectionId">
                    <option value="">섹션을 선택하세요.</option>
                    <option th:each="section : ${sections}"
                            th:value="${section.sectionId}"
                            th:text="|${section.sectionOrder}주차 - ${section.title}|"
                            th:attr="data-course-id=${section.courseId}"
                            th:selected="${selectedSectionId != null and selectedSectionId == section.sectionId}">1주차 - Spring Boot 소개</option>
                </select>
            </div>

            <div class="form-row">
                <label for="title">제목</label>
                <input id="title" name="title" type="text" required>
            </div>

            <div class="form-row">
                <label for="content">내용</label>
                <textarea id="content" name="content" required></textarea>
            </div>

            <div class="form-row" th:if="${boardType.name() == 'SECTION_QNA'}">
                <label for="isSecret">비밀글 여부</label>
                <select id="isSecret" name="isSecret">
                    <option value="false">공개 질문</option>
                    <option value="true">비밀 질문</option>
                </select>
            </div>

            <div class="box" style="margin-top: 16px;">
                <p class="meta">입력 기준</p>
                <p th:if="${boardType.name() == 'ADMIN_NOTICE'}">관리자 공지는 관리자만 등록할 수 있고, 코스와 섹션 정보는 사용하지 않는다.</p>
                <p th:if="${boardType.name() == 'COURSE_NOTICE'}">코스 공지는 코스를 선택해서 등록하고 섹션 정보는 사용하지 않는다.</p>
                <p th:if="${boardType.name() == 'FREE'}">자유게시판은 제목과 내용만 입력하면 된다.</p>
                <p th:if="${boardType.name() == 'SECTION_QNA'}">섹션 Q&A는 코스와 섹션을 선택하고, 답변 상태는 자동으로 PENDING 처리된다.</p>
            </div>

            <div class="button-group">
                <button type="submit" class="btn">등록</button>
                <a class="btn gray" th:href="${listPath}">취소</a>
            </div>
        </form>
    </div>
</div>
<script src="/js/board/role-switcher.js"></script>
<script th:if="${boardType.name() == 'SECTION_QNA'}">
    (function () {
        const courseSelect = document.getElementById('courseId');
        const sectionSelect = document.getElementById('sectionId');
        const selectedCourseTitleInput = document.getElementById('selectedCourseTitle');

        if (!courseSelect || !sectionSelect) {
            return;
        }

        function syncSelectedCourseTitle() {
            if (!selectedCourseTitleInput) {
                return;
            }

            const selectedOption = courseSelect.options[courseSelect.selectedIndex];
            selectedCourseTitleInput.value = selectedOption && selectedOption.value ? selectedOption.text : '';
        }

        function filterSectionsByCourse() {
            const selectedCourseId = courseSelect.value;

            Array.from(sectionSelect.options).forEach(option => {
                if (!option.value) {
                    option.hidden = false;
                    return;
                }

                option.hidden = !!selectedCourseId && option.dataset.courseId !== selectedCourseId;
            });

            const selectedOption = sectionSelect.options[sectionSelect.selectedIndex];
            if (selectedOption && selectedOption.hidden) {
                sectionSelect.value = '';
            }

            syncSelectedCourseTitle();
        }

        courseSelect.addEventListener('change', filterSectionsByCourse);
        filterSectionsByCourse();
    })();
</script>
<script th:if="${errorMessage != null}" th:inline="javascript">
    alert([[${errorMessage}]]);
</script>
</body>
</html>
