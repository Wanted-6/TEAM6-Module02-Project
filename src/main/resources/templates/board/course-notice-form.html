<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코스 공지사항 작성</title>
    <link rel="stylesheet" href="/css/board.css">
</head>
<body>
<div class="container">
    <div class="hero-box">
        <div class="breadcrumb"><a href="/main">메인</a> / <a href="/board">게시판</a> / <a href="/board/course-notices">코스 공지사항</a> / 작성</div>
        <span class="badge">Form</span>
        <div class="page-title">코스 공지사항 작성</div>
        <div class="page-desc">코스별 공지를 등록하는 폼 화면입니다.</div>
    </div>

    <div class="form-box">
        <label class="field-label" for="course-notice-course">코스명</label>
        <input id="course-notice-course" type="text" placeholder="예: 백엔드 6기">

        <label class="field-label" for="course-notice-title">제목</label>
        <input id="course-notice-title" type="text" placeholder="공지 제목을 입력하세요.">

        <label class="field-label" for="course-notice-content">내용</label>
        <textarea id="course-notice-content" placeholder="공지 내용을 입력하세요."></textarea>

        <div class="action-row">
            <a class="btn green" href="/board/course-notices">저장</a>
            <a class="btn gray" href="/board/course-notices">취소</a>
        </div>
    </div>
</div>
</body>
</html>
