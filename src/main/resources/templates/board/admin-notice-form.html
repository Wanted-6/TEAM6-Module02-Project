<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 공지사항 작성</title>
    <link rel="stylesheet" href="/css/board.css">
</head>
<body>
<div class="container">
    <div class="hero-box">
        <div class="breadcrumb"><a href="/main">메인</a> / <a href="/board">게시판</a> / <a href="/board/admin-notices">관리자 공지사항</a> / 작성</div>
        <span class="badge">Form</span>
        <div class="page-title">관리자 공지사항 작성</div>
        <div class="page-desc">운영 공지 작성과 수정에 사용할 폼 화면입니다.</div>
    </div>

    <div class="form-box">
        <label class="field-label" for="admin-notice-title">제목</label>
        <input id="admin-notice-title" type="text" placeholder="공지 제목을 입력하세요.">

        <label class="field-label" for="admin-notice-content">내용</label>
        <textarea id="admin-notice-content" placeholder="공지 내용을 입력하세요."></textarea>

        <div class="action-row">
            <a class="btn green" href="/board/admin-notices">저장</a>
            <a class="btn gray" href="/board/admin-notices">취소</a>
        </div>
    </div>
</div>
</body>
</html>
