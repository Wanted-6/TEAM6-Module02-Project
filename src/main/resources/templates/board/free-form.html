<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자유게시판 작성</title>
    <link rel="stylesheet" href="/css/board.css">
</head>
<body>
<div class="container">
    <div class="hero-box">
        <div class="breadcrumb"><a href="/main">메인</a> / <a href="/board">게시판</a> / <a href="/board/free">자유게시판</a> / 작성</div>
        <span class="badge">Form</span>
        <div class="page-title">자유게시판 작성</div>
        <div class="page-desc">자유로운 게시글을 작성하는 폼 화면입니다.</div>
    </div>

    <div class="form-box">
        <label class="field-label" for="free-title">제목</label>
        <input id="free-title" type="text" placeholder="게시글 제목을 입력하세요.">

        <label class="field-label" for="free-content">내용</label>
        <textarea id="free-content" placeholder="자유롭게 내용을 작성해 주세요."></textarea>

        <div class="action-row">
            <a class="btn green" href="/board/free">등록</a>
            <a class="btn gray" href="/board/free">취소</a>
        </div>
    </div>
</div>
</body>
</html>
