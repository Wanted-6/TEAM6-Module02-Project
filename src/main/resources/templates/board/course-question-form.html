<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코스 질문 게시판 작성</title>
    <link rel="stylesheet" href="/css/board.css">
</head>
<body>
<div class="container">
    <div class="hero-box">
        <div class="breadcrumb"><a href="/main">메인</a> / <a href="/board">게시판</a> / <a href="/board/course-questions">코스 질문 게시판</a> / 작성</div>
        <span class="badge">Question Form</span>
        <div class="page-title">코스 질문 작성</div>
        <div class="page-desc">학습 질문을 등록하는 폼 화면입니다.</div>
    </div>

    <div class="form-box">
        <label class="field-label" for="course-question-title">제목</label>
        <input id="course-question-title" type="text" placeholder="질문 제목을 입력하세요.">

        <label class="field-label" for="course-question-content">질문 내용</label>
        <textarea id="course-question-content" placeholder="어떤 부분이 막혔는지 자세히 적어보세요."></textarea>

        <div class="action-row">
            <a class="btn green" href="/board/course-questions">등록</a>
            <a class="btn gray" href="/board/course-questions">취소</a>
        </div>
    </div>
</div>
</body>
</html>
