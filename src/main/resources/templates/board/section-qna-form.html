<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>섹션별 Q&A 작성</title>
    <link rel="stylesheet" href="/css/board.css">
</head>
<body>
<div class="container">
    <div class="hero-box">
        <div class="breadcrumb"><a href="/main">메인</a> / <a href="/board">게시판</a> / <a href="/board/section-qna">섹션별 Q&amp;A</a> / 작성</div>
        <span class="badge">Form</span>
        <div class="page-title">섹션별 Q&amp;A 작성</div>
        <div class="page-desc">섹션 단위 질문을 등록하는 폼 화면입니다.</div>
    </div>

    <div class="form-box">
        <label class="field-label" for="section-name">섹션</label>
        <input id="section-name" type="text" placeholder="예: 3-2">

        <label class="field-label" for="section-qna-title">제목</label>
        <input id="section-qna-title" type="text" placeholder="질문 제목을 입력하세요.">

        <label class="field-label" for="section-qna-content">내용</label>
        <textarea id="section-qna-content" placeholder="질문 내용을 입력하세요."></textarea>

        <div class="action-row">
            <a class="btn green" href="/board/section-qna">등록</a>
            <a class="btn gray" href="/board/section-qna">취소</a>
        </div>
    </div>
</div>
</body>
</html>
