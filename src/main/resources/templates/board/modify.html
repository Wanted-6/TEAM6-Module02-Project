<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
    <link rel="stylesheet" href="/css/board/crud.css">
</head>
<body th:attr="data-current-role=${currentRole},data-current-member-id=${currentMemberId}">
<div class="page-wrapper">
    <div class="top-utility">
        <div class="role-panel">
            <p class="role-label">현재 역할 전환</p>
            <div class="role-buttons">
                <button class="role-btn" data-role="ADMIN" type="button">관리자</button>
                <button class="role-btn" data-role="INSTRUCTOR" type="button">강사</button>
                <button class="role-btn" data-role="STUDENT" type="button">학생</button>
            </div>
            <div class="role-current">현재 로그인: <span class="role-badge" data-current-role th:text="${currentRole}">STUDENT</span> / 사용자 ID: <span class="role-badge" data-current-member-id th:text="${currentMemberId}">1</span></div>
            <p class="permission-note">기존 게시글 정보를 불러와 게시판 구조에 맞게 수정하는 화면입니다.</p>
        </div>
        <div class="page-main">
            <h1 class="page-title">게시글 수정</h1>
            <p class="page-desc">기존 게시글 정보를 수정하는 화면입니다.</p>
        </div>
    </div>

    <div class="box">
        <form method="post" action="/board/modify">
            <input type="hidden" name="postId" th:value="${board.postId}">
            <input type="hidden" name="postType" th:value="${board.postType}">
            <input type="hidden" name="courseId" th:value="${board.courseId}">
            <input type="hidden" name="sectionId" th:value="${board.sectionId}">
            <input type="hidden" name="currentRole" data-current-role-input>
            <input type="hidden" name="currentMemberId" data-current-member-id-input>

            <div class="form-row">
                <label>게시판 종류</label>
                <div class="context-badge" th:text="${board.postType}">SECTION_QNA</div>
            </div>

            <div class="form-row">
                <label for="memberId">작성자 ID</label>
                <input id="memberId" name="memberId" type="number" th:value="${board.memberId}" readonly>
            </div>

            <div class="form-row" th:if="${board.courseId != null}">
                <label>코스</label>
                <input type="text" th:value="${board.courseTitle}" readonly>
            </div>

            <div class="form-row" th:if="${board.sectionId != null}">
                <label>섹션</label>
                <input type="text" th:value="${board.sectionTitle}" readonly>
            </div>

            <div class="form-row">
                <label for="title">제목</label>
                <input id="title" name="title" type="text" th:value="${board.title}" required>
            </div>

            <div class="form-row">
                <label for="content">내용</label>
                <textarea id="content" name="content" required th:text="${board.content}"></textarea>
            </div>

            <div class="form-row">
                <label for="isSecret">비밀글 여부</label>
                <select id="isSecret" name="isSecret">
                    <option value="false" th:selected="${board.isSecret != null and !board.isSecret}">false</option>
                    <option value="true" th:selected="${board.isSecret != null and board.isSecret}">true</option>
                </select>
            </div>

            <div class="form-row" th:if="${board.postType != null and board.postType.name() == 'SECTION_QNA'}">
                <label for="answerStatus">답변 상태</label>
                <select id="answerStatus" name="answerStatus">
                    <option value="PENDING" th:selected="${board.answerStatus != null and board.answerStatus.name() == 'PENDING'}">PENDING</option>
                    <option value="ANSWERED" th:selected="${board.answerStatus != null and board.answerStatus.name() == 'ANSWERED'}">ANSWERED</option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit" class="btn">수정</button>
                <a class="btn gray" th:href="@{/board/detail(postId=${board.postId})}">상세로</a>
            </div>
        </form>
    </div>
</div>
<script src="/js/board/role-switcher.js"></script>
<script th:if="${errorMessage != null}" th:inline="javascript">
    alert([[${errorMessage}]]);
</script>
</body>
</html>
