<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제출 수정</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="max-w-4xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">제출 수정</h1>
            <p class="text-slate-500 mt-2">제출한 과제를 수정합니다.</p>
        </div>
        <a th:href="@{/submissions/{submissionId}(submissionId=${submission.submissionId})}"
           class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">상세</a>
    </div>

    <div th:if="${errorMessage}"
         class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-700"
         th:text="${errorMessage}"></div>

    <form th:action="@{/submissions/{submissionId}/modify(submissionId=${submission.submissionId})}"
          method="post"
          enctype="multipart/form-data"
          class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 space-y-6">

        <div>
            <label class="block text-sm font-medium mb-2">제출 내용</label>
            <textarea name="content" rows="6" class="w-full rounded-lg border-slate-300"
                      th:text="${submission.content}"></textarea>
        </div>

        <div>
            <label class="block text-sm font-medium mb-2">첨부 파일</label>
            <input type="file" name="attachmentUpload" class="w-full rounded-lg border-slate-300">
        </div>

        <div class="flex justify-end gap-3">
            <a th:href="@{/submissions/{submissionId}(submissionId=${submission.submissionId})}"
               class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">취소</a>
            <button type="submit" class="px-5 py-2 rounded-lg bg-blue-700 text-white hover:bg-blue-800">수정</button>
        </div>
    </form>
</div>
</body>
</html>
