<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제출 현황</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2b3f8f',
                        brandSoft: '#edf2ff',
                        ink: '#1b2540',
                        line: '#dbe3f1'
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(43, 63, 143, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background:
                    radial-gradient(circle at top left, rgba(43, 63, 143, 0.08), transparent 28%),
                    linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%);
        }
    </style>
</head>
<body class="text-ink">

<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/main}" class="text-2xl font-extrabold tracking-tight text-brand">64Lab</a>

        <div class="flex items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="h-9 w-9 overflow-hidden rounded-full border border-slate-200 shadow-sm">
                    <img th:src="${member != null and member.profile != null and member.profile.profileImage != null and member.profile.profileImage != '' ? '/uploads/' + member.profile.profileImage : '/img/default-profile.png'}"
                         class="h-full w-full object-cover"
                         onerror="this.src='/img/default-profile.png'">
                </div>
                <span class="hidden text-sm font-medium text-slate-600 sm:block">
                    <strong class="text-brand"
                            th:text="${member != null and member.name != null ? member.name : #authentication.name}">사용자</strong>님, 환영합니다.
                </span>
            </div>

            <form th:action="@{/auth/logout}" method="post" class="inline">
                <button type="submit"
                        class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    로그아웃
                </button>
            </form>
        </div>
    </div>
</header>

<div class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-8 rounded-[28px] border border-white/70 bg-white/90 p-6 shadow-soft">
        <p class="inline-flex rounded-full bg-brandSoft px-4 py-1 text-sm font-semibold text-brand">
            Submission Status
        </p>

        <div class="mt-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-ink">제출 현황</h1>
                <p class="mt-2 text-sm leading-6 text-slate-600">수강생 전체의 과제 제출 여부를 확인합니다.</p>
            </div>

            <div class="flex flex-wrap gap-2">
                <a th:href="@{/main}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    메인
                </a>
                <a href="javascript:history.back()"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    이전
                </a>
                <a th:href="@{/courses/{courseId}/assignment(courseId=${courseId})}"
                   class="rounded-full bg-brand px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    과제 상세
                </a>
            </div>
        </div>
    </div>

    <div th:if="${errorMessage}"
         class="mb-6 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700"
         th:text="${errorMessage}"></div>

    <div th:if="${successMessage}"
         class="mb-6 rounded-2xl border border-green-200 bg-green-50 px-4 py-3 text-green-700"
         th:text="${successMessage}"></div>

    <div class="rounded-[28px] border border-slate-200 bg-white p-8 shadow-sm">
        <div class="overflow-hidden rounded-[20px] border border-slate-200">
            <table class="w-full text-sm">
                <thead class="bg-slate-100 text-slate-700">
                <tr>
                    <th class="px-6 py-4 text-left">학생명</th>
                    <th class="px-6 py-4 text-left">로그인 ID</th>
                    <th class="px-6 py-4 text-left">제출 상태</th>
                    <th class="px-6 py-4 text-left">제출일</th>
                    <th class="px-6 py-4 text-left">관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(submissionList)}">
                    <td colspan="5" class="px-6 py-8 text-center text-slate-400">
                        수강생 정보가 없습니다.
                    </td>
                </tr>

                <tr th:each="submission : ${submissionList}" class="border-t border-slate-200 hover:bg-slate-50">
                    <td class="px-6 py-4 font-medium text-slate-900" th:text="${submission.studentName}">홍길동</td>
                    <td class="px-6 py-4" th:text="${submission.studentLoginId}">student01</td>
                    <td class="px-6 py-4">
                        <span th:if="${submission.submitStatus == '제출 완료'}"
                              class="inline-flex rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold text-emerald-700">
                            제출 완료
                        </span>
                        <span th:if="${submission.submitStatus == '미제출'}"
                              class="inline-flex rounded-full bg-slate-200 px-3 py-1 text-xs font-semibold text-slate-700">
                            미제출
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <span th:if="${submission.submittedAt != null}"
                              th:text="${#temporals.format(submission.submittedAt, 'yyyy-MM-dd HH:mm')}">2026-04-20 10:00</span>
                        <span th:if="${submission.submittedAt == null}" class="text-slate-400">-</span>
                    </td>
                    <td class="px-6 py-4">
                        <a th:if="${submission.submissionId != null}"
                           th:href="@{/submissions/{submissionId}(submissionId=${submission.submissionId})}"
                           class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                            상세
                        </a>
                        <span th:if="${submission.submissionId == null}" class="text-slate-400">-</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
