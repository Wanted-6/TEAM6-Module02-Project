<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제출 상세</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
<div class="max-w-4xl mx-auto px-6 py-10">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 space-y-8">

        <div>
            <h1 class="text-3xl font-bold text-slate-900">제출 상세</h1>
            <p class="text-slate-500 mt-2">제출 내용을 확인합니다.</p>
        </div>

        <div th:if="${errorMessage}"
             class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-700"
             th:text="${errorMessage}"></div>

        <div th:if="${successMessage}"
             class="rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-green-700"
             th:text="${successMessage}"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div th:if="${role == 'INSTRUCTOR'}">
                <p class="text-sm text-slate-500 mb-2">학생명</p>
                <p th:text="${submission.studentName}">홍길동</p>
            </div>

            <div th:if="${role == 'INSTRUCTOR'}">
                <p class="text-sm text-slate-500 mb-2">로그인 ID</p>
                <p th:text="${submission.studentLoginId}">student01</p>
            </div>

            <div>
                <p class="text-sm text-slate-500 mb-2">제출일</p>
                <p th:text="${#temporals.format(submission.submittedAt, 'yyyy-MM-dd HH:mm')}">2026-04-20 12:00</p>
            </div>
        </div>

        <div>
            <p class="text-sm text-slate-500 mb-2">제출 내용</p>
            <p class="whitespace-pre-line" th:text="${submission.content}">제출 내용</p>
        </div>

        <div>
            <p class="text-sm text-slate-500 mb-2">첨부 파일</p>
            <span th:if="${submission.attachmentFile == null or submission.attachmentFile == ''}">-</span>
            <a th:if="${submission.attachmentFile != null and submission.attachmentFile != ''}"
               th:href="@{/${submission.attachmentFile}}"
               class="text-blue-600 hover:underline">
                파일 다운로드
            </a>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-slate-200">
            <a th:if="${role == 'INSTRUCTOR'}"
               th:href="@{/courses/{courseId}/assignment/submissions(courseId=${courseId}, role='INSTRUCTOR')}"
               class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">
                목록
            </a>

            <a th:if="${role == 'STUDENT'}"
               th:href="@{/courses/{courseId}/assignment(courseId=${courseId}, role='STUDENT')}"
               class="px-4 py-2 rounded-lg border border-slate-300 bg-white hover:bg-slate-100">
                과제 상세
            </a>

            <a th:if="${role == 'STUDENT'}"
               th:href="@{/submissions/{submissionId}/modify(submissionId=${submission.submissionId}, role='STUDENT')}"
               class="px-4 py-2 rounded-lg border border-blue-300 text-blue-700 bg-blue-50 hover:bg-blue-100">
                제출 수정
            </a>
        </div>

    </div>
</div>
</body>
</html>
