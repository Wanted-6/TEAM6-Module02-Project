<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제출 상세</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2b3f8f',
                        brandSoft: '#edf2ff',
                        ink: '#1b2540',
                        line: '#dbe3f1'
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(43, 63, 143, 0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background:
                    radial-gradient(circle at top left, rgba(43, 63, 143, 0.08), transparent 28%),
                    linear-gradient(180deg, #f8faff 0%, #f3f6fb 100%);
        }
    </style>
</head>
<body class="text-ink">

<header class="sticky top-0 z-50 border-b border-white/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a th:href="@{/main}" class="text-2xl font-extrabold tracking-tight text-brand">64Lab</a>

        <div class="flex items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="h-9 w-9 overflow-hidden rounded-full border border-slate-200 shadow-sm">
                    <img th:src="${member != null and member.profile != null and member.profile.profileImage != null and member.profile.profileImage != '' ? '/uploads/' + member.profile.profileImage : '/img/default-profile.png'}"
                         class="h-full w-full object-cover"
                         onerror="this.src='/img/default-profile.png'">
                </div>
                <span class="hidden text-sm font-medium text-slate-600 sm:block">
                    <strong class="text-brand"
                            th:text="${member != null and member.name != null ? member.name : #authentication.name}">사용자</strong>님, 환영합니다.
                </span>
            </div>

            <form th:action="@{/auth/logout}" method="post" class="inline">
                <button type="submit"
                        class="rounded-full border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    로그아웃
                </button>
            </form>
        </div>
    </div>
</header>

<div class="mx-auto max-w-5xl px-4 py-8 sm:px-6 lg:px-8">

    <div class="mb-8 rounded-[28px] border border-white/70 bg-white/90 p-6 shadow-soft">
        <p class="inline-flex rounded-full bg-brandSoft px-4 py-1 text-sm font-semibold text-brand">
            Submission Detail
        </p>

        <div class="mt-4 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-ink">제출 상세</h1>
                <p class="mt-2 text-sm leading-6 text-slate-600">제출 내용과 첨부 파일, 제출 시점을 확인합니다.</p>
            </div>

            <div class="flex flex-wrap gap-2">
                <a th:href="@{/main}"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    메인
                </a>
                <a href="javascript:history.back()"
                   class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                    이전
                </a>

                <a th:if="${role == 'INSTRUCTOR'}"
                   th:href="@{/courses/{courseId}/assignment/submissions(courseId=${courseId}, role='INSTRUCTOR')}"
                   class="rounded-full bg-brand px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    제출 현황
                </a>

                <a th:if="${role == 'STUDENT'}"
                   th:href="@{/courses/{courseId}/assignment(courseId=${courseId}, role='STUDENT')}"
                   class="rounded-full bg-brand px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                    과제 상세
                </a>
            </div>
        </div>
    </div>

    <div th:if="${errorMessage}"
         class="mb-6 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700"
         th:text="${errorMessage}"></div>

    <div th:if="${successMessage}"
         class="mb-6 rounded-2xl border border-green-200 bg-green-50 px-4 py-3 text-green-700"
         th:text="${successMessage}"></div>

    <div class="rounded-[28px] border border-slate-200 bg-white p-8 shadow-sm space-y-6">

        <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
            <div>
                <h2 class="text-2xl font-extrabold text-slate-900">제출 정보</h2>
                <p class="mt-2 text-sm text-slate-500">학생 제출 내용을 상세하게 확인합니다.</p>
            </div>

            <a th:if="${role == 'STUDENT'}"
               th:href="@{/submissions/{submissionId}/modify(submissionId=${submission.submissionId}, role='STUDENT')}"
               class="rounded-full border border-[#cdd8f6] bg-brandSoft px-5 py-2 text-sm font-semibold text-brand transition hover:bg-[#dfe8ff]">
                제출 수정
            </a>
        </div>

        <div class="grid grid-cols-1 gap-4 md:grid-cols-2 text-sm">
            <div th:if="${role == 'INSTRUCTOR'}" class="rounded-2xl bg-slate-50 p-4">
                <p class="mb-1 text-slate-500">학생명</p>
                <p class="font-semibold text-slate-900" th:text="${submission.studentName}">홍길동</p>
            </div>

            <div th:if="${role == 'INSTRUCTOR'}" class="rounded-2xl bg-slate-50 p-4">
                <p class="mb-1 text-slate-500">로그인 ID</p>
                <p class="font-semibold text-slate-900" th:text="${submission.studentLoginId}">student01</p>
            </div>

            <div class="rounded-2xl bg-slate-50 p-4" th:classappend="${role == 'STUDENT'} ? ' md:col-span-2' : ''">
                <p class="mb-1 text-slate-500">제출일</p>
                <p class="font-semibold text-slate-900"
                   th:text="${#temporals.format(submission.submittedAt, 'yyyy-MM-dd HH:mm')}">
                    2026-04-20 12:00
                </p>
            </div>
        </div>

        <div class="rounded-2xl bg-slate-50 p-5">
            <p class="mb-2 text-sm font-semibold text-slate-500">제출 내용</p>
            <p class="whitespace-pre-line text-slate-800" th:text="${submission.content}">제출 내용</p>
        </div>

        <div class="rounded-2xl bg-slate-50 p-5">
            <p class="mb-2 text-sm font-semibold text-slate-500">첨부 파일</p>

            <a th:if="${submission.attachmentFile != null and submission.attachmentFile != ''}"
               th:href="@{/download/submission/{fileName}(fileName=${#strings.substring(submission.attachmentFile, submission.attachmentFile.lastIndexOf('/') + 1)})}"
               th:text="${#strings.substring(submission.attachmentFile, submission.attachmentFile.lastIndexOf('/') + 1)}"
               class="font-semibold text-brand hover:underline">
                파일 다운로드
            </a>

            <span th:if="${submission.attachmentFile == null or submission.attachmentFile == ''}"
                  class="text-slate-700">
                첨부 파일이 없습니다.
            </span>
        </div>

        <div class="flex flex-wrap justify-end gap-3 pt-2">
            <a th:if="${role == 'INSTRUCTOR'}"
               th:href="@{/courses/{courseId}/assignment/submissions(courseId=${courseId}, role='INSTRUCTOR')}"
               class="rounded-full border border-slate-200 bg-white px-5 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                목록
            </a>

            <a th:if="${role == 'STUDENT'}"
               th:href="@{/courses/{courseId}/assignment(courseId=${courseId}, role='STUDENT')}"
               class="rounded-full border border-slate-200 bg-white px-5 py-2 text-sm font-semibold text-slate-700 transition hover:border-brand hover:text-brand">
                과제 상세
            </a>

            <a th:if="${role == 'STUDENT'}"
               th:href="@{/submissions/{submissionId}/modify(submissionId=${submission.submissionId}, role='STUDENT')}"
               class="rounded-full bg-brand px-5 py-2 text-sm font-semibold text-white transition hover:bg-[#223374]">
                제출 수정
            </a>
        </div>
    </div>
</div>
</body>
</html>
